name: Daily Language Pack Release
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Merge PRs from Bufka2011
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Get all open PRs to main branch
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });
            // Filter PRs from Bufka2011 and attempt to merge
            for (const pull of pulls) {
              if (pull.user.login !== 'Bufka2011') continue;
            
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                  merge_method: 'merge'
                });
                console.log(`✅ Successfully merged PR #${pull.number}`);
              } catch (error) {
                console.log(`⚠️ Failed to merge PR #${pull.number}: ${error.message}`);
                // Continue execution even if merge fails
              }
            }
      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Set release name
        id: vars
        run: echo "release_name=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Calculate translation percentages
        id: percentages
        run: |
          #!/bin/bash
          set -euo pipefail

          function get_lang_name {
            case "$1" in
              ar_SA) echo "Arabic" ;;
              cs_CZ) echo "Czech" ;;
              da_DK) echo "Danish" ;;
              de_DE) echo "German" ;;
              el_GR) echo "Greek" ;;
              es_ES) echo "Spanish" ;;
              fi_FI) echo "Finnish" ;;
              fr_FR) echo "French" ;;
              hu_HU) echo "Hungarian" ;;
              it_IT) echo "Italian" ;;
              ja_JP) echo "Japanese" ;;
              ko_KR) echo "Korean" ;;
              nl_NL) echo "Dutch" ;;
              no_NO) echo "Norwegian" ;;
              pl_PL) echo "Polish" ;;
              pt_BR) echo "Portuguese" ;;
              ro_RO) echo "Romanian" ;;
              ru_RU) echo "Russian" ;;
              sv_SE) echo "Swedish" ;;
              tr_TR) echo "Turkish" ;;
              uk_UA) echo "Ukrainian" ;;
              zh_CN) echo "Chinese (Simplified)" ;;
              zh_TW) echo "Chinese (Traditional)" ;;
              *) echo "${1%%_*}" | tr 'a-z' 'A-Z' ;;
            esac
          }

          PERCENTAGES=""
          EN_FILES=$(find config -type f 2>/dev/null | grep -E '/en_US\.(lang|properties|txt)$' || true)
          TOTAL=0

          while IFS= read -r en_file; do
            if [ ! -f "$en_file" ]; then continue; fi
            if grep -q '=' "$en_file"; then
              # Key-value format
              COUNT=$(grep -Ev '^\s*(#|$)' "$en_file" | cut -d= -f1 | sed 's/^\s*//; s/\s*$//' | sort -u | wc -l)
            else
              # Plain lines format
              COUNT=$(grep -Ev '^\s*(#|$)' "$en_file" | wc -l)
            fi
            TOTAL=$((TOTAL + COUNT))
          done <<< "$EN_FILES"

          if [ "$TOTAL" -eq 0 ]; then
            echo "percentages=No translations found" >> $GITHUB_OUTPUT
            exit 0
          fi

          LANG_CODES=$(find config -type f 2>/dev/null | grep -E '/[a-z]{2}_[A-Z]{2}\.(lang|properties|txt)$' | sed 's|.*/||; s/\..*//' | sort -u | grep -v en_US || true)

          TEMP_PERCENTAGES=""
          while IFS= read -r lang_code; do
            if [ -z "$lang_code" ]; then continue; fi
            TRANS=0
            while IFS= read -r en_file; do
              if [ ! -f "$en_file" ]; then continue; fi
              LANG_DIR=$(dirname "$en_file")
              EXT="${en_file##*.}"
              LANG_FILE="$LANG_DIR/${lang_code}.${EXT}"
              if [ -f "$LANG_FILE" ]; then
                if grep -q '=' "$en_file"; then
                  EN_KEYS=$(grep -Ev '^\s*(#|$)' "$en_file" | cut -d= -f1 | sed 's/^\s*//; s/\s*$//' | sort -u)
                  LANG_KEYS=$(grep -Ev '^\s*(#|$)' "$LANG_FILE" | cut -d= -f1 | sed 's/^\s*//; s/\s*$//' | sort -u)
                  COMMON=$(comm -12 <(echo "$EN_KEYS") <(echo "$LANG_KEYS") | wc -l)
                else
                  COMMON=$(grep -Ev '^\s*(#|$)' "$LANG_FILE" | wc -l)
                fi
                TRANS=$((TRANS + COMMON))
              fi
            done <<< "$EN_FILES"
            PERCENTAGE=$(( (TRANS * 100 + TOTAL / 2) / TOTAL ))
            NAME=$(get_lang_name "$lang_code")
            TEMP_PERCENTAGES+="$NAME: $PERCENTAGE%\n"
          done <<< "$LANG_CODES"

          # Sort by language name
          PERCENTAGES=$(echo -e "$TEMP_PERCENTAGES" | sort -k1 || true)

          # Remove trailing newline
          PERCENTAGES="${PERCENTAGES%$'\n'}"

          echo "percentages<<EOF" >> $GITHUB_OUTPUT
          echo -e "$PERCENTAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create unified language packs ZIP (excluding en_US)
        id: zip
        run: |
          # Create temporary directory for clean archive structure
          TEMP_DIR=$(mktemp -d)
        
          # Copy entire config directory if it exists
          if [ -d "config" ]; then
            cp -r config "$TEMP_DIR/"
          else
            echo "No config directory found, skipping ZIP creation"
            exit 0
          fi
        
          # Remove all en_US files
          find "$TEMP_DIR/config" -type f -name "en_US.*" -delete 2>/dev/null || true
        
          # Convert all .properties files to .lang
          find "$TEMP_DIR/config" -type f -name "*.properties" | while read -r f; do
            mv "$f" "${f%.properties}.lang" 2>/dev/null || true
          done
        
          # Create the unified ZIP archive
          ZIP_NAME="NTNH-Translations-${{ steps.vars.outputs.release_name }}.zip"
          ZIP_PATH="build_artifacts/$ZIP_NAME"
          mkdir -p build_artifacts
        
          (
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/$ZIP_PATH" config/ -x "*.git*" "*.DS_Store" "__MACOSX/*"
          )
        
          # Clean up temporary directory
          rm -rf "$TEMP_DIR"
        
          # Output ZIP path for release step
          echo "zip_file=$ZIP_PATH" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          tag_name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          body: |
            📦 Unified language pack for Nuclear Tech: New Horizons
            🕒 Generated from branch `main` on ${{ steps.vars.outputs.release_name }}
          
            Translation progress (excluding English):
            ${{ steps.percentages.outputs.percentages }}
          
            This release contains a single ZIP archive with **all language packs**.
           
            How to use:
            1. Download the ZIP file from the release assets.
            2. Extract the contents to your Minecraft `config` directory.
            3. Restart Minecraft to apply the new language packs.
          files: ${{ steps.zip.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
