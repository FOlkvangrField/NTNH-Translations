name: Sync Translations

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'  # Run daily at 11 PM UTC

permissions:
  contents: write

jobs:
  sync:
    name: Sync en_US files from NTNH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout NTNH-Translations repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UNIVERSAL_FINE }}
          fetch-depth: 0

      - name: Checkout NTNH repository (updates/upcoming)
        uses: actions/checkout@v4
        with:
          repository: NTNewHorizons/NTNH
          ref: updates/upcoming
          path: ntnh-upstream
          token: ${{ secrets.UNIVERSAL_FINE }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync en_US files from NTNH upstream
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_DIR="ntnh-upstream/config"
          WORK_DIR="${GITHUB_WORKSPACE}/config"

          found=0
          copied=0
          skipped=0

          echo "Scanning NTNH-Translations for en_US files to sync..."
          echo ""

          while IFS= read -r -d '' existing_file; do
            relpath="${existing_file#$WORK_DIR/}"
            basename="$(basename "$existing_file")"

            # Only process en_US.* files
            if [[ ! "$basename" == en_US.* ]]; then
              continue
            fi

            upstream_file="$UPSTREAM_DIR/$relpath"

            if [ -f "$upstream_file" ]; then
              found=$((found + 1))
              # Copy upstream file, stripping BOM and CRLF line endings
              sed '1s/^\xEF\xBB\xBF//' "$upstream_file" | sed 's/\r$//' > "$existing_file"
              echo "✓ Synced: $relpath"
              copied=$((copied + 1))
            else
              echo "⚠️  Not found in upstream: $relpath"
              skipped=$((skipped + 1))
            fi
          done < <(find "$WORK_DIR" -type f -print0 2>/dev/null || true)

          echo ""
          echo "Summary:"
          echo "  Matched and synced: $copied"
          echo "  Not found in upstream: $skipped"

          if [ "$found" -eq 0 ]; then
            echo "⚠️  No en_US files found to sync."
          fi

      - name: Commit and push changes
        run: |
          rm -rf ntnh-upstream

          git add config

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            echo "Committing $CHANGED changed file(s)..."

            git commit -m "🌐 Sync en_US translations from NTNH (updates/upcoming)"
            git push origin main
            echo "✓ Pushed changes to main branch"
          fi
