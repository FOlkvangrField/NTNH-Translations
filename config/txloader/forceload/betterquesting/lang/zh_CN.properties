
# Quest Line: 由此开始
betterquesting.questline.jCQKXnirTEiarv2p82j6pA.name=由此开始
betterquesting.questline.jCQKXnirTEiarv2p82j6pA.desc=这个庞大的整合包介绍！

# Quest: 变量特效
betterquesting.quest.XGormKIQQp--gquphvky7A.name=变量特效
betterquesting.quest.XGormKIQQp--gquphvky7A.desc=§c注意！§r 在这个整合包里，你比原版Minecraft更快感到饥饿——而且你不可能永远靠同一食物生存。只吃胡萝卜或任何单一食物是不够的！%n%n相反，§a §l饮食的多样性是你的生命上限的保障§r。你的饮食越多样化——尝试新食材和独特菜肴——你的§l最大生命值就越高§r。反过来，反复吃同样的食物会降低你的饱和度，限制你的前进。%n%n§l农业是生存的基础。%n§r用铁锄或更好的工具耕作靠近水源的土壤，创造肥沃的农田，种植作物。你可以通过用锄头右键点击草方块来获得种子。多亏了§l潘马斯农场§r，你将能接触到数十种新作物和美味营养的食谱——从朴素的蔬菜到美食佳肴。%n%n通过§r§l食物清单§r（用书和胡萝卜制作）记录你的烹饪旅程。它显示你吃过哪些食物，以及接下来应该尝试哪些以保持饮食均衡。%n%n别忘了你的§l午餐袋§r（或§l午餐盒§r）！%n拿它装满各种餐点，关上它（Shift+右键），它会自动在正确的时间给你正确的食物——非常适合随时保持健康多样的饮食。%n%n§l多样化你的餐食，茁壮成长！§r 菜单越丰富，你就越强大。

# Quest: 给我回来吧！
betterquesting.quest.bdIdyx_EQoGkmzGhBgl3zA.name=给我回来吧！
betterquesting.quest.bdIdyx_EQoGkmzGhBgl3zA.desc=§d副手（Backhand）§r将高版本的副手栏位移植到了1.7.10，允许你在挖掘时用副手持火把，甚至是食物。

# Quest: 帮助我找到它！
betterquesting.quest.dvmi7P5lR_SwH0PtXJZNMw.name=帮助我找到它！
betterquesting.quest.dvmi7P5lR_SwH0PtXJZNMw.desc=§d查找物品（FindIt）§r：允许玩家查找存储区域中的任何物品。在 NEI 中将鼠标悬停在目标物品上并按§6 T §r键，存放该物品的容器将被高亮显示。

# Quest: 角落中的数字？
betterquesting.quest.eTdu9EpCStqHAh8ubFCmQw.name=角落中的数字？
betterquesting.quest.eTdu9EpCStqHAh8ubFCmQw.desc=在角落的数字是什么？是游戏信息显示(IGI)提供的信息。 它提供的一些信息能立即派上用场，而另一些信息则会在游戏进程后期发挥重要作用。%n%n如果你想要隐藏它，请在聊天中输入“/igi disable”。 如果你想要重新打开它，请输入“/igi enable”。%n%n命令“/igi config”打开配置窗口以控制其位置、比例和大小。%n%n如果您需要解决TPS问题的建议，请随时在NTNH Discord频道中寻求帮助。

# Quest: 血月
betterquesting.quest.npgCRfZdSFeBom6eL3qIMg.name=血月
betterquesting.quest.npgCRfZdSFeBom6eL3qIMg.desc=§d随意作品（RandomThings）§r：添加了血月事件，这是一种半稀有事件，期间怪物生成率增加且玩家无法入睡。如果准备充分，血月会非常有用，因为可以提前获得诸如§6发射井发射代码碎片§r和§6盖革计数器§r等稀有怪物掉落物。

# Quest: §L让我们开始我们的旅程！
betterquesting.quest.xTzNKN1lRzyKZaKxmZHGNQ.name=§L让我们开始我们的旅程！
betterquesting.quest.xTzNKN1lRzyKZaKxmZHGNQ.desc=§8*点进 LV1任务线 - 前期流程*

# Quest Line: 提示、技巧
betterquesting.questline.MJP4MeAmSTm_Di0iRHoQuw.name=提示、技巧
betterquesting.questline.MJP4MeAmSTm_Di0iRHoQuw.desc=提示和技巧，正如它所说的。

# Quest: 无尽水源
betterquesting.quest.xlNjQwC6S3S5o_B7nIciBQ.name=无尽水源
betterquesting.quest.xlNjQwC6S3S5o_B7nIciBQ.desc=厌倦了使用水桶给你的机器供水吗？尝试使用水泵或无限水罐！%n%n无限水罐将提供50mb/t的水%n增强无限水罐将提供500mb/t的水%n泵将提供1000mb/t的水，但需要蒸汽才能运行。

# Quest Line: NTM: 前期流程
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAA.name=NTM: 前期流程
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAA.desc=这是HBM的核科技模组流程的开始部分。在这一章中，你将了解该模组的基本运作机制，同时也能学到有助于你更快进步的技巧和窍门。

# Quest: 储物抽屉
betterquesting.quest.-7rSSbm6Q-qSPUPH2dapXA.name=储物抽屉
betterquesting.quest.-7rSSbm6Q-qSPUPH2dapXA.desc=§d储物抽屉§r是储存大量物品的简便且廉价的方法。它们可以进一步升级以增加存储容量以及获得其他能力，例如消除多余物品。抽屉也可以被§d雕刻§r以改变其木材类型。%n%n使用“§3成型台§r”可以基于任意方块来设计抽屉的样式。%n%n§2请注意，过多摆放抽屉可能会导致游戏冻结滞后。

# Quest: 斯特林发电机
betterquesting.quest.-OxoBRz7Spqm0rVUNxRVpA.name=斯特林发电机
betterquesting.quest.-OxoBRz7Spqm0rVUNxRVpA.desc=§3斯特林发动机§r使用来自§3加热炉§r或§3§r§3燃烧室§r产生的热量来产生动力。如果使用加热炉来加热斯特林发动机，它可能会超速并损坏发动机，导致主齿轮飞出。重型斯特林发动机没有这个问题。%n%n使用煤炭作为燃料的燃烧室配合斯特林发动机工作时，其能量输出为§e2kHE/s§r；而配备加热炉的重型斯特林发动机则具有§e10kHE/s§r的能量输出。

# Quest: 蒸汽引擎
betterquesting.quest.1WdjJYUsRMKgt4MYnlmM7A.name=蒸汽引擎
betterquesting.quest.1WdjJYUsRMKgt4MYnlmM7A.desc=§3蒸汽机§r是一种在游戏早期用于将§b蒸汽§r转化为能量的方法。蒸汽机需要外部蒸汽来源，并且还需要处理或重新利用它所产生的§b低压蒸汽§r的装置。%n%n蒸汽机的能源利用效率高达§e85%§r，因此它的性能优于§3斯特林发电机§r。然而，它仍然存在处理能力上的限制——因为它最多只能容纳2000mB的蒸汽。它的最大处理速度为2000mB/t，因此每tick产生§e3400HE§r的能量，或者每秒§e68kHE§r的能量。因此，在制造出§3汽轮机§r之前，这种蒸汽机确实是最优秀的发电机。%n%n通过使用煤炭的加热炉进行加热的锅炉，可以达到§e17kHE/s§r的发电效率。

# Quest: 电池
betterquesting.quest.5Cydbu41QH-GnEo1um0Qjw.name=电池
betterquesting.quest.5Cydbu41QH-GnEo1um0Qjw.desc=§3电池座§r用于安装§6电池§r或§6电容器§r。%n%n电池的储电能力更强，但放电速度较慢，这意味着只能有少量储存的电能被输送到电网中。%n%n而电容器则相反：其储电能力较弱，但放电速度更快。

# Quest: 电缆网络分析工具
betterquesting.quest.9FPuQxhjSHmPmrCwdfRZRw.name=电缆网络分析工具
betterquesting.quest.9FPuQxhjSHmPmrCwdfRZRw.desc=The §6Cable Network Analysis Tool§r is used to check the integrity of power grids and analyze their main functional components. To perform a test, right-click the analyzer on wires or mechanisms in the power grid. The device displays the following data:%n%n§eLinks§r - these include wires and mechanisms that can conduct energy (e.g., energy storage units, utility poles).%n%n§cProviders§r - all mechanisms capable of producing energy and/or feeding it into the grid (energy storage units in "§agreen§r" and "§6orange§r" modes, turbines, etc.).%n%n§9Receivers§r - everything that absorbs energy from the grid (energy storage units in "§9blue§r" mode, grinders, and other mechanisms).%n%n§2The analyzer not only displays the above components but also counts them. Each grid is assigned a unique code.%n%nParticles only spawn in a 20 block radius!

# Quest: 管道锚点
betterquesting.quest.9wRpAnjXSrGWFWSwKoTOhg.name=管道锚点
betterquesting.quest.9wRpAnjXSrGWFWSwKoTOhg.desc=§3管锚§r是一种非实体的流体输送装置，可以用来替代普通的流体管道。

# Quest: 自动嗡嗡锯
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA0A.name=自动嗡嗡锯
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA0A.desc=有了§6§3自动嗡嗡锯§r，你可以自动伐木以获取§6木材§r，也可以用于§6大麻§r和§6小麦§r等其他作物。%n%n§3风扇§r，通过红石激活时可以用来将掉落物推进漏斗或传送带进行储存。使用§6手钻§r调整其推动范围。

# Quest: 工业搅拌机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA0w.name=工业搅拌机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA0w.desc=§3工业搅拌机§r是一种将流体与物品或其他流体混合的机器。在某些配方中，它可以代替§3化工厂§r进行生产。

# Quest: 核科技: 序言
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAQ.name=核科技: 序言
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAQ.desc=这是§dhbm核科技§r的科技树的开始。在开始之前建议您储备一些材料，如§6铁§r、§6煤§r、§6铝§r、§6铜§r和§6红石§r。%n%n§a§2一些高级装备可以通过从世界各地散落的建筑中回收获得，例如沙漠里废弃核电站中的离心机，或者通过稀有怪物掉落获得，比如盖革计数器。%n%n在世界创建界面中，可以开启使用“火星救援模式”。

# Quest: 机器模板文件夹
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAg.name=机器模板文件夹
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAg.desc=§6模板文件夹§r是一个允许你创建用于制作蓝图的物品。目前，它仅被用于§3坩埚§r相关配方中。在本次更新之后，它将逐渐被淘汰使用。

# Quest: 砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAw.name=砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAw.desc=§3砧§r是一个分级的制造设备，允许你在上面制造各种机器、结构和物品。砧有多个层级，更高层级的砧会解锁更多的配方。%n%n在§3火力锻压机§r中使用的板锻模，是在砧上制造而成的。§3高炉§r需要1个板锻模来制造

# Quest: 火力锻压机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAABA.name=火力锻压机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAABA.desc=§3锻压机§r是一种可以用来制造§6板§r、§6线§r、§6弹壳§r的机器，也可以将不可熔化的粉末§6压缩§r回其正常形态以及生产某些类型的子弹。锻压机需要§6锻模§r来工作，这些锻模可以由§6空白锻模§r在§6模板文件夹§r中制造。%n%n§2预热器可以放置在火力锻压机旁边以提高其速度。

# Quest: 高炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACQ.name=高炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACQ.desc=§3高炉§r是一种使用固体燃料的炉子，用于制造不同的合金。早期主要需要制造的合金有§6紫铜§r、§6钢§r和§6高级合金§r。%n%n高级合金可以用来制造非常耐用的工具，这些工具可以用于挖掘矿脉。对于更高级的工具，按ALT键会弹出一个菜单，从中可以选择多个工具能力同时使用。%n%n有一个独立的模块，即§3高炉烟道§r，可以安装在高炉的顶部，从而提高其生产效率。如果没有这个模块，高炉的冶炼速度大约只有正常情况下的一半；而安装了该模块后，冶炼速度可以提高两倍。燃料消耗量保持不变，这意味着该模块还能使燃料利用效率提升两倍。%n%n§2 对于更高级的工具，按住 ALT 键会弹出一个菜单，从中可以选择多个工具能力同时使用。

# Quest: 战壕面具
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADA.name=战壕面具
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADA.desc=挖矿时，你至少佩戴一个§6战壕面具§r来保护自己免受一些有害空气颗粒的伤害。要制作一个这样的应急用战壕面具，你必须先获得§6布§r，然后拿在手上右键以往上面撒尿得到沾有尿的布。%n%n§2制作布的大麻纤维很容易通过收割野生的大麻获得。

# Quest: 防护套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADw.name=防护套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADw.desc=§6防护服§r能抵御多种危险环境，主要针对辐射防护。§6防辐射布§r可进一步强化以制作防护性能更强的防护服。%n%n为提升对环境危害的额外防护，需配备§6滤毒罐§r。操作方式：手持滤毒罐右击即可装配。

# Quest: 能量线缆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAEQ.name=能量线缆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAEQ.desc=§3红铜电缆§r是最基础的传输方块，具有两种形态：方块形态和更纤细的线缆形态。其中方块形态还包含可涂装版本，能更好地融入建筑设计中。%n%n为实现更美观且更长距离的能量传输，可使用§l§r§6电缆卷§r配合§3电力连接器§r。这类输电线非实体，能够穿透楼层与墙壁。%n%n

# Quest: 污染探测器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAEg.name=污染探测器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAEg.desc=§6污染探测器§r会监控并显示环境中存在的污染水平。高污染水平会降低能见度，给玩家施加负面效果并增益怪物，包括带有枪械的骷髅。

# Quest: 火力发电机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAEw.name=火力发电机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAEw.desc=§3火力发电机§r是通过燃烧木材来产生能量的最基础的发电机。它可以使用任何可燃物品来运行，但对原木和木材提供燃烧时间加成。它还可以通过点击开关下方的箭头转为使用任何可燃流体运行，但它的效率比其他燃烧可燃流体的发电机要低得多。%n%n在火力发电机中燃烧原木可以产生§e2kHE/s§r的能量。

# Quest: 模拟电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAFA.name=模拟电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAFA.desc=§6模拟电路板§r是你制造如§6石油探测仪§r、§3化工厂§r和§3大型电弧炉§r等基本机器和工具的第一个真正意义上的电路板。%n%n§2如果你有粉碎机，那么就能以更便宜的配方制造电容器。

# Quest: 装配机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGQ.name=装配机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGQ.desc=§3装配机§r在游戏流程的每个阶段都很重要，它用来制造几乎每一种复杂的机器。装配机需要在GUI上选定一个配方来运行。%n%n§2有些独特的配方需要相应的蓝图才能制作出来，这些蓝图可以在遗迹结构中找到，或者从鲍马逊购买。

# Quest: 粉碎机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGg.name=粉碎机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGg.desc=§3粉碎机§r是一种将物品粉碎成粉末状的机器。粉碎机也可以用来将矿石产出翻倍。%n%n§2粉碎机刀片是粉碎机工作所必要的。

# Quest: 焊接台
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHA.name=焊接台
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHA.desc=§3焊接台§r是用于将§6§r电路组件§r组装§6§r成§6电路§r的机器，也是制造§6机器升级§r的地方。

# Quest: 坩埚
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHQ.name=坩埚
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHQ.desc=§3坩埚§r是冶金体系的核心设备，兼具矿石处理、合金冶炼与金属铸造功能。其运作需依赖外部热源将输入物熔化为液态。当坩埚满载时，会持续排放无法消除的烟尘污染。需特别说明：如前所述，部分合金可通过§3高炉§r替代冶炼，但效率通常较低。%n%n更多详细信息可在背包内对坩埚按[F1]。

# Quest: 电弧焊机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHw.name=电弧焊机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHw.desc=§3电弧焊机§r是制造许多组件（如§6焊接板§r、§6导弹部件§r等）所需的机器。某些配方需要消耗输入电弧焊机的流体才能工作。

# Quest: 复式炼焦炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIQ.name=复式炼焦炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIQ.desc=§3复式炼焦炉§r是一种独特的炉子，可以制取各类焦炭，木炭等产品并产生流体副产品。它可以更有效地生产§6焦炭§r、§b木油§r和§6铝§r。

# Quest: 化工厂
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIg.name=化工厂
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIg.desc=§3化工厂§r是在多种流程都要使用的机器，可以将流体转化为其他流体、合成不同化合物等。该机器需要化工厂模板才能工作。与§3装配机§r类似，你需要在GUI中选择所需的配方。

# Quest: 连续铸造机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJA.name=连续铸造机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJA.desc=§3连续铸造机§r是一个大型盆状机器，一次可以批量铸造9个物品。它也需要§b水§r来进行铸造，在这个过程中会产生§b低压蒸汽§r，然后这些低压蒸汽可以被重新转化为水。

# Quest: 高速钢
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJQ.name=高速钢
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJQ.desc=§6高速钢§r是一种先进且高度专业化的标准钢形式，广泛应用于§3钻油塔§r和§3工业搅拌机§r等多个工业领域。

# Quest: 石油探测仪
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJg.name=石油探测仪
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJg.desc=§6石油探测仪§r会在聊天栏输出你下方是否有§e油田§r来帮助你寻找。如果油田位于很远的地方，你可以直接开采油田中的油岩方块放置到你的石化加工厂附近。

# Quest: 输送带
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKg.name=输送带
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKg.desc=§3输送带系统§r是实现物流的最简单方式。有多种类型的输送带部件，它们既可以与机器连接，也可以让输送物品沿传送带移动。%n%n§3输送带§r是一种用于运输物品的装置。它们可以捡起掉落的物品，或者从输送带提取器处取出物品。输送带导入器可以从输送带上取下物品；如果输送带末端没有输送带导入器，物品就会直接掉落在末端。%n%n§3输送带导入器§r是一种用于从输送带上取下物品并将其放入物品容器的装置；而§3输送带提取器§r则相反，它们的作用是从物品容器中取出物品并将其放置到输送带上。%n%n如果缓冲区已满，输送带导入器可以选择销毁多余的物品；否则，那些既无法被放入目标物品容器，也无法被存储在导入器自身的缓冲区中的物品，就会直接被丢出为掉落物。%n%n输送带提取器具备白名单/黑名单系统（默认模式为无限制的黑名单，这意味着所有物品都会被允许通过）。点击白色箭头即可在这两种模式之间切换。要将某件物品添加到黑名单或白名单中，只需将其“放入”蓝色的物品栏中即可——这些物品并不会被实际消耗掉。%n%n§3输送带分离器§r是一种能够将物品均匀分配到两条输送线上的输送带装置。%n%n§3输送分拣机§是一种能够将各种物品分拣到指定输送带上的设备。这类设备没有缓冲区，仅根据预设的过滤规则将物品传送至相连的输送带上，因此它们能够以极快的速度完成物品的分拣工作。%n该分拣设备共有六个输出口，每个输出口都配有五个过滤槽位，因此它能够将多个物品同时输送到同一条传送带上。

# Quest: 设置工具
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAMQ.name=设置工具
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAMQ.desc=§6设置工具§r用于复制各类设备的设置信息。在建造大型炼油厂时，这一工具尤为实用。

# Quest: 背包与探索
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAOQ.name=背包与探索
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAOQ.desc=探索是NTM体验的一个重要部分，因为去废弃建筑捡垃圾是在游戏早期发家的可行策略。%n%n§d背包对此将带来巨大的帮助，因为它们可以让你携带更多的战利品。HBM的箱子也可以用来运输物品，但背包本身就配备了专门的工具收纳槽、工作台、床，以及流体储罐。%n%n可以使用§6软管§r快速地取出背包流体或向背包中注入流体。%n%n§2特殊背包将在下一个更新中移除，所以如果你还在使用它的背包，请尽快清空转移库存。

# Quest: 回转炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPQ.name=回转炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPQ.desc=§3回转炉§r是一种大型熔炉，由§b蒸汽§r和§6固体燃料§r共同驱动。它可以像§3坩埚§r和§3电弧炉§r一样输出熔融材料进行铸造。回转炉是唯一能生产§6土星合金§r和§6武器级钢§r的机器。

# Quest: 蒸汽与蒸汽冷凝器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAVQ.name=蒸汽与蒸汽冷凝器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAVQ.desc=§3大型锅炉§r在从下方接收热量时会加热其中流体。锅炉的两个重要用途是用于产生§b蒸汽§r和处理§b原油§r，这些将在后面介绍。如果锅炉的输出量受阻它可能会爆炸。%n%n蒸汽在机器中使用后，例如通过反应堆输送蒸汽给§3汽轮机§r发电或§3化工厂§r运行，将产生§b低压蒸汽§r。可以通过使用§3蒸汽冷凝器§r将低压蒸汽回收并100%重新获取水分。对于反应堆来说，推荐搭建水循环冷却系统。

# Quest: 太阳能锅炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAYg.name=太阳能锅炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAYg.desc=§3太阳能锅炉§r是游戏早期的一种机器，它可以使用来自定日镜反射的阳光来煮沸水。%n%n太阳能塔锅炉通过指向它的定日镜获取热量。使用定日镜调整工具右键点击锅炉将保存其位置到工具中，然后再点击镜子将使其对准链接的锅炉。定日镜的最大范围为25个方块，且效率不会随距离降低。在满阳光水平下，12.5面定日镜可以让太阳能锅炉每tick消耗1mB的水，而每消耗1mB的水将产生100mB的蒸汽。然而，水消耗率会被四舍五入到整数，因此，要达到最初的100mB/t的蒸汽生产速率需要13面定日镜，再提升100mB/t的速率需要再加12面定日镜，然后是13面、12面，以此类推。%n%n由于每个定日镜提供的热量都是基于阳光的，因此如果定日镜上方有固体物体遮挡，那么它们就不会工作。到了晚上，随着光线量的减少，热量也会随之减少，直到晚上不再产生热量。%n%n太阳能锅炉只能产生普通的蒸汽，因此无法使用流体标识器更改其产出流体类型。

# Quest: 弹药压制与枪械
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAaA.name=弹药压制与枪械
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAaA.desc=有了以§3坩埚§r为核心的铸造体系后可以制作许多枪械部件，如§6枪管§r和§6握把§r。§3压弹机§r则用于制造枪支使用的各种弹药。%n%n可以在§3武器改装台§r上为武器安装改装配件，例如§6消音器§r和§6瞄准镜§r。%n%n§6弹壳包§r在枪射击时会回收一些弹壳。

# Quest: 采矿炸药
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAhQ.name=采矿炸药
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAhQ.desc=§3采矿炸药§r是一种专门为采矿而设计的爆炸物，比如用于开采深层矿石。在获取能够完成相同作用的镐之前，这种炸药不会破坏矿石中掉落的物品。利用采矿炸药，是从深层矿石中获取§6锆§r的一种非常有效的方法，这些锆可用于制造核燃料棒。%n%n它的爆炸半径约为3个方块范围，一旦被红石激活就会立即发生爆炸。不过，这种爆炸并不会对任何生物造成伤害。%n%n还有另外两种类似的爆炸物：一种是§3定时采矿炸药§r，另一种是§b§3塞姆汀采矿炸药§r。这两种炸药都属于定时爆炸物，其中塞姆汀采矿炸药的威力比普通定时采矿炸药更强；而§3定时采矿炸药除了具备定时引爆的功能、使用起来更为方便之外，似乎并没有其他特殊性能。

# Quest: 钢砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAuw.name=钢砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAuw.desc=升级到[T2]级的§3砧§r，解锁额外配方。

# Quest: 烟囱
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAyg.name=烟囱
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAyg.desc=§3烟囱§r可以减少机器产生的污染。在砧上制造的§3排气管§r可以用来将烟雾从机器输送到烟囱。需要使用§3工业烟囱§r来生产§6细烟灰§r，用于在后期制作§6富勒烯§r。%n%n可以在烟囱下方安装一个§3储灰槽§r用来收集§6飞尘§r。飞尘可以用作廉价的黑色染料替代品，也可以用于制造§6工业肥料§r。

# Quest: 玩家去污器
betterquesting.quest.AAAAAAAAAAAAAAAAAAABCw.name=玩家去污器
betterquesting.quest.AAAAAAAAAAAAAAAAAAABCw.desc=§6玩家去污器§r将移除站在其上玩家的辐射。它可能是你最经济高效去除玩家辐射的手段，因为其他方法如§6消辐宁§r是消耗品。

# Quest: 机器升级模板
betterquesting.quest.AAAAAAAAAAAAAAAAAAABSA.name=机器升级模板
betterquesting.quest.AAAAAAAAAAAAAAAAAAABSA.desc=§6机器升级模板§r是所有机器升级的基础。机器升级不仅可用于提高机器效率，还可以解锁新功能。

# Quest: 排液管
betterquesting.quest.AAAAAAAAAAAAAAAAAAABdg.name=排液管
betterquesting.quest.AAAAAAAAAAAAAAAAAAABdg.desc=§3排液管§r允许将流体与气体排放至环境中，其代价是造成污染。

# Quest: 守护项链
betterquesting.quest.D0bv2vfWSkK1soyqHDwqjQ.name=守护项链
betterquesting.quest.D0bv2vfWSkK1soyqHDwqjQ.desc=§6守护项链§r可以防止陨石撞击玩家，并阻止它们摧毁方块。建议尽早获得，以防陨石造成昂贵的损失。

# Quest: 生物群系指南针
betterquesting.quest.FmtITPC3QiuMRrIhIkfHFw.name=生物群系指南针
betterquesting.quest.FmtITPC3QiuMRrIhIkfHFw.desc=§d生物群系指南针§r可以用来轻松你定位感兴趣的生物群系。

# Quest: 钢炉
betterquesting.quest.GOACXA8jRc-SMNzk2CsNUQ.name=钢炉
betterquesting.quest.GOACXA8jRc-SMNzk2CsNUQ.desc=与其它熔炉不同，§3钢炉§r是依靠§e热量TU§r来运作的。它可以并行冶炼3件物品，但每个冶炼位置会消耗更多的TU，因此如果没有强大的热源，其冶炼速度会变得很慢。此外，这种熔炉在处理矿石和木材时还具有额外的收益机制：每冶炼一件物品，收益值会增加§e25%§r，这意味着每冶炼4个物品，就可以免费获得1个物品（§e也就是说，从1组64个物品中可以额外获得15个物品§r）。

# Quest: 电炉
betterquesting.quest.HONUf7SQRl-jcf3BC5242A.name=电炉
betterquesting.quest.HONUf7SQRl-jcf3BC5242A.desc=The §3Electric Furnace§r is a furnace that is powered by electricity. it is slightly faster than the vanilla furnace without upgrades. it consumes from §e1 kHE/s§r without upgrades up to §e4 kHE/s§r.%n%nDue to it only being slightly faster than the vanilla furnace, it isn't used much beyond early game, but it can be used in automation, if speed isn't the main objective.

# Quest: 抽屉钥匙
betterquesting.quest.HTaQEgJ8QCWYNMB8n7Awug.name=抽屉钥匙
betterquesting.quest.HTaQEgJ8QCWYNMB8n7Awug.desc=§d抽屉钥匙§r可以以多种方式修改抽屉的功能设置。%n%n§d抽屉钥匙能够锁定抽屉的物品种类§r，这样即使抽屉为空时，也无法向其中添加其他的物品类型了。%n%n§d屏蔽钥匙§r能够隐藏抽屉上的物品图标。%n%n§d量化钥匙§r可以显示抽屉内储存的物品数量。%n%n§私人钥匙§r能够保护玩家的物资安全，防止其他玩家窃取物资。%n

# Quest: 鲍马逊
betterquesting.quest.IAP1AGA2TV-TtMAv_QMrIA.name=鲍马逊
betterquesting.quest.IAP1AGA2TV-TtMAv_QMrIA.desc=§6鲍马逊§r是游戏内的一家商店，玩家可以使用§6瓶盖§r来购买各种物品，比如建筑材料、植物、资源等等。要想购买这些物品，玩家必须先完成下列被列为“成就”项的目标。

# Quest: 木炭自动化
betterquesting.quest.ItX_qnZpQCuDSxSoHuKmsA.name=木炭自动化
betterquesting.quest.ItX_qnZpQCuDSxSoHuKmsA.desc=从林木农场获得的§6原木§r，可以通过在§3复式炼焦炉§r中加工处理，转化为木炭。木炭有多种用途：它可以作为§3熔炉§r的燃料，也可以用于§3高炉§r中。此外，它还可以用作炼§6钢过程中的§6助熔剂§r或§6碳源§r。当然，木炭也能被用来制造§6火药§r，供弹药使用。

# Quest: HE→RF转换器
betterquesting.quest.JcBabPI8RzGGmai3SwlcLw.name=HE→RF转换器
betterquesting.quest.JcBabPI8RzGGmai3SwlcLw.desc=§3HE→RF转换器§r可将 NTM 设备产生的能量转化为适用于§d应用能源§r和§3%nd开放式计算机§r可用的RF能量。该转换器拥有超大容量内部能量缓冲，因此建议使用二极管限制能量通量。可将 NTM 设备产生的能量转化为适用于物质能源网络和开放式计算机的可用能量。

# Quest: 多类型流体识别码
betterquesting.quest.M3mauW7uTCej4mql-Wnhqg.name=多类型流体识别码
betterquesting.quest.M3mauW7uTCej4mql-Wnhqg.desc=§6多类型流体识别码§r用于选择所需的流体类型。按住Shift点击来选择相应的流体。

# Quest: NTM的其他模式
betterquesting.quest.MWwrY8PcTaam9T_sc4yDtQ.name=NTM的其他模式
betterquesting.quest.MWwrY8PcTaam9T_sc4yDtQ.desc=§cNTNH§r是一个模块化模组包，因此你觉得完全可以自行添加、删除或修改配置文件/模组。%n%n§dNTM§r模组提供了一个高度模块化的配置文件，允许玩家启用其中的各种附加功能。这些功能可以通过hbm.cfg文件来进行设置。%n%n§2昂贵模式§r：这种模式会使一切变得更为昂贵，配方不仅需要更多的资源，还要求使用新的组件。注意，任务手册的指引不会随着启用该模式而变化。%n%n§2528 模式§r中引入了“模板”形式的科技进度机制，要解锁这些模板，就需要在§3焚化炉§r中摧毁一定数量的物品。此外，有一些物品，尤其是电路类物品，其制造将有概率产出废品。同时，游戏中还有许多让游戏难度增加的改动：比如§6钽矿§r只会在特定区域出现，地雷的出现频率也会提高，而所有的§dAE2§r方块在被使用后都会引发§4爆炸§r。%n%n当昂贵模式被启用时，§3精密装配机§r的许多废品回收配方的回收概率都会大幅下降，从而导致整体成本显著上升。%n%n§2肆虐模式§r：在肆虐模式下，异虫变得极其危险，因为污染使得它们变得更加强大且更具攻击性。此外，那些更具破坏力的异虫也会变得更加常见。当污染程度达到一定高度时，异虫的侦察兵会自动出现，因此必须依靠自动化防御系统来防止新的巢穴形成。%n%n§2对于那些会修改配方的模式，在创建了新的hbmrecipes文件夹并启用相关模式后，必须重新将modpack中的配方内容导入其中。§r

# Quest: 打包带
betterquesting.quest.RBJS7D2ATpq7GUingAewuQ.name=打包带
betterquesting.quest.RBJS7D2ATpq7GUingAewuQ.desc=The §6Packing Tape§r allows one to break and move drawers without all the items falling on the floor.

# Quest: 装甲覆层
betterquesting.quest.UKkcpXk3SEWHXLIVC5VTDg.name=装甲覆层
betterquesting.quest.UKkcpXk3SEWHXLIVC5VTDg.desc=§6装甲覆层§r是减少辐射吸收剂量的最重要的防护改装之一。它可以插入到所有护甲中。

# Quest: 剂量计
betterquesting.quest.X1wMtj-xQR6M4Qzm6Rk2vA.name=剂量计
betterquesting.quest.X1wMtj-xQR6M4Qzm6Rk2vA.desc=The §6Dosimeter§r is an instrument for detecting radiation and assessing radioactive contamination.%n%nIt is functionally similar to a §6Geiger Counter§r, but it collects much less data - only the general radiation contamination of the environment. Only a handheld version of the dosimeter is available. To obtain radiation information, right-click while holding the dosimeter.%n%nLike a counter, it makes a characteristic crackling sound when radiation is detected.%n%n§2The maximum radiation displayed is 3.6 RAD/S.%n%nNot great, not terrible.

# Quest: 斯特林锯木机
betterquesting.quest._qJt02i4ST2iccmkHudKCg.name=斯特林锯木机
betterquesting.quest._qJt02i4ST2iccmkHudKCg.desc=§3斯特林锯木机§r利用热量切割与木材相关的物品，在此过程中还产生§6锯末§r。锯末可以用来获取§6纸张§r，如果进一步加工，可以在§3复式炼焦炉§r中变成§6木炭§r。

# Quest: 链锯
betterquesting.quest.bKzHBx2ZTBWFD1BGHBfHWg.name=链锯
betterquesting.quest.bKzHBx2ZTBWFD1BGHBfHWg.desc=§l§c§lPainsaw.§r%n%nAlthough the §6Chainsaw§r is similar in functionality to the §6axe§r, its arsenal is much broader. By default, the saw simply mines blocks, but it also has two additional operating modes: §eSilk Touch§r and §eVein Miner (5)§r.%n%nIt runs on many types of §bliquid fuel§r (see the item description for a list). Mining one block consumes 1 mB§r of fuel.%n%nBesides its primary purpose, the Chainsaw can also serve as a decent melee weapon, as it deals significant damage and has modifiers: §ePainsaw§r and §eDecapitator§r.

# Quest: 加热炉/燃烧室
betterquesting.quest.cUWyKdzATTSYaMg1MxZqYw.name=加热炉/燃烧室
betterquesting.quest.cUWyKdzATTSYaMg1MxZqYw.desc=§3燃烧室§r和§3加热炉§r能够燃烧固体燃料产生热量(§eTU§r)来供给上方任何需要热量来运行的机器。%n%n两台机器在操作上很相似。为了使它们传递热量，必须将接收热量的机器放其在上方使接收热量的机器上的铜制热板对准产生热量的机器的铜制热板。%n%n放置后，这些机器就可以装满固体燃料，直到燃料用尽或热缓冲槽充满为止。如果其缓冲槽已满，则不会消耗任何燃料——因此，这两台机器在节省燃料方面都相当高效。%n%n这两台机器的主要区别在于它们的燃烧速度：燃烧室在满负荷下燃烧燃料的速度要慢得多，而加热炉产生的热量是其五倍（但燃烧速度是八倍）。尽管效率不高，但由于其更高的热输出和热容量，加热炉通常更受青睐。然而，它不能加热斯特林发动机，因为其基础输出(500 TU/t)将使发动机超速；重型斯特林发动机则没有这个问题。%n%n此外，加热炉可以从放置在其下方的其他产热机器接收热量，可以多个堆叠在一起，用于像坩埚这样的耗热大户。然而当热量传递给上方的机器时，所接收的热量减半。

# Quest: 回收
betterquesting.quest.ceT8V2MeRz2u-FR9Uckarw.name=回收
betterquesting.quest.ceT8V2MeRz2u-FR9Uckarw.desc=Now, as you have a better anvil, you can start §erecycling§r some stuff you may found in dungeons.

# Quest: 乳制品加工厂
betterquesting.quest.fkSdZg90QZ6gAvDWMSZbbQ.name=乳制品加工厂
betterquesting.quest.fkSdZg90QZ6gAvDWMSZbbQ.desc=The §3Dairy Processing Tank§r, while it can be crafted earlier, is very useful on Minmus because of the infinite §bMilk§r production from §3Pumps§r. It can be used to process milk into different liquids, which can then be used to make food items.

# Quest: 更好的熔炉
betterquesting.quest.gKQiP_zES4KokMmon9bDQg.name=更好的熔炉
betterquesting.quest.gKQiP_zES4KokMmon9bDQg.desc=§3砖砌炉§r与普通的炉子几乎没有任何区别，但它能够更快地冶炼各种建筑材料。例如，§6沙子§r和§6圆石§r的冶炼速度是普通炉子的两倍；而§6黏土§r和§6耐火黏土§r的冶炼速度更是普通炉子的四倍。这意味着，使用砖炉进行一次冶炼操作，就可以制作出一整块砖。此外，它还能以两倍的速度生产§6木炭§r，同时还能收集燃烧燃料后产生的灰烬。%n%n§3铁炉§r的熔炼速度比普通炉子快§e20%§r，这意味着它可以在8秒内完成一次熔炼操作，而普通炉子则需要10秒。除了熔炼速度更快之外，这种铁炉仅在运行过程中才会消耗燃料，因此燃料永远不会被浪费。此外，对于各种类型的燃料来说，这种铁炉还具有燃烧时间上的优势：对于褐煤而言，燃烧时间可增加§e+25%§r；而对于固体燃料而言，燃烧时间可增加§e100%§。%n%n§d把未来带回现实§r提供了高版本熔炉的移植，例如能够更快烹制食物的§3烟熏炉§r，以及能够更快速冶炼矿石的§3高炉§r。

# Quest: 无尽水源
betterquesting.quest.gWyCk5zlQlWAPGdwFXhTaQ.name=无尽水源
betterquesting.quest.gWyCk5zlQlWAPGdwFXhTaQ.desc=厌倦了使用水桶给你的机器供§b水§r吗？尝试使用水泵或无限水罐！%n%n§6无限水罐§r将提供§e50mb/t§r的水%n%n§6增强无限水罐§r将提供§e500mb/t§r的水%n%n§6蒸汽动力地下水泵§r将提供§e1000mb/t§r的水，但显而易见的需要§b蒸汽§r才能运行。

# Quest: 压缩机
betterquesting.quest.jcaOirN6QCOC50YJbil2rQ.name=压缩机
betterquesting.quest.jcaOirN6QCOC50YJbil2rQ.desc=§3压缩机§r是一种专门的多块机器，用于给流体加压。它可以对任何流体进行操作以增加其压力，以便在其他机器中使用。其中一些流体可以被压缩成另一种流体。

# Quest: 气动活塞
betterquesting.quest.pTXtLJnPRu6lyiOqGVP7lw.name=气动活塞
betterquesting.quest.pTXtLJnPRu6lyiOqGVP7lw.desc=§3Pneumatic Pipes§r are an instant form of item transportation which can cover large distances. The pipes must have a compressed gas inside them to work.%n%nA §6Screwdriver§r is needed to create a connection, and right clicking on the connection with a fluid id will set the gasseous fluid it will use.

# Quest: 石墨
betterquesting.quest.pbwyXfgDRaCxA1R8YmlTIQ.name=石墨
betterquesting.quest.pbwyXfgDRaCxA1R8YmlTIQ.desc=§6Graphite§r is a crystalline carbon allotrope, consisting of stacked layers of graphene. Graphite is the most stable form of carbon, and is useful in many environments. It's ability to moderate neutrons makes it indispensable for §3nuclear reactors§r that rely on thermal neutrons to maintain criticality. It's ability to withstand high temperatures and electrical conductivity make it useful as electrodes in the §3Arc Furnace§r and §3Arc Welder§r. 

# Quest: 远距离电力传输
betterquesting.quest.s8lSFTDKSpqK44PLhdfusw.name=远距离电力传输
betterquesting.quest.s8lSFTDKSpqK44PLhdfusw.desc=对于远距离电力传输及更高美观度需求，现已推出新型输电节点——§3大型电塔§r。%n %n需要配套建设§3变电站§r以实现线路电压的升压/降压调节。%n %n当储量可观的§e基岩矿脉§r或§e石油矿点§r分布于远离主基地区域时，这些电塔将充分体现其战略价值。%n

# Quest: Industrial Hemp & Mustard Willow
betterquesting.quest.ztJLZeOsSq6hpRyKY55CDg.name=Industrial Hemp & Mustard Willow
betterquesting.quest.ztJLZeOsSq6hpRyKY55CDg.desc=Walking around the world, you can find a §6Mustard Willow§r on dead or §6Oily Dirt§r. The willow itself will not be needed anytime soon, but it is better to collect it and the soil underneath it.%n%n§6Industrial Hemp§r is used to craft ropes, strings and biomass.

# Quest Line: NTM: 石化工业
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAQ.name=NTM: 石化工业
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAQ.desc=开始处理石油，并着手开采基岩矿石。这一阶段的主要任务是提炼石油，同时制造塑料、更先进的电路元件以及其他高强度材料。

# Quest: 野火
betterquesting.quest.8OusetROQiyH-66QbewmNQ.name=野火
betterquesting.quest.8OusetROQiyH-66QbewmNQ.desc=§6野火§r是一种具有极高放射性的物质，可用于制造用于§3RBMK反应堆§r的强力核燃料，以及用于发电的§b野火火箭燃料§r。储存这种物质需要使用具备高辐射防护能力的设备。此外，§6热核灰烬§r可以作为§b反物质-BF火箭燃料§r生产过程中的副产品来进行可持续生产。%n%n高科技拆弹装置能够从哑弹中提取出野火蛋碎片。

# Quest: 残忍2:更残忍
betterquesting.quest.8R4pAa2BSWGGBdYOaobEMA.name=残忍2:更残忍
betterquesting.quest.8R4pAa2BSWGGBdYOaobEMA.desc=更卑鄙

# Quest: 铝处理
betterquesting.quest.8Z2F5EPIRPGvasjKDWd4tA.name=铝处理
betterquesting.quest.8Z2F5EPIRPGvasjKDWd4tA.desc=§6Bauxide§r and §6Cryolite§r can be further processed to obtain §6Aluminium§r, with additional byproducts of §6Iron§r, §6Titanium§r and §bMercury§r.

# Quest: 回旋加速器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA1g.name=回旋加速器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA1g.desc=§3回旋加速器§r是一种通过用元素粒子轰击元素粉末来生成更重元素的设备。运行这种设备需要每秒消耗§e 20MHE§r的能量。%n%n在某些特定的配方中，这种方法还会产生§b反物质§r作为副产品，因此它确实是一种可靠但成本较高的大规模先进材料生产方法。%n%n§2 可考虑安装最高级别的节能及速度提升芯片，以此缩短运行时间并降低能耗。§r

# Quest: Desh伺服装置
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACw.name=Desh伺服装置
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACw.desc=§6Desh伺服装置§r是一种用于增强战斗力的装甲改装部件，装备后可以显著提升玩家的战斗力，例如增加力量、提高采矿速度以及增强跳跃能力。

# Quest: 反物质
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGw.name=反物质
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGw.desc=§b反物质§r是一种极其危险的物质，可以通过§3回旋加速器§r或§3粒子加速器§r来制造。如果掉在地上将会引发剧烈的爆炸。反物质无法用普通的容器来储存，因此必须使用专门的§3磁约束反物质容器§r来存放它。

# Quest: 大型电弧炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHg.name=大型电弧炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAHg.desc=§3大型电弧炉§r是一种大型多方块自动化设备，它既能充当熔炉，也能实现自动化冶炼过程。这种设备对于游戏的发展进程而言至关重要，因为它是唯一一种能够利用§6沙子§r、§6燧石§r、§6玻璃纤维§r以及§6石棉§r等各种材料来生产硅的机器。%n%n要操作这台机器，既需要电力，也需要特制的§7§6电极§r。就电力而言，该机器的最大储能容量为§e2.5MHE§r，而在运行过程中每秒会消耗§e20kHE§r的能量，因此它的耗电量相当大。至于所需的电极，共有四种类型可供选择，而机器在开始运行之前必须安装三根电极。%n%n这种机器可以有两种不同的运行模式：一种是“固态模式”，这种模式的设置和使用都非常简单，非常适合用于初步的加工操作；另一种是“液态模式”——在这种模式下，机器能够像坩埚一样生产出可浇铸的熔融矿石，而且其产量也会略有增加，从而进一步提升从各种矿石中提取有价值成分的效率。

# Quest: 集成电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIA.name=集成电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIA.desc=§6集成电路板§r是第一种采用§6硅§r的电路板，被广泛应用于中期阶段机器、自动化设备、导弹以及各种小型工具中，例如§6盖革计数器§r。

# Quest: 军用级电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIw.name=军用级电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAIw.desc=§6军用级电路板§r是一种先进的电路板，用于制造更为复杂的设备，例如§3气体离心机§r。

# Quest: 电力工具
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKQ.name=电力工具
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKQ.desc=§6冲击钻§r是一种带有预设附魔与特殊功能的电动镐。这是一种非常实用的工具，它能够显著提高采矿效率。%n%n也存在对应斧头和铲子的功能的类似的电动工具。

# Quest: 钻油塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKw.name=钻油塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKw.desc=§3钻油塔§r可以从其正下方的§e油岩§r中提取§b原油§r和§6天然气§r。在接通电源后，它会开始向下钻探，直到无法继续钻进或遇到油岩为止。一旦找到油岩，它就会持续从中提取石油和天然气，直到油岩被完全开采干净为止。

# Quest: 基岩矿石处理
betterquesting.quest.AAAAAAAAAAAAAAAAAAAALA.name=基岩矿石处理
betterquesting.quest.AAAAAAAAAAAAAAAAAAAALA.desc=§e基岩矿床§r是丰富的资源来源，可以使用§3大型采矿钻机§r和§3基岩矿石处理机§r来开采这些资源。%n%n运行钻机时，每秒会消耗§e 200千HE§r的能量。%n%n在开始挖掘之前，首先必须清除覆盖在基岩矿床上的§e深层岩石§r。一种简便的方法就是使用§6采矿炸药§r来炸毁这些岩石。%n%n这种大型采矿钻机用于从矿床中开采§6基岩矿石原矿§r。这种钻机需要使用§6钻头§r才能正常工作，而钻头可以通过升级来提高其作业速度。钻头上的§e时运§r会直接影响所开采基岩矿石的质量，每增加1点时运，该钻头挖出的产物就会增加§e10%§r。%n%n基岩矿石处理机会将钻机获取的§6基岩矿石原矿§r，将其破碎成较小的块状，然后从这些块状矿石中提取不同的产品。%n在机器运行过程中产生的§a§b矿渣§r，可以通过特定的工艺处理成许多有用的产品；尤其是当这些矿渣被送入§3电解机§r进行进一步处理时，其价值会进一步提升。%n%n§6基岩矿石丰度扫描仪§r能够显示基岩矿床的成分信息。%n%n§2可以考虑为这台钻机添加节能升级芯片，因为这种升级装置仅会降低能耗，而不会影响采矿速度。此外，如果在矿石输送装置上安装效率提升升级芯片，那么它就能产出更多的资源。§r§r

# Quest: 基础石油处理
betterquesting.quest.AAAAAAAAAAAAAAAAAAAALw.name=基础石油处理
betterquesting.quest.AAAAAAAAAAAAAAAAAAAALw.desc=在可以对§b原油§r进行加工之前，必须先在§3锅炉§r中将其加热。%n%n§3炼油厂§r将热原油（或后期的§b裂化油§r）加工成四种不同的流体产品以及一种固态副产品。%n%n之后，这些流体可以通过§3分馏塔§r进行处理，从而获得各种不同的燃料，例如§b煤油§r和§b柴油§r。也可以使用§3分馏塔分隔器§r来将多个分馏塔堆叠在一起使用。%n

# Quest: 聚合物
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAOg.name=聚合物
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAOg.desc=§6聚合物§r是一种常用的基本塑料材料，被广泛应用于各种配方中。它的主要用途包括制造§3离心机§r、§3催化裂化塔§r以及§3电弧炉§r等设备。

# Quest: 催化裂化塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAOw.name=催化裂化塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAOw.desc=§3催化裂化塔§r是一种用于石油加工的大型多方块设备，它可以生产多种流体，其中就包括用于制造§6电木§r的§6芳香烃§r。

# Quest: Desh砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPA.name=Desh砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPA.desc=升级到[T3]级的§3砧§r，解锁额外配方。%n%n或者，你也可以直接用从各种建筑中收集到的§e§r§6铀-238§r来制作[T4]级的§3铀铁合金砧§r，跳过§3Desh砧§r。

# Quest: 工业锅炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPw.name=工业锅炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPw.desc=§3工业锅炉§r是一种经过升级的锅炉，其流体容量更大，而且不会发生爆炸。

# Quest: 橡胶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQA.name=橡胶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQA.desc=§6橡胶§r是许多制作配方中不可或缺的材料。它是利用从§3催化裂化塔§r中提取的§b不饱和烃§r在§3化工厂§r中制成的。%n%n§6乳胶§r是一种橡胶替代品，可在某些配方中代替普通橡胶使用。可在前期通过使用§3火力锻压机§r处理蒲公英或丛林木材制造它。

# Quest: 电木
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQQ.name=电木
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQQ.desc=§6电木§r是一种可以替代§6聚合物§r的材料，且可用于需要聚合物的配方。由于制造电木不需要使用§6煤粉§或§6氟石§r，因此其自动化生产过程比聚合物更为简单、更方便。

# Quest: 戴斯
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQg.name=戴斯
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQg.desc=§6Desh§r是一种由9种稀土金属混合而成的合金。这种合金在§3化工厂§r中通过使用§b汞§r和§b轻油§r进行固化处理和精炼来生产。Desh是一种几乎坚不可摧的材料，因此用它制成的工具也具有无限的耐久。%n%n§a§2Desh也可以使用DeshReady混合物在回转炉中制备，或者之后在矿石酸化装置中制备。%n%n在这个阶段，水银可以通过离心处理§e红石矿§r或用§3复式炼焦炉§r处理§e朱砂§r获得. 大型朱砂矿脉通常以深层矿石的形式存在。%n%n在后期，可以通过在§3电解机§r中处理§b洗矿废水§r或§b硫酸盐溶液§r来获取水银。

# Quest: 工业汽轮机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARA.name=工业汽轮机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARA.desc=§3工业汽轮机§r是一种多方块设备，其规模和性能都远远优于普通的§3汽轮机§r。该汽轮机的蒸汽利用效率高达§e100%§r，当有蒸汽供应时，其能量输出会逐渐增加；而当蒸汽供应停止后，能量输出则会慢慢下降。

# Quest: 焦化装置
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARQ.name=焦化装置
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARQ.desc=§3焦化装置§r是一种能够将石油产品转化为§6石油焦炭§r的设备。这种石油焦炭与其他类型的焦炭具有相同的性质，同时该装置还会产生一些额外的流体副产品。与§3坩埚§r类似，焦化装置在运行过程中也需要外部热源来提供能量。%n%n§2与电弧炉一样，炼焦装置也是该游戏中污染最严重的设备之一。它每秒钟会释放20单位的烟尘，因此如果在异虫巢穴附近使用这种设备，将会带来严重的危险。§r

# Quest: 辅助冷却塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASA.name=辅助冷却塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASA.desc=§3辅助冷却塔§r是一种规模更大的蒸汽冷凝器，能够以高达50mb/t的速率处理§b低压蒸汽§r。

# Quest: 精炼石化电力来源
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASw.name=精炼石化电力来源
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASw.desc=石油加工产品可以燃烧，从而产生大量能量。%n%n§3工业内燃机§r通过燃烧§b燃油§r或§b柴油§r等燃料来产生能量。内燃机需要多种不同的活塞组才能正常运转，而这些活塞组会对不同燃料等级的燃料的效率产生相应影响。%n%n§4§3涡扇发动机§r是最适合使用航空燃料如§b煤油§r的装置，因为它能实现§e100%§r的能效转换。在发动机运行时请勿站在其前方！%n%n§3联合循环燃气轮机§r是唯一能以§e100%§r的效率燃烧气体燃料的发电机。该发电机使用§3§b润滑油§r，并产生§b热蒸汽§r。%n%n§3高架火炬§r用于燃烧§b不饱和烃§r等气体以产生能量，同时也可用于处理多余的流体。%n%n§3流体燃烧器§r是一种更高效的利用气体发电的方式。只需在上方放置§3锅炉§r，然后让其产生的§b蒸汽§r通过汽轮机来产生能量。%n%n建议在部分噪音较大的机器上安装§6消音器§r。只需在用消音器右键点击机器即可完成安装。

# Quest: 石油钻机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATg.name=石油钻机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATg.desc=§3石油钻机§r是一种更高效的§3钻油塔§r，在1.25秒的循环时间内能提取750mb的§b原油§r，以及50到250mb不等的§b天然气§r。在完成提取作业后，该钻机耗尽一处油岩提取的石油总量平均是钻油塔的两倍。%n%n总而言之，这意味着石油钻机的采油效率是钻油塔的3倍，采油速度也是其3倍，而且两者产生的天然气量相同。

# Quest: 矿物酸化器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATw.name=矿物酸化器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATw.desc=§3矿物酸化器§r是一种非常实用的机器，可用于处理各种材料以及提高矿石的产量等。该机器依靠电力驱动，根据需要使用不同的溶剂。不过，它的能耗相当高，能耗高达§e20kHE/s§r。%n%n

# Quest: 水力压裂塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAUQ.name=水力压裂塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAUQ.desc=§3水力压裂塔§r用于从§e基岩油层§r中提取石油。该设备在运行过程中需要使用§b压裂液§r，且运作方式会对周围环境造成严重破坏。此外，产生的§6油泥§r和§6油砂§r可以用来提取§6砷§r，而砷可以作为§6铋§r的替代品。%n%n运行压裂塔需要消耗§e100kHE/s§r的能量。%n

# Quest: 离心机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAUg.name=离心机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAUg.desc=§6§3离心机§r可用于分离矿石，从而比传统的采矿方法能获得更多的物品；同时，它还能将各种物品分别分离出来。此外，离心机还被用于处理§e§6基岩矿石§r。%n%n运行离心机需要消耗§e4kHE/s§r的能量。

# Quest: 电动地下水泵
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAUw.name=电动地下水泵
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAUw.desc=§3电动地下水泵§r可以快速抽取水，在后续用于向大型储罐及反应器中注水时非常实用。使用该水泵时，其下方必须有一个尺寸为3x3的土块区域，并且该抽水机的高度必须低于Y:70，否则将无法正常工作。

# Quest: 工业固化机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAVw.name=工业固化机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAVw.desc=§3工业固化机§r是一种可用于固化各种流体的设备。

# Quest: 工业液化机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAWA.name=工业液化机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAWA.desc=§3工业液化机§是一种可用于液化各种物质的设备。它在生产圆石方面具有非常重要的作用，因此也极大地促进了§6硅§r的自动化生产。

# Quest: 储罐与桶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAXg.name=储罐与桶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAXg.desc=§3储罐§和§3桶§是实用的储存装置，能够容纳各种不同量的流体。各类储罐和桶分别用于储存腐蚀性、高温或特殊性质的流体，了解哪些储罐适合储存哪些流体，对你的流体处理和储存设施而言至关重要。%n%n储罐最多可储存256,000mb的流体，而钢桶则只能储存16,000mb。%n%n§4§2储罐无法储存高浓度的反物质和腐蚀性液体，因此需要使用巨尻-9000 储罐或磁约束反物质容器来运输这些危险物质。

# Quest: 盖革计数器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAXw.name=盖革计数器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAXw.desc=§6盖革计数器§r是一种用于测量§eRAD/s§r的设备，旨在让玩家了解潜在的辐射情况。它是§6剂量计§r的升级版本，能够检测三种类型的辐射：区块辐射、环境辐射以及玩家自身受到的辐射。%n%n它可以以两种形式使用，一种是手持，另一种是放置方块。%n%n将其存放在背包中时，屏幕左下角会显示一个计量器；在持有状态下右键点击会在聊天框显示各个辐射剂量消息。%n%n每当检测到任何形式的辐射时，它都会发出提示音，这是所有剂量计的典型功能。

# Quest: 勘测扫描仪
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAYA.name=勘测扫描仪
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAYA.desc=§6勘测扫描仪§r是一种便携式设备，能够识别地下的资源矿藏，例如§e深层岩石§r和§e基岩矿石§r。

# Quest: 核高炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAZQ.name=核高炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAZQ.desc=§3核高炉§r是一种替代传统§3高炉§r的以放射性同位素为能源的设备。它拥有6个用于放置放射性同位素燃料靶丸的插槽，运行所需最低热量为15单位。其生产效率远高于普通高炉。%n%n功率较高的靶丸具有更好的加热效果，从而提升加工速度。如果提供足够的热量，几乎可以瞬间实现合金冶炼。

# Quest: 导弹发射台
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAaw.name=导弹发射台
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAaw.desc=§3发射台§r是大多数导弹的主要发射平台。虽然它是最先可用的发射设施，但导弹在发射前必须先进行装载，因此发射会有一定的延迟。%n%n§3导弹发射台§r是发射台的微型化版本。它能够以仅5秒的延迟时间发射所有普通导弹。在天然形成的发射井结构中，可以找到一种生锈的变体，其中存放着损坏的末日导弹。

# Quest: 运输无人机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAdg.name=运输无人机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAdg.desc=§3运输无人机§r是一种用于在不同容器之间运送物品及液体的飞行器。这些无人机无需外部电源支持，且能够实现上下方向的运输。§3航路点§r则可用于为运输无人机规划更合理的行驶路线。

# Quest: 电解机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAzA.name=电解机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAzA.desc=§3电解机§r能够从流体中分离出各种元素，并对矿石进行先进的加工处理，因此它在矿物加工过程中属于一种非常重要的设备。操作这种机器需要消耗§e200kHE/s§的能量。%n%n这种电解机器具有两种模式：一种用于分离各种流体，另一种用于矿物加工。%n%n在第一种工作模式下，该机器会将输入的一种兼容的流体分离成另外两种流体。%n%n在第二种模式下，该机器能够使用硝酸来处理各种由矿物提取而成的晶体，从而实现矿物的最大利用率。该过程会产生两种产物：主要产物为熔融状态，其输出口标有绿色标记；次要产物则为物品形式，其输出口标有红色标记；此外还會产生一种副产品，这种副产品也会以物品形式被分离出来。这些产物的输出方式与使用§3坩埚§..§r进行加工时的机制是完全相同的。%n%n§2建议在电解设备上安装二级以上的节能升级芯片，因为这样可以在几乎不会影响设备运行速度的情况下显著降低能耗。%n

# Quest: 塞姆汀塑胶炸药
betterquesting.quest.D6A-to-oSe29nf5qIu4h_w.name=塞姆汀塑胶炸药
betterquesting.quest.D6A-to-oSe29nf5qIu4h_w.desc=§6Semtex§r is an explosive that is used in conjunction with C-4 in many crafts.%n%nSemtex is used in many crafts of various ammunition and mines, such as the §6Stinger missile§r, §6anti-personnel mines§r, and so on. In all crafts that use Semtex (except, of course, the Semtex block and Semtex bar, as well as the explosive reactive armor plate), it can be replaced with a C-4 bar.%n%nIt is used to create the bomb of the same name.%n%n§2Semtex can be eaten, making you feel like a real American soldier.§r

# Quest: 微芯片
betterquesting.quest.Lc9HRIDwRZa0u-M3Ze6ZiQ.name=微芯片
betterquesting.quest.Lc9HRIDwRZa0u-M3Ze6ZiQ.desc=§6微芯片§是后期电路中最重要的组成部分之一，而且在未来的发展过程中，微芯片将被大规模地应用到各种电路中。

# Quest: 动力钻
betterquesting.quest.UWNifpoeQfypMwfGniM40w.name=动力钻
betterquesting.quest.UWNifpoeQfypMwfGniM40w.desc=§6动力钻§r是一种模块化采矿设备，它能够使资源采集与挖掘工作比使用普通镐快得多。%n%n在§3武器改装台§r中，可以进行各种改装：例如更换新的钻头以扩大采矿范围，或者安装新的发动机，使其能够使用电力作为动力来源。

# Quest: 无线红石信号流体控制系统
betterquesting.quest.ZTrtIRiyRO2J5jHQ4sroaQ.name=无线红石信号流体控制系统
betterquesting.quest.ZTrtIRiyRO2J5jHQ4sroaQ.desc=§6§3无线红石信号装置§r与§3红石流体阀§r结合使用，可以检测储罐何时开始充满流体，并在此时释放流体。这样既能实现缓冲效果，又不会浪费所有流体。%n%n§2以下是一个实现当储罐只在满时才输出流体的示例：§r%n%n首先，将一个§6无线红石信号发射器§r连接到储罐的一个端口上，设置相应的ID并启用Polling轮询模式。%n%n[img height=1000]betterquesting:textures/QB_Fluid1.png[/img]%n%n之后，将一个§6无线红石逻辑接收器§r放置在流体阀门旁边，并输入所需的设置。确保信号强度大于或等于所需缓冲值。1红石信号等级相当于16k mb的流体。%n%n[img height=1000]betterquesting:textures/QB_Fluid2.png[/img]%n%n§3流量控制泵§r还可用于限制流体的流量，并设定优先级。

# Quest: 喷气背包
betterquesting.quest.l6zSmdfhSw6aTqiJsNDiHg.name=喷气背包
betterquesting.quest.l6zSmdfhSw6aTqiJsNDiHg.desc=§6喷气背包§r可以用来向上飞行。通过升级，它可以获得更多额外的功能；同时，它还可以被用作护甲的改装部件。

# Quest: 固体燃料
betterquesting.quest.l7cvDxEiTg6v1RvTk-ynTw.name=固体燃料
betterquesting.quest.l7cvDxEiTg6v1RvTk-ynTw.desc=§6Solid Fuel§r is a compact solidified petroleum product with superior burn time and heat output compared to coal. Essential for advanced furnace operations and rocket propulsion systems.

# Quest: 残忍
betterquesting.quest.nwCUMdHpQjykUlIVNW7Bcw.name=残忍
betterquesting.quest.nwCUMdHpQjykUlIVNW7Bcw.desc=卑鄙

# Quest: 传送机
betterquesting.quest.refh8r3gQyavrC4KgSeWkw.name=传送机
betterquesting.quest.refh8r3gQyavrC4KgSeWkw.desc=§3传送机§r可以用来将玩家以及各类实体传送到特定位置。%n%n用§6链接器§r右键点击方块来设置传送出口位置，然后用链接器Shift+右键点击传送机以配置传送器。%n%n§2传送器为单向传送，建议建造多个。%n%n使用传送器进行跨维度传送需要消耗极其昂贵的燃料，因此建议采用其他传送方式，比如AE2空间塔。

# Quest: Pinwheels
betterquesting.quest.t6tkjZliTEKxH0W6y39auQ.name=Pinwheels
betterquesting.quest.t6tkjZliTEKxH0W6y39auQ.desc=The §6Chlorine Pinwheel§r is a yellow propeller capable of producing chlorine indefinitely.%nAcquisition%n%nIt cannot be crafted, but can be found in structures (e.g., in a starship).%n%nThe chlorine spinner is an endless source of §bChlorine§r; to use it, simply place it in a container slot (e.g., in a barrel). The item will produce chlorine indefinitely, although the production rate is low (1 mb/t or 20 mb/s).%n%nThe §6Oxygen Pinwheel§r is analogous to the Chlorine Pinwheel, producing §bOxygen§r instead of §bChlorine§r.

# Quest: 精密装配机
betterquesting.quest.tKyjXZ3KQa6y3FLlxcC2_A.name=精密装配机
betterquesting.quest.tKyjXZ3KQa6y3FLlxcC2_A.desc=§3精密组装机§r是一种能够制造出§6蓝图册§r的机器。由于制作蓝图的成功率较低，因此建议采用自动化方式来处理各种原材料。%n%n可以通过向水中投掷§6钓鱼炸药§r来捕获河豚。

# Quest: 武器级钢
betterquesting.quest.xADm9gLETmCgiS3amOTUcQ.name=武器级钢
betterquesting.quest.xADm9gLETmCgiS3amOTUcQ.desc=§6武器级钢§r是一种通过在§3回转炉§r中进一步精炼钢铁而制成的合金。顾名思义，它专门用于制造武器和弹药。它是仅次于§6炮铜§r的更高级别的武器用合金。

# Quest: 采矿激光
betterquesting.quest.zYS6AlyFSuuMUErAJqPcTg.name=采矿激光
betterquesting.quest.zYS6AlyFSuuMUErAJqPcTg.desc=§3采矿激光§r是一种可用于快速挖掘大面积区域的激光钻机。它有§e100MHE§r的能量缓存，以及容量为64,000mB的§b原油§r流体槽。其默认的挖掘半径为3格，通过使用相应的升级芯片，这一半径还可以被进一步扩大。此外，该设备还可以安装各种功能升级芯片，从而解锁诸如粉碎或自动销毁等新功能。

# Quest Line: NTM: 反应堆
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAg.name=NTM: 反应堆
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAg.desc=随着能源需求的增加，你需要更强大的能源来源。本章介绍了核反应堆以及那些用于制造更强材料的先进设备。

# Quest: 气体离心机
betterquesting.quest.2JMb-t2STTKM5sxV5Z7WOQ.name=气体离心机
betterquesting.quest.2JMb-t2STTKM5sxV5Z7WOQ.desc=§3气体离心机§r用于对§b六氟化铀/六氟化钚§r进行离心分离，从而获得可用于制造核弹的浓缩核燃料以及反应堆用核燃料。%n%n将两台气体离心机串联使用，就可以生产出铀-238以及可用于反应堆的铀燃料。由于六氟化铀加工过程不会消耗§6硫§r和§6氟石§r，因此建议采用这种串联使用的方案。%n%n要想获得§6U-235§r，就必须为气体离心机安装§6气体离心机超频升级芯片§r。需要串联四台气体离心机，然后对其中最后一台安装超频升级芯片，这样才能得到U-235粒。%n%n按[F1]获取更多信息%n

# Quest: 核燃料处理
betterquesting.quest.7rFMNl3iSCOD-dpsKLAANQ.name=核燃料处理
betterquesting.quest.7rFMNl3iSCOD-dpsKLAANQ.desc=通过使用§3乏燃料池§r冷却在§3锆诺克斯反应堆§r、§3PWR压水堆§r等反应堆内反应完的枯竭核燃料，再进一步使用§3钚铀还原提取设备§r处理后，可以从这些枯竭核燃料中获取许多新的材料。

# Quest: 聚变反应堆
betterquesting.quest.8DXv-b9sRxalmY8yovSQuw.name=聚变反应堆
betterquesting.quest.8DXv-b9sRxalmY8yovSQuw.desc=§3聚变反应堆§r是一种大型、昂贵且技术先进的反应堆。它通过让不同类型的等离子体发生聚变来产生热量。%n%n聚变反应堆的核心装置被称为§3"环形反应器"§r，它有四个用于连接外部设备的接口。该装置运行时需要电力供应，同时还需要使用§b四氟甲烷§r进行冷却。%n%n§3速调管§r是聚变反应堆的主要反应能源供应装置。它利用电能和压缩空气来为与之相连的环形反应器提供所需的§eKyU§r能量输入。当储存的电能或压缩空气量降至§e50%§r以下时，该装置会自动降低输出功率；而如果提供的能量低于环形反应器所需的最低标准，那么反应器内的等离子体就会停止反应。%n%n不同类型的等离子体能够产生不同的有用副产品，同时产生的中子通量也有差异。这些特性有助于大量生产各种材料，比如将§6锂§r转化为§6氚§r。%n%n焊接聚变反应堆的线圈时，需要使用§6喷灯§r或§6乙炔焊罐§r。%n%n§2关于其他组件和发电方式的相关信息，请查看下面的两个任务内容。§r

# Quest: 多方块大型工厂
betterquesting.quest.8XHLo-wQRN28gu4AwCtHVQ.name=多方块大型工厂
betterquesting.quest.8XHLo-wQRN28gu4AwCtHVQ.desc=§3大型化工厂§r是§3化工厂§r的升级版本，能够并行运行4个不同的配方。它的运行速度是化工厂的两倍，但耗电量也相应增加了一倍。此外，大型化工厂需要用§b水§r作为冷却介质并产生§b低压蒸汽§r，因此建议使用封闭式水循环系统进行冷却。%n%n§3装配厂§r是§3装配机§r的升级版本，能够并行运行4个不同的配方。它的运作方式与大型化工厂类似。

# Quest: 星辉镐
betterquesting.quest.8sIzBzykSPqskvhCp-Tsmw.name=星辉镐
betterquesting.quest.8sIzBzykSPqskvhCp-Tsmw.desc=§6星辉金属镐§r可作为制作§6熔岩镐§r和§6铋镐§r的原材料；这两种镐都具有“不可破坏”的特性，并且具备多种特殊功能。此外，它们还可以用来开采§6深层岩石§r。%n

# Quest: 镉
betterquesting.quest.9BjXTD5CSTOQ-_OroVdJmg.name=镉
betterquesting.quest.9BjXTD5CSTOQ-_OroVdJmg.desc=§6镉§r是一种用于制造§6镉钢§r的原材料，而§6镉钢§r是§6锝钢§r的替代品。%n%n可通过熔炼镉粉来获取镉。镉粉可通过将10个§6芥子柳叶§r与250mb§b高性能溶剂§r在§3矿物酸化器§r中反应而得到。%n%n芥子柳是一种生长在§e基岩油层§r附近的植物。当其完全成熟后，可以获取其主要产物——芥子柳叶。

# Quest: 大功率蒸汽冷凝器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA0Q.name=大功率蒸汽冷凝器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA0Q.desc=§3大功率蒸汽冷凝器§r是一种由电力驱动的蒸汽冷凝设备，能够以60mB/t的速率处理§b低压蒸汽§r。

# Quest: “利维坦”巨型汽轮机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA1Q.name=“利维坦”巨型汽轮机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA1Q.desc=§3“利维坦”巨型汽轮机§r是一种功率强大的汽轮机，能够同时处理大量§b蒸汽§r；其处理效率仅受流体传输速度的限制。在处理原始蒸汽的能力方面，它的性能甚至超过了§3工业汽轮机§r。该汽轮机的效率只有§e85%§r，因此建议仅在规模非常大的反应堆中使用1-2台这样的汽轮机。

# Quest: RBMK石墨式反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAA.name=RBMK石墨式反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAAA.desc=§3RBMK§r是一种模块化设计的沸水裂变反应堆，其结构完全由混凝土柱体构成。这些混凝土柱体有的只是普通的结构柱，而有的则有着特定功能，比如放置燃料棒、调节中子速度，或是储存用于产生§b蒸汽§r的§b水§r。此外，相邻的混凝土柱体会相互进行热交换，从而让反应堆内各柱体之间的温度差异逐渐趋于平衡。如果某个柱体的温度上升到§e1500℃§r，那么反应堆就会发生剧烈爆炸，大量碎片和具有极高放射性的物质会向四周飞溅出去。%n%n鉴于RBMK的反应堆结构极为复杂且规模庞大，强烈建议查阅以下维基页面，因为其中包含了更多详细信息。%n%n[url]https://nucleartech.wiki/wiki/RBMK[/url]%n%n§2这项任务提供了一个可选的解决方案：可以设计出一种既便宜又安全的RBMK结构，这种结构无需冷却装置即可实现§b高性能溶剂§r§2的制备。具体操作是：将RBMK辐照通道放置在RBMK燃料棒旁边，然后给各部件安装上盖子，并用方块将它们围起来即可。

# Quest: 锝钢/镉钢
betterquesting.quest.AAAAAAAAAAAAAAAAAAAABg.name=锝钢/镉钢
betterquesting.quest.AAAAAAAAAAAAAAAAAAAABg.desc=§6锝/镉钢合金§r是一种以钢为基材、掺杂了锝-99/镉的合金材料，具有极强的耐腐蚀性。它常被用于游戏的后期阶段，同时也是制造§3核聚变反应堆§r和§3Watz反应堆§r所需的主要材料之一。

# Quest: PWR压水反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACg.name=PWR压水反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACg.desc=§2§3PWR压水反应堆§r是一种模块化裂变反应堆。与§3RBMK§r相比，它的性能和可使用的燃料种类有所限制。不过，它的安全性更高，使用起来也更为方便——因为其反应堆在发生故障时的破坏程度较小，运行状态也更加稳定。%n%n鉴于压水反应堆的复杂性及结构的庞大程度，强烈建议查阅此维基页面，因为其中包含了更多详细信息。%n%n[url]https://nucleartech.wiki/wiki/PWR[/url]%n%n§2这项任务所要求的，只是压水反应堆中不可或缺的部分组件，并不是运行一个反应堆所需要的全部组件。实际上，还有许多其他类型的压水反应堆组件也可以被使用。

# Quest: 重整油
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADQ.name=重整油
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADQ.desc=§b重整油§r是一种通过§3真空炼油厂§r加工§b原油§r，或者通过用§3加氢装置§r处理§b石脑油§r而得到的产品。%n%n§2如果使用加氢处理装置来生产喷气燃料和轻质芳烃（BTX），那么可以跳过此步骤。

# Quest: 星辉金属
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJw.name=星辉金属
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAJw.desc=§6星辉金属§r是一种独特的合金，它是通过将§6土星合金§r与§6陨石粉§r在§3高炉§r中混合冶炼而成的。

# Quest: 多功能集成电路
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKA.name=多功能集成电路
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAKA.desc=§6多功能集成电路§r是第一种使用§6铋/砷§r材料的集成电路。它被广泛应用于诸如§3真空炼油厂§r等更先进的设备中，同时也是§6多功能电路板§r的主要合成部件之一。

# Quest: 核废土清道夫勋章
betterquesting.quest.AAAAAAAAAAAAAAAAAAAALQ.name=核废土清道夫勋章
betterquesting.quest.AAAAAAAAAAAAAAAAAAAALQ.desc=在发生§3RBMK反应堆§r熔毁事故时，§6反应堆燃料块§r会被抛射到反应堆附近。而§6核废土清道夫勋章§r则是一种用于增强辐射防护能力的装备，它能够被动地减少辐射，因此在处理放射性物品或进入受辐射区域时非常有用。

# Quest: 多功能电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAMA.name=多功能电路板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAMA.desc=§6多功能电路板§r属于最高级别的电路板，其制造过程中需要使用§6铋/砷§r以及§6硬质塑料/PVC§r。此外，它也是所有电路板中最昂贵的那种：制造一块这样的电路板需要使用近55个绝缘材料。虽然这种电路板的使用频率不高，但用量却相当大——在像§3聚变反应堆§r这样的先进设备中会少量使用；而在§3ICF反应堆§r的相关部件中，则需要大量使用这种电路板。

# Quest: 硬塑料/聚氯乙烯锭
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANA.name=硬塑料/聚氯乙烯锭
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANA.desc=§6硬塑料/PVC棒是一种非常耐用的塑料材料，是制作许多后期游戏设备所必需的原料。%n%n§2这两种材料在配方中可以互相代替。

# Quest: 热解炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANg.name=热解炉
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANg.desc=§3热解炉§r是一种游戏后期的石油加工设备。使用它可以更轻松地生产出§6晶化富勒烯§r，而这种材料是制造后期游戏中各种机器所必需的原料。%n%n它可以通过添加某种流体来处理物品，从而产出另一种物品和/或新的流体。从功能上看，它的运作方式与§3复式炼焦炉§r类似，主要用于处理基岩矿石。%n不过，它的主要用途还是用于生产富勒烯。它能将§6焦油§r转化为§6细烟灰§r，从而避免在烟囱赌狗运的情况。%n%n操作热解炉的能量消耗是§e200kHE/s§r。%n

# Quest: 重整气
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPg.name=重整气
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAPg.desc=§b重整气§r可用于焊接各种非常耐用的材料，同时也可用于制造§6土星合金§r。

# Quest: FEL自由电子激光器 与 激光同位素分离室
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQw.name=FEL自由电子激光器 与 激光同位素分离室
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAQw.desc=§3FEL§r，即自由电子激光器，是一种大型多方块结构装置。它需要与SILEX同位素激光分离室配合使用，为其提供配方所需的各种激光波长。%n%n一个FEL足以为5台SILEX设备提供能量。要阻挡激光只需在其路径上放置任意混凝土块即可。%n%n晶体的提供的激光波长越短，配方的运行速度就越快。%n%n§6§3SILEX同位素激光分离室§r是一种利用激光激发来从化合物或其他材料中分离出同位素及相应元素的机器。该技术可显著简化§6铀§r、§6钚§r及§6奥斯§r的提纯过程。%n%nSILEX还能从§6青金石§r中提取出§6硫§r、§6铝§r，而最重要的是还能将其转化为§6钴§r。该设备可使用§b过氧化氢§r来溶解任何需要处理的材料，即使材料呈粉末状也无妨。处理后的产物会进入右侧的收集槽中。%n%nSILEX必须放置在距离已激活的FEL至少2个方块远的地方，否则它会被熔化。

# Quest: 土星合金
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASQ.name=土星合金
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASQ.desc=§6土星合金§r是一种非常耐用、耐热且耐腐蚀的合金，常被用于制造更坚固的枪械部件。它还被用来制造§6星辉金属§r，同时也是§3Watz反应堆§r的重要组成部分。

# Quest: 重力枪
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASg.name=重力枪
betterquesting.quest.AAAAAAAAAAAAAAAAAAAASg.desc=§6重力枪§r是一种先进的工具，能够将方块抬起并抛掷出去。它特别适用于搬运那些极具危险性的方块，比如核反应堆泄漏后产生的放射性物质，或者用来投掷炸药。%n%n§2：重力炮可以在聚变反应堆的增殖反应室中进行强化处理，从而进一步提升其射程和威力。

# Quest: Sa326
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAVg.name=Sa326
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAVg.desc=§6Sa326§r是一种危险的物质，但它是制造其他物品所必需的原料，比如§6磁化钨§r和§6Sa酸铁§r。此外，它还可以用作优质的反应堆燃料。你可以通过引爆核武器对铀矿石进行辐照处理来获得这种物质；或者用更简单的方法，利用废弃在沙漠中的核电站里那些核废料桶代替核武器来制造它。%n%n§2在持有Sa326时，玩家会陷入失明状态。因此，建议使用能够同时抵御强光和辐射的防护装备。

# Quest: 进阶石油处理
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAWw.name=进阶石油处理
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAWw.desc=§3催化重整器§r是一种可选的后期游戏阶段石油加工设备。它能将某些石油产品转化为价值更高的产品。%n%n§3加氢装置§r是一种可选的后期游戏中的石油处理设备。该设备可更便捷地生产§b高硫天然气§r，同时还能将§b原油§r转化为§b脱硫原油§r。%n%n§2加氢装置的所有配方均需使用加压的液态氢气，因此必须配备压缩机。

# Quest: 联盟-FG运载火箭
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAZw.name=联盟-FG运载火箭
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAZw.desc=§3联盟-FG运载火箭§r是一种极其强大的苏联制造火箭，它是发射各类卫星的主要运载工具。这种火箭必须从规模足够大的发射平台——§3联盟号发射平台§r——上进行发射。%n%n发射需要128,000mB的§b煤油§r和§b液氧§r作为燃料，同时还需要§e750kHE§r的电力支持。按下发射按钮后，系统会进入30秒的倒计时。倒计时结束后，联盟号火箭就会发射升空。%n%n联盟号火箭除了具备将任何卫星送入轨道的能力之外，还可以被设置为货运模式，从而将各类货物运送到世界上的遥远角落。不过，显然，这种运输方式的成本极高，因此目前其实用价值并不大。%n%n联盟号火箭也是唯一能够发射§6Gerald建筑机器人§r的运载工具。%n%n§2联盟号的蓝图可以在各种建筑中找到，或者通过鲍马逊购买获得。

# Quest: 铀铁合金砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAbw.name=铀铁合金砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAbw.desc=升级到[T4]级的§3砧§r，解锁额外配方。

# Quest: 中微子透镜
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcA.name=中微子透镜
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcA.desc=§6中微子透镜§r是一种特殊的装备改良功能，它能检测并突出显示某些特殊方块，比如§e基岩矿脉§r、§6粉色原木§r以及§6亚历山大变石§r等。%n%n要让该透镜正常使用，首先必须将其与§6绘测和资源探测卫星§r连接起来，然后再利用§3装甲改装台§r将其安装到你的护甲上。%n%n§2要使其正常工作，必须先激活HUD。

# Quest: 锆诺克斯核反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcg.name=锆诺克斯核反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcg.desc=§3锆诺克斯反应堆§r是一种第一种能被制造出来的、价格最低的核反应堆。与§3PWR§r和§3RBMK§r反应堆不同，它是一种一体化的反应堆，其运行需要消耗§b水§r和§b二氧化碳§r作为反应介质。%n%n由于锆诺克斯反应堆产生的蒸汽量较少，因此可以使用单方块的§3汽轮机§r来发电，其效率约为§e85%§r。对于低功率燃料来说，使用一个§3蒸汽冷凝器§r就足够了。这样一来，使用24根§6天然铀燃料棒§r，消耗14kmB的二氧化碳后，大约可以有§e160kHE/s§r的发电效率。

# Quest: 冷却塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAdQ.name=冷却塔
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAdQ.desc=§3冷却塔§r是§3辅助冷却塔§r的升级版本，其处理能力更强，能够以高达500mB/t的速率处理低压蒸汽。

# Quest: 电离粒子
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAeA.name=电离粒子
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAeA.desc=§6电离粒子§r是§3聚变反应堆§产生的主要产物。它们被用来制造§6Sa酸铁§，同时也用于制作用于§3粒子加速器§r的一些粒子胶囊。%n%n§2利用离子凝胶，可以无限量地生成带电粒子。

# Quest: 铋
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAhw.name=铋
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAhw.desc=§6铋§r是许多高级制造配方中不可或缺的重要材料。铋可通过利用§3FEL自由电子激光器§r及§3激光同位素分离室§r处理耗尽的§3RBMK燃料棒§r获得，也可通过使用§b高性能溶剂§r处理基岩矿石获得。%n%n§6砷§r的提取需要额外使用§b矿物酸化器§r，配合高性能溶剂。

# Quest: 研究型反应堆与增殖反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAiA.name=研究型反应堆与增殖反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAiA.desc=§3研究型反应堆§r是一种非发电型反应堆，其作用是高效地反应核燃料来为§3增殖反应堆§r提供中子源。由于它没有典型的发电型反应堆所具有的主动冷却系统，因此必须将其浸入水中进行冷却。启动反应时需要使用§6镭226-铍§r或§6钚238-铍§r燃料板作为中子源，之后则可以将其取出。这种反应堆在达到§e1000°C§r时会发生爆炸，因此在使用高能燃料以及多个增殖反应堆时必须格外小心。%n%n可以使用§3反应堆遥控模块§r和§6反应堆遥感器§r来远程启动和监测反应堆。%n%n增殖反应堆利用相邻的研究型反应堆产生的中子流，将各种元素的同位素转化为更重的元素。当反应堆处于运行状态时，可以通过玻璃观察窗看到，从反应堆中央的棒状装置中发出的绿色“闪电”般的射线朝着外部的棒状装置延伸而去。

# Quest: 焊接锝钢/镉钢板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAjg.name=焊接锝钢/镉钢板
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAjg.desc=§6锝/镉钢焊接板§r是一种通过焊接制成的锝/镉钢板，它相当于铸造锝/镉钢板的焊接版本。这种钢材被广泛应用于那些需要高强度材料的场合中。%n%n§2务必建立完善的能源生产和储存设施，因为每块焊接板的电力消耗高达1200MHE。

# Quest: 巨尻-9000 储罐
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAjw.name=巨尻-9000 储罐
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAjw.desc=§3巨尻-9000 储罐§r是容量最大的流体储存容器，其最大储液量为2,048,000mB，同时还能用于储存具有强腐蚀性的液体。

# Quest: 重型磁约束储罐
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAkA.name=重型磁约束储罐
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAkA.desc=§3重型磁约束储罐§r是§3磁约束反物质容器§r的放大版本。在制造§6建筑机器人§r时，它将发挥重要作用，因为建筑机器人需要大量的§b星流浆§r。

# Quest: 真空炼油厂
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAkw.name=真空炼油厂
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAkw.desc=§3真空炼油厂§是一种能够将§b加压/脱硫后的原油§r加工成四种流体的精炼设备。在§3工业搅拌机§r中处理§b重整气§r和§b氯气§r是生产§高性能溶剂§的理想方式。%n%n§2为了将油注入真空精炼装置内，必须使用压缩机进行加压。

# Quest: 轻质芳烃
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAng.name=轻质芳烃
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAng.desc=§b轻质芳烃（BTX）§r是一种高品质、高能量的燃料，燃烧时能产生大量的能量。BTX的一个重要用途是用于制造§6晶化富勒烯§r和§6硬质塑料锭§r。BTX可以通过§3加氢装置§r来生产，但使用从§3真空炼油厂§r中提取的§b重整物§r来生产会更加经济高效。

# Quest: Watz发电厂
betterquesting.quest.AAAAAAAAAAAAAAAAAAAApg.name=Watz发电厂
betterquesting.quest.AAAAAAAAAAAAAAAAAAAApg.desc=§3Watz§r发电厂是一种能够生产§b毒泥浆§r的裂变反应堆，而§b毒泥浆§r正是制造§6CMB钢§r所必需的关键原料。虽然这种反应堆在发电方面并不强大，但可以通过多层堆叠的方式来提高泥浆的产量以及所产生的电力。%n%n如果毒泥浆的积累量达到极限，反应堆将会发生熔毁并爆炸，从而对周围大范围区域造成辐射污染，同时还会使小范围内的地区陷入放射性尘埃的笼罩之中。此外，毒泥浆还会扩散到非常广阔的区域，腐蚀它所接触到的所有方块，其破坏力与堆芯熔融物类似。

# Quest: 磁化钨
betterquesting.quest.AAAAAAAAAAAAAAAAAAAArQ.name=磁化钨
betterquesting.quest.AAAAAAAAAAAAAAAAAAAArQ.desc=§6磁化钨§r是通过在§3高炉§r中将§6Sa326§r与§6钨§r结合而制成的产品。在§e陨石地牢§r中，也偶尔会有赛博螃蟹掉落这种物品。

# Quest: Sa酸铁
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAuA.name=Sa酸铁
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAuA.desc=§6Sa酸铁§r是一种由§6铁§r、§6电离粒子§以及§6Sa326§r组成的合金。

# Quest: 固化毒泥浆砖
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAuQ.name=固化毒泥浆砖
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAuQ.desc=§6毒泥浆§r是§3Watz反应堆§r的副产品，经过固化后可以用于在§3坩埚§r中制造§6CMB钢§r。

# Quest: CMB钢
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAug.name=CMB钢
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAug.desc=§6CMB钢§r是一种由§6有毒泥浆§r和§6磁化钨§r在§3坩埚§r中熔合而成的合金。这种合金被用于终局设备中，例如§3ICF§r和§3DFC§r。

# Quest: 晶化富勒烯
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAww.name=晶化富勒烯
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAww.desc=§6晶化富勒烯§r是一种主要应用于末期阶段机器中的材料，例如§3ICF反应堆§r和§3FEnSU§r。%n%n§2建议在酸化器上安装三级绿色机器升级，以降低消耗富勒烯的概率。因为大量生产富勒烯的成本相当高昂。

# Quest: 高性能溶剂
betterquesting.quest.AAAAAAAAAAAAAAAAAAABPQ.name=高性能溶剂
betterquesting.quest.AAAAAAAAAAAAAAAAAAABPQ.desc=§b高性能溶剂§r是一种用于§3矿石酸化器§r中的溶剂，它能有效提高基岩矿石的开采效率，也可被应用于其他各种工艺流程中。这种溶剂可以通过在§3真空炼油厂§r中得到的§b重整气§r和§b氯§r在§3工业搅拌机§r中进行反应来制造；此外，也可以通过§3RBMK反应堆辐照通道§r获取。%n%n若要人工搬运高性能溶剂，就需要使用§6危险品储罐§r。%n%n§2：由RBMK反应堆辐照通道辐照处理所得到的高性能溶剂，需要使用矿石酸化器来进行处理。

# Quest: 辐射能量发电机
betterquesting.quest.AAAAAAAAAAAAAAAAAAABeA.name=辐射能量发电机
betterquesting.quest.AAAAAAAAAAAAAAAAAAABeA.desc=§3辐射能量发电机§r能够将核废料转化为衰变废料，同时在此过程中产生能量，并确保衰变时间始终如一。%n%n§2其蓝图可以在各种建筑中找到，或者从鲍马逊那里购买。

# Quest: 由PWR反应堆供能的钢炉
betterquesting.quest.CYbDJkRORT-LPEInaoL3BQ.name=由PWR反应堆供能的钢炉
betterquesting.quest.CYbDJkRORT-LPEInaoL3BQ.desc=§b热冷却液§r除了来发电，还可以利用它让§3钢炉§r以惊人的速度运转。

# Quest: 铀-238
betterquesting.quest.CYtQLn_VSx2QTnLEwpMGOw.name=铀-238
betterquesting.quest.CYtQLn_VSx2QTnLEwpMGOw.desc=§6铀-238§是游戏中最常见的铀同位素。%n%n这种材料具有多种用途，包括：用于制造§6铀铁合金§r、MOX燃料、贫化铀弹药，以及作为§3Watz发电厂§r中的吸收剂颗粒；此外，在§3辐照舱§r中，这种材料还可以被进一步加工成§6Sa326§r。

# Quest: 额外的聚变附件
betterquesting.quest.JpsvBP1yQsu-XtkeZegA6A.name=额外的聚变附件
betterquesting.quest.JpsvBP1yQsu-XtkeZegA6A.desc=§3聚变反应堆等离子体耦合器§r能将环形反应器中的等离子体所释放的§eTU§r能量转化为§eKyU§r能量，这些能量随后可被用来为另一个环形反应器提供动力。某些聚变反应必须使用这种装置，因为引发这些等离子体反应所需的最低§eKyU§r能量超出了四台§3速调管§r最多所能提供的能量。%n%n§3聚变反应堆增殖舱§r利用环形反应器中的中子流来处理材料。它能够执行§3RBMK辐照通道§r的所有配方，同时还具备一些额外的配方。中子流不受端口共享规则的影响，且各侧的输出强度相同。%n%n§3聚变反应堆收集室§r使反应副产品的产生率提高了§e50%%§r。

# Quest: High-Performance Solvent Bedrock Ore Processing
betterquesting.quest.QusK-8T-TGmBWETwmxosJQ.name=High-Performance Solvent Bedrock Ore Processing
betterquesting.quest.QusK-8T-TGmBWETwmxosJQ.desc=§bHigh-Performance Solvent§r is the best tier of solvent which can be used in bedrock ore processing, yielding many rare materials such as§6 Bismuth§r and §6Technetium-99§r.%n%n§2These materials are not available from earth bedrock ores.

# Quest: 聚变发电
betterquesting.quest.WS2zNdGdTnmclQfj2ARCog.name=聚变发电
betterquesting.quest.WS2zNdGdTnmclQfj2ARCog.desc=§3聚变反应堆锅炉§r是利用聚变反应堆发电的最简单方法，它产生的§超密蒸汽§r可以用于驱动常规汽轮机。%n%n由于使用了等离子体能量，磁流体涡轮发电机和锅炉都受到聚变反应堆环状结构端口共享规则的影响。也就是说，当连接多个磁流体涡轮发电机或锅炉时，每台涡轮机或锅炉获得的能量会减少，但从聚变反应堆环状结构中提取的能量总量会增加。%n

# Quest: 裂变材料
betterquesting.quest.X6nUcp16QUqawLXQTqFTBw.name=裂变材料
betterquesting.quest.X6nUcp16QUqawLXQTqFTBw.desc=通过从§3气体离心机§r或核燃料处理过程中获取的裂变材料，就可以制造出核弹。

# Quest: RBMK反应堆核燃料处理
betterquesting.quest.a0YRGBjSTGiD09r4LqD8EA.name=RBMK反应堆核燃料处理
betterquesting.quest.a0YRGBjSTGiD09r4LqD8EA.desc=通过使用§3核废料处理桶§r，再加上§3激光同位素分离室§r，§3RBMK§r反应堆内使用过的核燃料可以被加工成许多新的材料。

# Quest: 核废料处理桶
betterquesting.quest.eadYFbwuQTS39P9cW-D-Fw.name=核废料处理桶
betterquesting.quest.eadYFbwuQTS39P9cW-D-Fw.desc=§3核废料处理桶§r用于对§3RBMK反应堆§r的核废料进行衰变处理。经过衰变处理后的核废料，可以通过§3FEL自由电子激光器§r及§3激光同位素分离室§r提取出一些稀有元素，例如§6铋§r。%n%n§2当桶内装有燃料时，它也会释放辐射。

# Quest: 钚铀还原提取设备（PUREX）
betterquesting.quest.g3S9-75wTGyQKmZaQTZl5Q.name=钚铀还原提取设备（PUREX）
betterquesting.quest.g3S9-75wTGyQKmZaQTZl5Q.desc=§3钚铀还原提取设备§r是一种能够将枯竭核燃料重新加工成各种材料的设备。大多数配方都需要同时使用§b硝酸§r和§b煤油§r才能运行。%n%n§6Sa326§r元素也可以从某些配方中提取出来，这些配方需要使用§bSa酸§r。通过这些配方提取出的Sa326的数量，是用于制造这种酸所使用的Sa326数量的两倍。

# Quest: 芝加哥反应堆
betterquesting.quest.g8IVppPpTceY55PbNbceJQ.name=芝加哥反应堆
betterquesting.quest.g8IVppPpTceY55PbNbceJQ.desc=§3芝加哥反应堆§r是一种设计用于早期阶段的简易增殖反应堆，其目的是生产可用于反应堆燃料的钚。%n%n这种反应堆的结构是由经过钻孔处理的§6石墨块§r构成的，它可以用来放入各种物品，包括放射性同位素棒（如§6铀棒§r、§6镭棒§r、§6钚棒§r）、§6锂棒§r以及控制棒。这种堆结构并不是作为一个整体来运行的，而是其中每一块钻孔石墨都会根据其所容纳的特定物品，以独特的方式与其他石墨块发生相互作用。%n%n在接收到足够的中子通量后，芝加哥反应堆中的铀棒会发生转变，变成钚棒；这些钚棒可以在专用设备中被加工成可用于其他反应堆的钚材料，例如§3锆诺克斯核反应堆§r和§3RBMK反应堆§r。%n%n芝加哥试验堆需要使用大量的石墨块，这些石墨块在放置后，可以通过手钻进行钻孔，以便将各种棒材插入其中。%n%n§6手钻§r可以用来在石墨材料上钻孔，或者采集铀燃料的芯样，从而测定其热性质、耗竭程度以及中子通量。而§6螺丝刀§r则用于取出那些铀燃料棒。%n%n这个任务要求制作一个尺寸为3x3的芝加哥反应堆（不包括四个角），在反应堆的中心放置一根§6镭226-铍中子源§r，周围再环绕着插入铀棒。

# Quest: 乏燃料池
betterquesting.quest.har7pEFcSRKNgIf4NgmcLA.name=乏燃料池
betterquesting.quest.har7pEFcSRKNgIf4NgmcLA.desc=§3乏燃料池§r用于为从§3RBMK反应堆§r、§3锆诺克斯反应堆§r以及§3PWR压水堆§r中取出的高温核燃料棒进行冷却。该燃料池共有12个物品槽。%n%n该设备至少需要有一侧与§b水§r接触，才能正常工作。接触水的侧面越多，内部的燃料冷却速度就会越快。

# Quest: 锝-99
betterquesting.quest.iJiX7wxoSBmljc9tITqIqQ.name=锝-99
betterquesting.quest.iJiX7wxoSBmljc9tITqIqQ.desc=§6锝-99§是§6铀§r和§6钚§r裂变过程中产生的常见副产品。它主要用于制造§6锝钢§以及§dAE2的储存组件§r。

# Quest: 卫星发射
betterquesting.quest.ocylWycmSd6r-mvYENYGEw.name=卫星发射
betterquesting.quest.ocylWycmSd6r-mvYENYGEw.desc=Satelites in NTM space can be launched from either a Souyz or a custom rocket.

# Quest: 换热加热器
betterquesting.quest.rRJfZe74TXqpP-q2faX7bA.name=换热加热器
betterquesting.quest.rRJfZe74TXqpP-q2faX7bA.desc=§4§3换热加热器§r用于冷却反应堆中的冷却剂，同时还能产生§e热量TU§r。可以在其上方安装一台§3大型锅炉§r来加热其他流体（例如§b蒸汽§r），以供§3汽轮机§r等设备使用。

# Quest: 核弹
betterquesting.quest.sCe8OyBsQEeMrUpYXUn9Yw.name=核弹
betterquesting.quest.sCe8OyBsQEeMrUpYXUn9Yw.desc=只要能够获得用于制造§6控制单元§r和可裂变材料的§6钽§r材料，就足以制造出核弹。引爆核弹时，可以使用起爆器或红石信号来触发爆炸。%n%n核爆炸能将各种矿石转化为更有价值的物质，比如把§6煤炭§r转化为§6钻石§r，或者把§6铀§r转化为§6Sa326§r。在进入原爆点弹坑之前，务必准备好能够抵御辐射的防护装备。%n%n如果你想近距离观看爆炸场面，一定要站在坚固的掩体后面。%n%n§2此任务列出了制造各种炸弹所需的各类组件。其中一些组件可以被安装在可实现远距离投送火力的火箭上。

# Quest: 砷
betterquesting.quest.tgpCNtEfScSyk-mdGhGxmQ.name=砷
betterquesting.quest.tgpCNtEfScSyk-mdGhGxmQ.desc=§6砷§r是§6铋§r的替代品。它可通过使用§b高性能溶剂§r酸化那些位于基岩油层附近或者利用§3水力压裂塔§r在作业过程中产生的§6油泥§r来提取。

# Quest: 氘萃取塔
betterquesting.quest.yYyMBFJrRUOt39If3zFaFg.name=氘萃取塔
betterquesting.quest.yYyMBFJrRUOt39If3zFaFg.desc=§3氘萃取塔§r是一种规模更大的氘提取装置，因此它是为§b§r§3聚变反应堆§r提供廉价燃料的理想选择。%n%n§2需要使用铀铁合金砧制造。§r

# Quest Line: LV3.5 - 太空时代
betterquesting.questline.enTskTtvRdajee3UMSgXKg.name=LV3.5 - 太空时代
betterquesting.questline.enTskTtvRdajee3UMSgXKg.desc=Explore Space and colonise planets. This chapter revolves around the content of NTM\: Space.

# Quest: Duna
betterquesting.quest.-aAyklEkSHK7wGxEEzQJ9Q.name=Duna
betterquesting.quest.-aAyklEkSHK7wGxEEzQJ9Q.desc=The red planet, home to vast quantities of §6Iron§r. §6Molysite§r and §6Volcano Gems§r can be found here in basaltic caves, found within basins where vast oceans were theorized to once exist.

# Quest: CMB钢插板
betterquesting.quest.3fvMK3HASiaG4E0wg7MTrA.name=CMB钢插板
betterquesting.quest.3fvMK3HASiaG4E0wg7MTrA.desc=§6CMB Iserts§r are an armor modification which will protect its user from the corrosive atmosphere of §eEve§r. %n%nThe §3Gas Giant Harvester§r will return back with §bJool Air§r, to be processed by the §3Cryogenic Distillation Machine§r.

# Quest: 工业温室
betterquesting.quest.4HLGI5HyQtSw1G-iuwI0kg.name=工业温室
betterquesting.quest.4HLGI5HyQtSw1G-iuwI0kg.desc=The §3Industrial Greenhouse§r converts §bCarbon Dioxide§r into §bOxygen§r via crop growth. The greenhouse can also be supplied with §6Fertilizer§r for faster growing.

# Quest: 低温分馏机
betterquesting.quest.7kkbpR6rS4CsUTUFQ5wd7g.name=低温分馏机
betterquesting.quest.7kkbpR6rS4CsUTUFQ5wd7g.desc=The §3Cryogenic Distillation Machine§r can split atmospheric gases into 4 useful fractions, like for example, taking trace amounts of §bNitrogen§r out of the Dunaian atmosphere to produce soil for planting crops.

# Quest: 传送机
betterquesting.quest.8j7JCxPeSaaBqlOTrRGtCg.name=传送机
betterquesting.quest.8j7JCxPeSaaBqlOTrRGtCg.desc=§3传送机§r可以用来将玩家以及各类实体传送到特定位置。%n%n用§6链接器§r右键点击方块来设置传送出口位置，然后用链接器Shift+右键点击传送机以配置传送器。%n%n§2传送器为单向传送，建议建造多个。%n%n使用传送器进行跨维度传送需要消耗极其昂贵的燃料，因此建议采用其他传送方式，比如AE2空间塔。

# Quest: 偶尔使用的重靴
betterquesting.quest.9S1Tw8UTRbi8Z9wq7frVJA.name=偶尔使用的重靴
betterquesting.quest.9S1Tw8UTRbi8Z9wq7frVJA.desc=Temporarily increases gravity on low gravity worlds when holding crouch.

# Quest: 散热器
betterquesting.quest.AB-0K2UoQF-7uQ9XiO8mqw.name=散热器
betterquesting.quest.AB-0K2UoQF-7uQ9XiO8mqw.desc=The §3Steam Radiator§r is a steam condenser that works in the vacuum of space.

# Quest: 构造导弹
betterquesting.quest.CRR3Op6SQMefJL6r8uAfrA.name=构造导弹
betterquesting.quest.CRR3Op6SQMefJL6r8uAfrA.desc=When a §6Tectonic Missile§r hits, it creates a volcano that immediately starts to splash volcanic lava everywhere. Which is what you need to get the volcanic gem!

# Quest: 砷化镓
betterquesting.quest.DeOqQyXwQRq5RNcDa5l0ug.name=砷化镓
betterquesting.quest.DeOqQyXwQRq5RNcDa5l0ug.desc=§6Gallium Arsenide§r is made from mixing §6Gallium§r, which can be procured by processing rich mineral deposits from §eMoho§r or §eIke§r, and §6Arsenic§r which is found on Ike in bedrock ore, or on §eEarth§r via dirt and stone that has been damaged by hydraulic fracking.

# Quest: 气体巨行星大气采集器
betterquesting.quest.EE3856t_QVu_cAG6P033_Q.name=气体巨行星大气采集器
betterquesting.quest.EE3856t_QVu_cAG6P033_Q.desc=The §3Gas Giant Harvester Station§r is a device for collecting atmospheric air samples from gas giants.%n%nThe concept is quite simple: on a planet that is a satellite of the giant (for example, to fly to the green giant Jool, you need to go to Laythe), the station is set up. After refueling with §bLiquid Oxygen§r and §bHydrogen§r, the §3harvester rocket§r is sent for air. In one trip, it delivers 16,000 mB§r. As you can understand, the harvester's§r functionality is completely analogous to the operation of §3MiningModules§r.

# Quest: !?月牛?!
betterquesting.quest.EVr_kBsgS2Wb6Knw0wuihw.name=!?月牛?!
betterquesting.quest.EVr_kBsgS2Wb6Knw0wuihw.desc=This is something new; don't ask questions like how a cow survives on the Mun without food or where it got a PLSS module. The fact is, they feel quite well on the Mun, and due to the vacuum, the milk inside them has curdled.

# Quest: 真空焊接台
betterquesting.quest.G3Em4SXiQee1Yu-Rd0yGaA.name=真空焊接台
betterquesting.quest.G3Em4SXiQee1Yu-Rd0yGaA.desc=The §3Vacuum Solderer§r is a machine that can only function in a vacuum, and produces vacuum circuits. They can be placed into the §3Drive Processor§r to enable it to process higher tier planetary drives.

# Quest: Space Equipment
betterquesting.quest.HvPzivF4SWWIDt5syO87xA.name=Space Equipment
betterquesting.quest.HvPzivF4SWWIDt5syO87xA.desc=The §6PLSS§r is an armor modification which will allow you to breathe in space. It will only work on airtight sealed suits.%n%nThe §6Heavy Boots§r can be used to quickly descend down in low-gravity environments.

# Quest: Ike
betterquesting.quest.KItM5UOCSNmCMNKnohadaQ.name=Ike
betterquesting.quest.KItM5UOCSNmCMNKnohadaQ.desc=§eIke§r, the sole moon of §eDuna§r, has hints of a past as a significant hazardous waste dump, with large spires and pyramids reminiscent of potential designs on Earth for warning future civilizations of great danger in relation to nuclear waste. §eMeteor dungeons§r spawn more frequently here, and pools of §bAlkyl Bromide§r can be found on the surface.%n

# Quest: Armospheric Liquefaction Tower
betterquesting.quest.KQqx-tttRfG2DNO4tLbSCw.name=Armospheric Liquefaction Tower
betterquesting.quest.KQqx-tttRfG2DNO4tLbSCw.desc=The Air Liquefaction Tower is intended for obtaining liquid nitrogen from compressed air.

# Quest: 三阶驱动处理器
betterquesting.quest.LKTbDe35Rte7XOisZoywOQ.name=三阶驱动处理器
betterquesting.quest.LKTbDe35Rte7XOisZoywOQ.desc=The §3Drive Processor Tier 3§r allows for travel to §eLaythe§r.

# Quest: Atmospheric Scanner
betterquesting.quest.MqqnLpS-RLK6oNw12wzI7Q.name=Atmospheric Scanner
betterquesting.quest.MqqnLpS-RLK6oNw12wzI7Q.desc=The §6Atmospheric Scanner§r shows the atmospheric consistency of planets. Useful for when terraforming.

# Quest: 移动轨道空间站
betterquesting.quest.NBDAp_kvThGG5C4yE0SiPA.name=移动轨道空间站
betterquesting.quest.NBDAp_kvThGG5C4yE0SiPA.desc=By having an orbital station have an §3Orbital Station Computer§r and §3Drop Pods§r, one can move their station to any destination they wish, massively cutting down on material costs needed to make new rockets.

# Quest: 复用式返回舱
betterquesting.quest.Ou1Dd0LTTgqox9lIWWOLNg.name=复用式返回舱
betterquesting.quest.Ou1Dd0LTTgqox9lIWWOLNg.desc=With a §3Drop pod§r, one can access their space station without needing to build new rockets. They can also be used to land on other planets once the station has reached them.%n%n§2Make sure to keep spare drives.§r

# Quest: 不锈钢
betterquesting.quest.Q0hC3CjIR4GB7MtYPpxXgA.name=不锈钢
betterquesting.quest.Q0hC3CjIR4GB7MtYPpxXgA.desc=§6Stainless Steel§r is an alloy made of §6Steel§r and §6Nickel§r.

# Quest: 二阶驱动处理器
betterquesting.quest.QVJAi3JOR5in6VwMOEyL6w.name=二阶驱动处理器
betterquesting.quest.QVJAi3JOR5in6VwMOEyL6w.desc=The §3Drive Processor Tier 2§r allows for travel to §eDres§r and §eEve§r.

# Quest: Jool
betterquesting.quest.Rln_1bNXSHmwrz3lNURhwA.name=Jool
betterquesting.quest.Rln_1bNXSHmwrz3lNURhwA.desc=Jool is a gas giant planet with Laythe and two other small unnamed planets orbiting it.%n%nAs is logical, landing on a gas giant is impossible, but this doesn't prevent us from gathering resources from this giant.%n%n§2Jool's atmosphere consists of §bHelium-3§r §2(25%%), §bLiquid Hydrogen§r §2(25%%), §bChlorine§r §2(20%%), and §bNeon§r §2(12%%). To collect all these gases, we will need a §3Harvester§r.§r

# Quest: Hafnium
betterquesting.quest.S0AQWdCYSeiUnhi2CmLszA.name=Hafnium
betterquesting.quest.S0AQWdCYSeiUnhi2CmLszA.desc=§6Hafnium§r is a rare light metal needed to produce the §6Hafnium chips§r, which at this stage in progression can only be obtained by centrifuging niobium crystals, which must be created from niobium ore, only found on §eDres§r and §eEve§r.

# Quest: Mun/Minmus
betterquesting.quest.SyNchvx5TpG6S7lF4jtiOA.name=Mun/Minmus
betterquesting.quest.SyNchvx5TpG6S7lF4jtiOA.desc=Your first destination! Absolutely chock full of §6Lithium§r, §6Quartz§r and most importantly your first source of §6Nickel§r to start producing §6Stainless Steel§r for space-grade machinery. The §eMun§r is the first atmosphere-less body available in a regular playthrough, necessary for making the first tier of §6Drive Processors§r in the §3Vacuum Solderer§r.%n%nThe B-Side destination alternative to the Mun, §eMinmus§r is characterized by a distinctive mint-choc-chip ice-cream aesthetic. §3Pumps§r function here, but instead of producing §bWater§r, this moon bizarrely produces §bMilk§r, allowing for full automation of §6Butter§r, §6Milkshakes§r and §6Ice-Cream§r.

# Quest: Laythe
betterquesting.quest.Tz9bzhSZQLGbAIEh4Zckbg.name=Laythe
betterquesting.quest.Tz9bzhSZQLGbAIEh4Zckbg.desc=A beautiful water world, teeming with life, oceans lit up with fields of glowgrass. §bJool gas§r can be harvested from here using a §3Gas Giant Harvester§r.

# Quest: 一阶驱动处理器
betterquesting.quest.VetSLWDYS8OTb7T4X9aAEw.name=一阶驱动处理器
betterquesting.quest.VetSLWDYS8OTb7T4X9aAEw.desc=§3Drive Processor Tier 1§r allows for travel to §eDuna§r, §eDres§r and §eMoho§r.

# Quest: Brine Processing
betterquesting.quest.WRZqHx4ZRia4S1zEWYFg-Q.name=Brine Processing
betterquesting.quest.WRZqHx4ZRia4S1zEWYFg-Q.desc=§bBrine§r, which is found in deposits similar to oil ones on earth, can be processed to obtain materials such as §6Nickel§r, §6Copper§r and §6Sulfur§r, and fluids such as §bHydrogen§r and §bOxygen§r.

# Quest: Rocket Preparations
betterquesting.quest.XFyuo3SLQbmHtU7FcYdZ1g.name=Rocket Preparations
betterquesting.quest.XFyuo3SLQbmHtU7FcYdZ1g.desc=Due to the expansive nature of rocket assembly, it is highly recommend that the wiki is checked out as it provides more information.%n%n[url]https://nucleartech.wiki/wiki/Vehicle_Assembly_Base_(NTM:_Space)[/url]

# Quest: The Mun is Cheese...
betterquesting.quest.XzMOPvBIS9uEkD5JEXBvUw.name=The Mun is Cheese...
betterquesting.quest.XzMOPvBIS9uEkD5JEXBvUw.desc=When a century-old joke gets out of hand... At least you can make a juicy quesadilla.

# Quest: 二氧化碳洗涤器
betterquesting.quest.Z-fgT88oSuSYcPPLotHREg.name=二氧化碳洗涤器
betterquesting.quest.Z-fgT88oSuSYcPPLotHREg.desc=The §3CO2 Scrubber§r is a mechanism for cleaning air in sealed environments under increased pressure.%n%nThe device absorbs §bCarbon Dioxide§r from the surrounding air and collects it. It only works if two conditions are met: the room is sealed and isolated, and the air pressure is elevated (above 1.0 atm). The latter can be achieved by adding a stream of §bOxygen§r from the ventilation to the Earth's air (resulting in a total pressure of 1.1 atm).%n%n§2The maximum number of scrubbers in a room is 5; any additional units placed will not collect carbon dioxide.§r

# Quest: 轨道空间站
betterquesting.quest.ZPHsRbLaQm60QluCeA8pVQ.name=轨道空间站
betterquesting.quest.ZPHsRbLaQm60QluCeA8pVQ.desc=The §3Orbital Station§r is a space station which is located at the orbit of §eEarth§r. §3Solar Panels§r in combination with §3Air Vents§r can be used to make a sustainable living environment in the station. Make sure to make airlocks to minimise air loss.

# Quest: Stardar and Drive Processor
betterquesting.quest.ZPfHiJvPQIutgvhSROlbeQ.name=Stardar and Drive Processor
betterquesting.quest.ZPfHiJvPQIutgvhSROlbeQ.desc=The §3StarDar§r is your base of operations for mission planning, helping you to locate and scan potential landing zones on planets, and §6Program Drives§r that can be inserted into your rocket's astronavigational systems to make journeys to said planets.%n%nThe §3Drive Processor§r processes drives that have been programmed by the StarDar, allowing them to be inserted into rocket navigation computers.

# Quest: 大气压缩机
betterquesting.quest.aZBaZGfVRHeXWmLqDHjuUw.name=大气压缩机
betterquesting.quest.aZBaZGfVRHeXWmLqDHjuUw.desc=The §3Atmospheric Compressor§r collects air from different planets. In combination with a §3Cryogenic Distillation Machine§r it can produce many useful fluids and gasses.

# Quest: 太阳能板
betterquesting.quest.dVwxKlQ5SzaxZjGNcLFMEw.name=太阳能板
betterquesting.quest.dVwxKlQ5SzaxZjGNcLFMEw.desc=The §3Solar Panel§r converts sunlight into §eelectricity§r. §2(Incredible)§r%n%nIt can operate on planet surfaces or in space. The device uses the general light level, so the panel's spatial orientation does not affect energy production. The energy output port is at the back.%n%n§2Energy production calculations for planets and their orbits:%n%nKerbin - §e2kHE/s§2%nMun - §e2kHE/s§2%nMinmus - §e2kHE/s§2%nDuna - §e880HE/s§2%nIke - §e880HE/s§2%nMoho - §e13.3kHE/s§2%nDres - §e240HE/s§2%nEve - §e3.84kHE/s§2%nLaythe - §e80HE/s§r

# Quest: Space Map
betterquesting.quest.eItNlZ6bRS2kA-0Ymm_pdA.name=Space Map
betterquesting.quest.eItNlZ6bRS2kA-0Ymm_pdA.desc=Here is my own (Bufka2011) map of our Kerbol system!%n[img height=300]resources:SpaceMap_by_Bufka2011.png[/img]

# Quest: 熔岩开采钻
betterquesting.quest.gaeSExcOTaawSPifbbIVtg.name=熔岩开采钻
betterquesting.quest.gaeSExcOTaawSPifbbIVtg.desc=Unlike its counterpart from the original mod, the Magma Drill does not literally drill into the depths. It is designed for extracting magma from Moho, which, as known, is abundant on this planet both on the surface and in caves. To start working, the mechanism must be installed directly on the surface of a lava lake so that the lava touches the drill head and reaches the edges of the recess. Supply power to the drill, and it will operate automatically.%n%nMagma is output through casting channels into molds. Cooled magma forms Vulcanite, which should then be processed to obtain useful resources.%n%nIn addition to volcanite, the device extracts regular slag (much more than Vulcanite).

# Quest: 轨道空间站电脑
betterquesting.quest.hG3STfQVT8uxD0PMB58DOQ.name=轨道空间站电脑
betterquesting.quest.hG3STfQVT8uxD0PMB58DOQ.desc=The §3Orbital Station Computer§r, when having a drive inserted into it, can move the station to its destination.%n%n§3Thrusters§r with fuel are required to be attached to the station.

# Quest: 烷基化单元
betterquesting.quest.icj9Y8q0QiWjFk2g7dTnww.name=烷基化单元
betterquesting.quest.icj9Y8q0QiWjFk2g7dTnww.desc=The §3Alkylation Unit§r is designed to convert lighter hydrocarbons into useful heavier hydrocarbon products. From §bNatural Gas§r it can produce §bUnsaturated§r and §bAromatic hydrocarbons§r, commonly used for §6Rubber§r and §6Bakelite§r, and even produce §bBTX§r via the use of §bHigh-Performance Solvent§r. As a utility, it can also alkylate §bPetroleum Gas§r into §bLight Oil§r.

# Quest: 微重力藻类透膜过滤器
betterquesting.quest.nfgxBE2jRE2InE-vMVEfRQ.name=微重力藻类透膜过滤器
betterquesting.quest.nfgxBE2jRE2InE-vMVEfRQ.desc=The §3Microgravity Algae Film§r is a machine is made of specialized layers of laythe plants that will convert §bCarbon Dioxide§r directly into §bLiquid Oxygen§r. They however only function when in orbit.%n%nThe §3CO2 Scrubber§r allows you to recover carbon dioxide from a pressurized room. This is occasionally useful when building space stations.

# Quest: Dres
betterquesting.quest.rkMKa7TCT5u0jJsdH6TWnw.name=Dres
betterquesting.quest.rkMKa7TCT5u0jJsdH6TWnw.desc=This planet has some of the most prized resources in the whole system, with even the primary fraction of bedrock ore consisting of incredibly valuable metals and materials. §6Niobium§r, §6Coltan§r, and §6Lanthanium§r ore is present here in vast quantities.

# Quest: 行星雷达远程访问控制台
betterquesting.quest.seA5V2QkTCO9NcMwAjcDIA.name=行星雷达远程访问控制台
betterquesting.quest.seA5V2QkTCO9NcMwAjcDIA.desc=Enables remote access to StarDar.

# Quest: Tekto
betterquesting.quest.tryLG0jySbGKMHzTFhvWOA.name=Tekto
betterquesting.quest.tryLG0jySbGKMHzTFhvWOA.desc=A strange world, similar to §eEarth§r, where life is different because the vegetation, the only form of life there, is made of complex polymers, like rubber§r and plastic§r.%n%nTekto bedrock ore doesn’t have the non-metal variant; instead, it is replaced by the plastic variant, from which the player can obtain §6Polymer§r, §6Rubber§r, §6Semtex§r and §6PVC§r.

# Quest: 我的第一座火山！
betterquesting.quest.vTg3C5JATXuER43bG5IiiQ.name=我的第一座火山！
betterquesting.quest.vTg3C5JATXuER43bG5IiiQ.desc=The formation of a volcano is driven by the §3volcanic core§r, a block that continuously erupts §blava§r, allowing the volcano to grow. The §blava§r cools quickly, turning into §6basalt§r or §6basaltic ore§r.%n%nThe resulting volcano grows quite slowly, reaching about 60 blocks in height over 20-30 minutes.%n%n§bVolcanic lava§r differs from §bregular lava§r not only in appearance. It "melts" any non-explosion-resistant blocks, so the volcano can extend underground.%n%n§6Basaltic ores§r (§6asbestos§r, §6sulfur§r, §6fluorite§r, §6molysite§r) form when the §blava§r cools, each with a 0.5%% chance.%n%n§6Volcanic gem ore§r spawns with a 5%% chance if the following conditions are met:%n- All 6 blocks around the cooling §blava§r are §6basalt§r or §blava§r;%n- The block 10 blocks above the cooling §blava§r is §6basalt§r or §blava§r;%n- There are fewer than 3 §blava§r blocks around the cooling §blava§r.%n%nThe §6ore§r also forms after §bvolcanic lava§r contacts §6diamond ore§r.%nThis means §6volcanic gems§r most often appear near the §3core§r or §3crater§r of the volcano.%n%n§3Forming a Radioactive Volcano§r%nIf the §3volcanic core§r is exposed to radioactive fallout (e.g., after a nearby nuclear explosion) for some time, the §3core§r will begin generating new §bvolcanic radioactive lava§r (yellow in color), ultimately leading to the formation of a so-called §3radioactive volcano§r. Such a volcano will consist not of §6basalt§r but of various types of §6quenched sellaphite blocks§r and §6sellaphite ores§r. The §blava§r will convert §6diamond ores§r into §6radioactive gem ore§r.

# Quest: Eve
betterquesting.quest.vWpv_FM5QYqYHsRsaNNwog.name=Eve
betterquesting.quest.vWpv_FM5QYqYHsRsaNNwog.desc=While it is possible to travel here with only a tier 2 drive processor to exploit the incredibly powerful schrabidic resources that exist here, players will not last long without the appropriate armor inserts, due to the highly corrosive atmosphere melting any armor it comes into contact with.%n

# Quest: Rocket Assembling and Launching
betterquesting.quest.w4uLB-JtTW-fCQA_qF6_ww.name=Rocket Assembling and Launching
betterquesting.quest.w4uLB-JtTW-fCQA_qF6_ww.desc=The §3Vehicle Assembly Base§r is a structure which is one of the most vital parts of your space-faring efforts. It'll allow you to stack your rockets and plan out each segment of your journey. Note that each rocket stage allows for one launch from a celestial body to another, so a two-stage rocket can make a round-trip between, say, the Earth and the Mun.%n%nThe §3Rocket Launch Pad§r is the only launch pad capable of supporting the various fuel loads and complex requirements of the stacked rockets. This is the only way to fuel up a rocket too, so you'll want to make multiple stages for launching from bodies without a pad. The pad itself has a GUI that'll indicate what your rocket requires to be launched.

# Quest: 火山宝石
betterquesting.quest.xbXJIo86R_-J4iKK6DY-6w.name=火山宝石
betterquesting.quest.xbXJIo86R_-J4iKK6DY-6w.desc=A very valuable gemstone that is used to create a §6Cast Pickaxe§r, §6Meteorite Talisman§r, §6Black Diamond§r, §6Composite Euphemium Plates§r and §6Special 227mm Shells§r.

# Quest: 联氨
betterquesting.quest.xo0vihnyQgq8RTEi2c_ZZQ.name=联氨
betterquesting.quest.xo0vihnyQgq8RTEi2c_ZZQ.desc=§bHydrazine§r is a powerful rocket fuel which is needed to operate a §3Drop Pod§r.

# Quest: 火箭运输平台
betterquesting.quest.y2yrIQ6QRve-p9fRVJD0YA.name=火箭运输平台
betterquesting.quest.y2yrIQ6QRve-p9fRVJD0YA.desc=The §3Rocket Transporter Station§r is essential for sending and receiving cargo between celestial bodies.%n%n§3Transport rockets§r, similar to §3resource modules§r or §3Gas Giant Harvesters§r, automatically move various cargoes. To make the system work, you need at least one pair of linked platforms§r.%n%nThe platforms have compartments for outgoing and incoming items (blue and orange, respectively)§r, and they can handle liquids with §3dedicated buffers§r.%n%nTo link platforms, Shift+Right-Click with the §6Rocket Transporter Connector§r on one platform to save it, then Right-Click on another platform. To open the linker interface§r, Right-Click on a platform with the connector: it will display information about the linked platforms' locations.%n%nTo designate one of these points as the receiving point, click the button at the beginning of the row§r.%n%nTo launch the transporter rocket§r, the station must be fueled with §bliquid oxygen§r and §bhydrogen§r.

# Quest: Moho
betterquesting.quest.yWu2LtytQjGg65tFXTo2ow.name=Moho
betterquesting.quest.yWu2LtytQjGg65tFXTo2ow.desc=A fair-dinkum planet, hot as hell, and full of rare resources generally only found in the Nether. §6Australium§r is only found here, in vast quantities deep under the surface. Some of the largest caves ever generated within Minecraft can be found here.

# Quest Line: NTM: 后期流程
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAw.name=NTM: 后期流程
betterquesting.questline.AAAAAAAAAAAAAAAAAAAAAw.desc=深入探索那些看似不可能实现的物理现象、量子计算技术、魔法，甚至有可能摧毁整个世界。%n本章的内容是关于如何制造出最先进的机器，从而实现该模组的最终目标。

# Quest: ICF反应堆燃料
betterquesting.quest.2BKf-swBTG61f8eVn9ynhw.name=ICF反应堆燃料
betterquesting.quest.2BKf-swBTG61f8eVn9ynhw.desc=§3ICF反应堆§r能够在不同的激光功率水平下处理多种不同的燃料组合。要收集制造§6Gerald建筑机器人§r所需的§b星流浆§r，并产生足够的能量，可以选择§b氦-4+氢§r这种既廉价又可再生的燃料组合。%n%n将μ子粒子添加到燃料颗粒中，以降低运行该燃料颗粒所需的激光功率。

# Quest: Particle Capsules
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA8A.name=Particle Capsules
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA8A.desc=Particles are important items required to create exotic materials which are needed for most of the endgame content.

# Quest: 量子计算机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAFg.name=量子计算机
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAFg.desc=§6量子计算机§r是目前所有控制单元中功能最强大的一个，它被用于制造§6Gerald建筑机器人§r和§3DFC反应堆§r组件。

# Quest: 固态量子处理器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGA.name=固态量子处理器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAGA.desc=§6固态量子处理器§r是构建§6量子处理单元§r和§6量子计算机§r所必需的第一个量子电路相关组件。

# Quest: DFC
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANw.name=DFC
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANw.desc=§3DFC§r是hbm模组的终极反应堆，因此制造成本非常高。除了各个DFC部件外，还需要两个§6反应催化剂§r才能使反应堆工作。%n%n建议去看看这个维基页面。%n%n[url]https://nucleartech.wiki/wiki/DFC[/url]

# Quest: 鸡块
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATQ.name=鸡块
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATQ.desc=§6鸡块§r是hbm模组中最好的食物，可以完全恢复饥饿度和饱和度。它是在§3粒子加速器§r中碰撞两个生鸡肉制成的。

# Quest: 辐照舱
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAZg.name=辐照舱
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAZg.desc=§3辐照舱§r是一种机器，通过将材料暴露于某些粒子中，可以制造出许多新材料，其中最重要的是§6双聚中子态素§r。

# Quest: Ep
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_A.name=Ep
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_A.desc=§6Ep§r是一种虚构的材料，它是该mod游戏中后期阶段最重要的资源之一。这种材料的大规模生产成本极高，要想有效地利用它，你必须在该mod游戏中取得显著的进展才行。

# Quest: 双聚中子态素
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_Q.name=双聚中子态素
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_Q.desc=§6双聚中子态素§r堪称这个mod中近乎“终极”的材料。它属于最高级别的材料，其稀有程度甚至超过了§6Ep§r。这种材料极其难以制造，因此被用来打造这个mod中那些最奇特、功能最强大的物品。唯一比它更难制造的材料，恐怕就是§6铱锇合金§r了。

# Quest: 迪伽马粒子胶囊
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_g.name=迪伽马粒子胶囊
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_g.desc=§c§r§4§r迪伽马粒子§r是通过在粒子加速器中让§6Spark粒子§r与§6希格斯玻色子§r碰撞而产生的。要在粒子加速器中制造出这种粒子，需要使用§6叶绿线圈§r，并且需要具备70,000的动量。%n%n §c§r§4§r迪伽马粒子§r会释放一种单位为§4DRX§r的迪伽马辐射，目前只能通过使用专门的抗迪伽马药物来抵御这种辐射。其中最有效的药物是§65-羟色胺药丸§r，服用后可以在10分钟内完全抵抗迪伽马辐射。在搭建出§3DFC§r反应堆后，还可以制造出能够完全抵御迪伽马辐射的Fau盔甲。

# Quest: 暗黑砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_w.name=暗黑砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAAA_w.desc=§3暗黑砧§r是终极版本的§3砧§r，包含了所有可解锁的配方。

# Quest: 量子处理单元
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAbQ.name=量子处理单元
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAbQ.desc=§6量子处理单元§r是你制造出的第一个量子级电路板，它被用于§3粒子加速器§r和§3ICF反应堆§r中。

# Quest: ICF反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAig.name=ICF反应堆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAig.desc=§3ICF反应堆§r是一个非常昂贵且强大的反应堆，能够产生大量的能量。除了多方块本体外，还需要建造§3ICF激光器§r以使反应堆工作。在其运行过程中会产生星流浆§r，这是制造§bGerald建筑机器人§r所必需的。可以考虑使用§b液态铅§r作为冷却剂，因为它对ICF来说是一种非常有效的冷却剂。%n%n建议大家去看看这个维基页面，因为其中内置了计算工具，可以用来计算激光器的功耗以及所产生的热量。%n%n[url]https://nucleartech.wiki/wiki/Inertial_Confinement_Fusion_Reactor[/url]

# Quest: Spark激光晶体
betterquesting.quest.AAAAAAAAAAAAAAAAAAABBA.name=Spark激光晶体
betterquesting.quest.AAAAAAAAAAAAAAAAAAABBA.desc=§6Spark激光晶体§r可以为激光同位素分离室解锁新的合成配方，最重要的是，制造§6铱锇合金§r需要它提供的激光波长。

# Quest: 车厢书
betterquesting.quest.AAAAAAAAAAAAAAAAAAABBQ.name=车厢书
betterquesting.quest.AAAAAAAAAAAAAAAAAAABBQ.desc=§6车厢书§r是一种可以用来制作许多特殊物品的道具。它可以在世界中随机发现的§e陨石地牢§r里找到；这些地牢的入口通常由地上的骷髅头或黑色的石柱来标记；当然，你也可以在§e红房间§r里找到这本书。

# Quest: Digamma迪伽马激光晶体
betterquesting.quest.AAAAAAAAAAAAAAAAAAABBw.name=Digamma迪伽马激光晶体
betterquesting.quest.AAAAAAAAAAAAAAAAAAABBw.desc=The §6Digamma Laser Crystal§r is the fastest and final laser crystal which can be used in a SILEX.%n%n§2If the laser touches any block, the surrounding area will be atomized.

# Quest: 双聚中子态素砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAABEA.name=双聚中子态素砧
betterquesting.quest.AAAAAAAAAAAAAAAAAAABEA.desc=升级到[T7]级的§3砧§r，解锁额外配方。

# Quest: Spark奇点
betterquesting.quest.AAAAAAAAAAAAAAAAAAABFQ.name=Spark奇点
betterquesting.quest.AAAAAAAAAAAAAAAAAAABFQ.desc=§6Spark奇点§r是一种由各种类型的奇点与§6双聚中子态素§r结合而成的奇点。

# Quest: FEnSU
betterquesting.quest.AAAAAAAAAAAAAAAAAAABFg.name=FEnSU
betterquesting.quest.AAAAAAAAAAAAAAAAAAABFg.desc=§3FenSU§r是终极能量电池，能够储存无限量的能量。

# Quest: Gerald建筑机器人
betterquesting.quest.AAAAAAAAAAAAAAAAAAABHw.name=Gerald建筑机器人
betterquesting.quest.AAAAAAAAAAAAAAAAAAABHw.desc=§6Gerald建筑机器人§r是hbm模组中最强大的武器，使用它会几乎摧毁整个维度的地表，同时你也会获得含有§6铱锇§r的陨石。%n%n建筑机器人的配方可以说是mod中最难的，需要成千上万的物品，主要是与电路相关的。%n需要大量的§6铋§r、§6钽§r和§6硅§r，所以不要吝啬于发展基岩矿石加工产线和对许多生产过程的并行化。如果你还没有使用§dAE2§r，那么在这个游戏阶段强烈推荐你使用它。%n%n%n发射建筑机器人将会让全维度笼罩在火焰风暴下，将包括所有树木和草在内的所有生命都烧尽。在发射他之前，最好备份你的世界。建筑机器人也能在§e下届§r or §e末地§r维度发射。%n%n§2建筑机器人和联盟号轨道舱的蓝图可以从结构里找到或通过鲍马逊购买。

# Quest: 铱锇合金
betterquesting.quest.AAAAAAAAAAAAAAAAAAABIQ.name=铱锇合金
betterquesting.quest.AAAAAAAAAAAAAAAAAAABIQ.desc=§铱锇合金§r是第二昂贵的材料，主要被用于制造§3DFC反应堆§r的部件。

# Quest: 犽戎龙素坯料
betterquesting.quest.AAAAAAAAAAAAAAAAAAABKg.name=犽戎龙素坯料
betterquesting.quest.AAAAAAAAAAAAAAAAAAABKg.desc=这种§6犽戎龙素坯料§r是通过使用§3DFC发射器§r来轰击装有§6钚坯料§r的钨箱而制成的。这是该模组的终局材料之一。

# Quest: 魔埚
betterquesting.quest.AAAAAAAAAAAAAAAAAAABLw.name=魔埚
betterquesting.quest.AAAAAAAAAAAAAAAAAAABLw.desc=§6裁决剑§r是一种能够造成巨大伤害的武器。它可以通过放置在§3DFC发射器§r轰击的钨箱内进行充能。

# Quest: Sa326锤
betterquesting.quest.AAAAAAAAAAAAAAAAAAABMA.name=Sa326锤
betterquesting.quest.AAAAAAAAAAAAAAAAAAABMA.desc=§6Sa326锤§r是hbm中最强大的武器，它能够一击消灭所有敌人。

# Quest: §cDone
betterquesting.quest.FmWwl9ntTjeMSWhXcVcTdg.name=§cDone
betterquesting.quest.FmWwl9ntTjeMSWhXcVcTdg.desc=Are you okay? Go touch some grass.

# Quest: Secret Catalogue
betterquesting.quest.J9dwgncgSUydHFPUoI85oQ.name=Secret Catalogue
betterquesting.quest.J9dwgncgSUydHFPUoI85oQ.desc=In order to obtain a hidden catalog, you have to do a few things:%n%nGet a regular sign%nAnswer the four questions and put the answers on said sign in the same order (all lowercase)%nRight click the written sign%nThere will be answers with more characters than signs allow, just type out as many as possible.%n%nThere will be no hints, so don't even try it.%nYou'll need the bobmazon level 6 achievement to order anything.%n%n%n%n1%nWhen we scream into the distance, who will answer?%n%n2%nThe invisible force, sometimes subtle and sometimes not, covers our eyes directed at the skies.%n%n3%nThe fluorescent oscilloscope gives us the passcode of random numbers. Who holds the answers?%n%n4%nEver revolving, never still, a sight for the patient that reeks of tobacco, dancing perpetually.

# Quest: 粒子加速器
betterquesting.quest._nmJ1zrSQp22psctX6Uq2A.name=粒子加速器
betterquesting.quest._nmJ1zrSQp22psctX6Uq2A.desc=§3粒子加速器§r是一种高度模块化的设备，它利用高强度的超导磁体将粒子加速到接近光速的状态后再让这些粒子相撞。完成这个任务后，务必前往“粒子物理学”章节。%n%n由于粒子加速器的结构极其复杂且规模庞大，强烈建议大家查阅相关的维基百科资料，因为其中包含了更多详细信息。%n%n[url]https://nucleartech.wiki/wiki/Particle_Accelerator[/url]%n%n§2 这项任务需要粒子加速器中最核心的部件，但任务所要求的这些部件数量并不足以让加速器正常运行。

# Quest: §c§l§4§l什么鬼?!
betterquesting.quest.fbvQbC3JTKOtI2b8e3cB0A.name=§c§l§4§l什么鬼?!
betterquesting.quest.fbvQbC3JTKOtI2b8e3cB0A.desc=Here ya go, your reward

# Quest: ICF激光器涡轮增压器
betterquesting.quest.hmwBFeuMQXiUrjE-WdD6-g.name=ICF激光器涡轮增压器
betterquesting.quest.hmwBFeuMQXiUrjE-WdD6-g.desc=The §3ICF Laser Turbocharger§r can be placed next to §3ICF Laser Capacitors§r to increase the laser's power by a substantial amount, allowing for the §3ICF§r to run higher grade fuels.

# Quest: 机械蠕虫
betterquesting.quest.k-HwTdGiQVmikRwAeg_fkQ.name=机械蠕虫
betterquesting.quest.k-HwTdGiQVmikRwAeg_fkQ.desc=机械蠕虫是§dNTM§r的第二位boss。它可以通过使用面具人硬币制作的§6银钥匙§r与§e丛林地牢§r中的机械师之环交互或者制造机械蠕虫召唤物来召唤。%n%n由于该boss设计已经过时，并且召唤过程有很多依赖运气的操作，这个任务提供了一种获得机械蠕虫硬币的替代方法。%n%n§2这个任务可以重复。

# Quest: ICF激光器
betterquesting.quest.nqmqybchRzWn-T46-3vHmQ.name=ICF激光器
betterquesting.quest.nqmqybchRzWn-T46-3vHmQ.desc=§2这项任务提供了一个可选的回收任务，要求一种能够使用氦-4与氢燃料进行反应、且反应功率为15MHE的小型激光装置。

# Quest: UFO
betterquesting.quest.q0Q4S7F-QlCzGWDkdOBMqw.name=UFO
betterquesting.quest.q0Q4S7F-QlCzGWDkdOBMqw.desc=火星入侵飞船是游戏后期的BOSS，击败它可以获得§6UFO硬币§r，这种硬币可用于制作建筑机器人。%n%n这个任务提供了获取这种硬币的另一种方法。%n%n§2此任务可以重复。

# Quest: 焊接铱锇合金板
betterquesting.quest.xYmNHPDAQkSwXHOow8--4g.name=焊接铱锇合金板
betterquesting.quest.xYmNHPDAQkSwXHOow8--4g.desc=§6焊接铱锇合金板§r的单个制造耗能高达3000亿HE，因此必须具备完善的能源生产与储存设施才能进行生产。

# Quest Line: 建筑与装饰
betterquesting.questline.7-1bBIkKRc6xhh5bwIGsjg.name=建筑与装饰
betterquesting.questline.7-1bBIkKRc6xhh5bwIGsjg.desc=Improve your builds by using Chisel, Architecturecraft and Better Builder's Wands.

# Quest: 凿子
betterquesting.quest.TA6SPr3KTbKsgRFceNMZmA.name=凿子
betterquesting.quest.TA6SPr3KTbKsgRFceNMZmA.desc=§6凿子§r是一种建筑工具，可以用来改变方块的纹理，甚至能赋予方块一些独特纹理。

# Quest: Schematica
betterquesting.quest.VyF-RUbsSuS8J2hbI5CIkw.name=Schematica
betterquesting.quest.VyF-RUbsSuS8J2hbI5CIkw.desc=使用§dSchematica§r，您可以创建建筑的结构图，并在其他世界上放置全息图。查看键位绑定以开始使用。

# Quest: Decobench
betterquesting.quest.W3YJEghpQMa3V91fEyWHyw.name=Decobench
betterquesting.quest.W3YJEghpQMa3V91fEyWHyw.desc=The §3Decobench§r allows you to craft different props from §dDecocraft§r.%n%nIn order to use the Decobench you should put §6clay§r, §6red dye§r, §6green dye§r and §6blue dye§r in it.

# Quest: Modern Markings
betterquesting.quest.j9eLuGnhRVWn5uJS_KI5lg.name=Modern Markings
betterquesting.quest.j9eLuGnhRVWn5uJS_KI5lg.desc=§dModern Markings§r adds wall and floor decorations suited for many purposes. Use the §6Chisel§r on the floor or wall signs to change their design.

# Quest: Better Builder's Wands
betterquesting.quest.mPZ8D32cT5WrvlKuPNq90g.name=Better Builder's Wands
betterquesting.quest.mPZ8D32cT5WrvlKuPNq90g.desc=The §6Building Wand§r allows one to place many blocks at once, making walls and roads easier to construct. The stronger material the wand is made out of, the more blocks it can place.%n%n§2To replace water blocks using wands bind the key, Change Fluid Mode, in settings.

# Quest: 建筑师工艺
betterquesting.quest.p7NNm2NvRgWz37LQO6yraw.name=建筑师工艺
betterquesting.quest.p7NNm2NvRgWz37LQO6yraw.desc=§d建筑师工艺(Architecture Craft)§r加入了§3建筑师锯台§r ，可用于更改形状块。%n%n§6建筑师锤§r可用于对建筑师锯台做出的方块旋转方向。%n%n§6建筑师荧光画笔§r可用于在建筑师锯台做出的方块上添加亮度。

# Quest: 告示牌图片
betterquesting.quest.wAu-q390TlKihyp-bEI2lw.name=告示牌图片
betterquesting.quest.wAu-q390TlKihyp-bEI2lw.desc=§d告示牌图片§r允许玩家在告示牌上添加任何图像，默认按下\键打开GUI。

# Quest Line: 游历四方...
betterquesting.questline.IMaxzqn6SPe41eVHumcKhA.name=游历四方...
betterquesting.questline.IMaxzqn6SPe41eVHumcKhA.desc=没有描述.

# Quest: 缓降背包
betterquesting.quest.KcnpD14US-azBrJ6lnxtwg.name=缓降背包
betterquesting.quest.KcnpD14US-azBrJ6lnxtwg.desc=Unlike the regular jetpack, pressing the Spacebar allows you to rise and levitate in the air (without holding Spacebar). Pressing Shift lowers the player down, and the "C" button allows you to turn the jetpack on and off.%n%nVelocity - 0.4-0.2m/1t%nFuel consumption - 5-10t/1mb%nFuel type - Kerosene

# Quest: 矢量喷气背包
betterquesting.quest.Lx52eHSxTHmRRHtJ0f8J8g.name=矢量喷气背包
betterquesting.quest.Lx52eHSxTHmRRHtJ0f8J8g.desc=I AM A SONIC NOW! YES, FLYING SONIC!

# Quest: 喷气背包
betterquesting.quest.c0PT-cJUTjmDXA1SpDFsGw.name=喷气背包
betterquesting.quest.c0PT-cJUTjmDXA1SpDFsGw.desc=The Jetpack is an armor attachment that can also be worn directly instead of a chestplate.%n%nVelocity - 0.4m/1t%nFuel consumption - 5t/1mb%nFuel type - Kerosene

# Quest: 喷气背包备用燃料罐
betterquesting.quest.wOUqQNzITt27w1u__S7Pcw.name=喷气背包备用燃料罐
betterquesting.quest.wOUqQNzITt27w1u__S7Pcw.desc=Jetpack Reserve Fuel Tank is a consumable for refueling jetpacks that use kerosene. Using one tank refills the jetpack's fuel supply by 1000 mB of kerosene. The consumable only refueled the jetpack that was equipped. Activation of the consumable by pressing the right mouse button.

# Quest Line: ...摆脱死亡
