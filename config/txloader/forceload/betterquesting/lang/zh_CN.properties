betterquesting.questline.WLHEIErFRHCSoNQ7qL4YwA.desc=没有描述.

# Quest: Cobalt Armor Set
betterquesting.quest.-kqA6DeiTJqePIBzJpf0uQ.name=Cobalt Armor Set
betterquesting.quest.-kqA6DeiTJqePIBzJpf0uQ.desc=Mostly used as an crafting ingridient for starmetal armor, which is mostly used as an crafting ingridient for other cool armors.

# Quest: Casual Armor Set
betterquesting.quest.2L-E-PL5SDWjrfvWn_zC_w.name=Casual Armor Set
betterquesting.quest.2L-E-PL5SDWjrfvWn_zC_w.desc=Pretty good and cheap armor. Except for boots - they're a little bit harder to make.%n%n[note]Here is a tip: use latex for the early game.[/note]

# Quest: Bismuth Armor Set
betterquesting.quest.3JpvYLTfTOO9kEK28DaW8w.name=Bismuth Armor Set
betterquesting.quest.3JpvYLTfTOO9kEK28DaW8w.desc=VERY cool armor, gives you ability to dash [note](hmm... reminds me of some game...)[/note]

# Quest: Diesel-Powered Armor Set
betterquesting.quest.6WXPMWrES4OaDu1YsXq5Gg.name=Diesel-Powered Armor Set
betterquesting.quest.6WXPMWrES4OaDu1YsXq5Gg.desc=Ever wanted to look like a bunny girl? Well... Umm... This is for you.

# Quest: CMB Armor Set
betterquesting.quest.EDtE6paOTrOrW6rox2ql4g.name=CMB Armor Set
betterquesting.quest.EDtE6paOTrOrW6rox2ql4g.desc=Not really armor, but gives you haste III, speed III and strength V, so it's good for mining.

# Quest: Titanium Armor Set
betterquesting.quest.EyUDpma5Qb6VKA2y0yeAaQ.name=Titanium Armor Set
betterquesting.quest.EyUDpma5Qb6VKA2y0yeAaQ.desc=Titanium armor is mostly used as early game armor or as crafting ingridient for few other armors, such as HEV Mk IV and T45.

# Quest: AJR Power Armor Set
betterquesting.quest.HRllUs4uTFOv2ElWs207gg.name=AJR Power Armor Set
betterquesting.quest.HRllUs4uTFOv2ElWs207gg.desc=A stylish version of the Steel Rangers armor.

# Quest: Euphemium Armor Set
betterquesting.quest.KeDR9WCZR_2FQ1dkZhyaIg.name=Euphemium Armor Set
betterquesting.quest.KeDR9WCZR_2FQ1dkZhyaIg.desc=It's just protects you from everything. Except for Digamma.

# Quest: T45 Power Armor
betterquesting.quest.MC-Fx_ATQw2H5EPDqWBtEg.name=T45 Power Armor
betterquesting.quest.MC-Fx_ATQw2H5EPDqWBtEg.desc=Pretty good armor for combat, but I'll recommend you to craft Steel Ranger instead.

# Quest: Lunar Armor Set
betterquesting.quest.WeGg9_yRTAewpvKItMnnaw.name=Lunar Armor Set
betterquesting.quest.WeGg9_yRTAewpvKItMnnaw.desc=Very good armor. Gives satiety, speed, jumping ability, thermal visor, fall protection and much more.%n%nIf you put it on uncharged, you will die.%n%nYou can also add wings to the armor and get built-in elytra and an ion jetpack.

# Quest: Starmetal Armor Set
betterquesting.quest.a_2oKgZDTe6qca5hlK721A.name=Starmetal Armor Set
betterquesting.quest.a_2oKgZDTe6qca5hlK721A.desc=Mostly used as an crafting ingridient for other cool armors, such as Lunar Armor and Fau armor.

# Quest: Steel Ranger Armor Set
betterquesting.quest.e6pftbb6TAuGpoS0O7_RjQ.name=Steel Ranger Armor Set
betterquesting.quest.e6pftbb6TAuGpoS0O7_RjQ.desc=Steel Ranger Armor is very similar in characteristics to T45 armor, but it is still better in protecting against physical damage, explosions, radiation and other, and also gives the effect of a jump boost in addition to strength.

# Quest: Steel Armor Set
betterquesting.quest.kNHV1YpNQDSENgcRY251NQ.name=Steel Armor Set
betterquesting.quest.kNHV1YpNQDSENgcRY251NQ.desc=Steel armor set is almost useless, but used in crafting in a few other armors.

# Quest: Fau Armor
betterquesting.quest.n-D5ZzNnQ_ux3u0yFXZ1qQ.name=Fau Armor
betterquesting.quest.n-D5ZzNnQ_ux3u0yFXZ1qQ.desc=The strongest armor, capable of protecting even against Digamma. It ignores nearly all types of damage, but DNT would be more convenient.%n%nTo craft the chestplate, you need ancient fragments from the basement of the concrete pyramid.  %n§c[There is A TON of radiation down there, be careful]

# Quest: Remnants Power Armor
betterquesting.quest.wOQm2yjgR9mYmJZ1cXlxOA.name=Remnants Power Armor
betterquesting.quest.wOQm2yjgR9mYmJZ1cXlxOA.desc=You've lost an expensive piece of army-issue equipment! That suit is going to come out of your §cpay§r, and you will remain in this mans army until you are §cfive hundred and ten years old§r, which is the number of years it will take for you to pay for a Mark II Powered Combat Armor you have lost! Report to the armory and have a new suit issued to you, then report back to me, private! §cDismissed!

# Quest: Advanced Alloy Armor Set
betterquesting.quest.x6BH5qVCRc-lUMqwC5oxeA.name=Advanced Alloy Armor Set
betterquesting.quest.x6BH5qVCRc-lUMqwC5oxeA.desc=This is the first REALLY GOOD armor you can get early in the game. It's not the coolest in the modpack, but it's better than diamond.

# Quest: Steam Suit
betterquesting.quest.xU7jtFxOQR-4ccpcXT3W2A.name=Steam Suit
betterquesting.quest.xU7jtFxOQR-4ccpcXT3W2A.desc=Ever wanted an power armor that is not using electricity power? Here it is, steam-powered power armor!%n%nSlows you down a little bit but gives you Haste V.

# Quest Line: Dimensional Adventures
betterquesting.questline.IvOaHFdvTem9AKGdPDgBaA.name=Dimensional Adventures
betterquesting.questline.IvOaHFdvTem9AKGdPDgBaA.desc=没有描述.

# Quest: Void Quartz
betterquesting.quest.-WMTfvUrRlmEzH7hBIzMfg.name=Void Quartz
betterquesting.quest.-WMTfvUrRlmEzH7hBIzMfg.desc=Another type of quartz, called Void Quartz, can be found in the Abyss biome. It’s easy to spot thanks to the dark surroundings. Void Quartz is an essential material used in crafting advanced storage cells in AE2.

# Quest: Burning Stick
betterquesting.quest.2uw1IrVfTVKt_7dxdEsNOQ.name=Burning Stick
betterquesting.quest.2uw1IrVfTVKt_7dxdEsNOQ.desc=Ouch! Ouch! Hot!%n%nThe Blaze Rod is a vital material for reaching the End. It drops, of course, from Blazes — but be careful! They always spawn infernal, so prepare for a tough fight.

# Quest: 下界
betterquesting.quest.DgW8bQi1TbSrKcPoJms-1g.name=下界
betterquesting.quest.DgW8bQi1TbSrKcPoJms-1g.desc=§e下界§r有大量的资源可以获取，比如：%n%n可以用来制造§6硅§r的§6石英§r§r；  %n可以粉碎后制成§6煤粉§r的§6地狱煤§r；  %n各种化工配方中需要的§6硫§r；  %n用于制造燃烧武器的§6红磷§r；  %n在§6复式炼焦炉§r中用来制造§6氯气§r的§6萤石§r；  %n此外，在下界的顶部偶尔还能找到§6钴§r。%n%n下界有§e0.1RAD/s§r的背景辐射值。%n%n§2此外，还有萤石矿、石英矿以及磷矿石的基岩矿床。§r%n%n§2 深层钕矿床也仅存在于下界中。§r%n

# Quest: 猪灵?
betterquesting.quest.JfANYrzhQKCVY4ATmF-Tsg.name=猪灵?
betterquesting.quest.JfANYrzhQKCVY4ATmF-Tsg.desc=Hey, say hello to the piglins of 1.14! I think you know who they are.%n%nIf not, then listen up. Piglins are very similar to zombie pigmen, but they will be aggressive towards you if you don't have gold armor on you (that is, they will be aggressive towards you ALWAYS, because I don't know how you'll survive in hell wearing gold armor). Also, if you throw them a gold bar, they'll be willing to trade it for something else.

# Quest: Hellish Beauties
betterquesting.quest.LendIsa-Q2ugsj2GWM_D6Q.name=Hellish Beauties
betterquesting.quest.LendIsa-Q2ugsj2GWM_D6Q.desc=Crystals can be mined in the Crystal Biome. (Obviously.) They are mainly used to craft advanced Applied Energistics 2 storage cells, as well as some other less useful crafts, such as Crystal Lamps or Crystal Glasses.

# Quest: Crystal Clear Production
betterquesting.quest.XU2nsU1wQFG85rsSxuTPqA.name=Crystal Clear Production
betterquesting.quest.XU2nsU1wQFG85rsSxuTPqA.desc=You've already mined the Nether Crystals, but they can't be recrafted into Crystal Shards. Instead, all you need to do is pour water near the block — it will then transform into a Budding Nether Crystal. This structure will begin growing Crystal Buds in all directions, which will eventually develop into a Crystal Flower (the final stage). Once fully grown, you can safely break the flower to obtain the Shards needed for AE2.

# Quest: Efrine
betterquesting.quest.dsZj1Tv8Se6m5E8R2_e49Q.name=Efrine
betterquesting.quest.dsZj1Tv8Se6m5E8R2_e49Q.desc=Stange material. Feels cold and soft, like plasticine. Anything made from this material does not burn, and the armor gives you fire resistance.

# Quest: Darkness in Powder Form
betterquesting.quest.rIM_8imCQdyHqdA2ih4brQ.name=Darkness in Powder Form
betterquesting.quest.rIM_8imCQdyHqdA2ih4brQ.desc=An alternative to Glowstone can be found in the Nether, called Gloomstone. It generates in special biomes and is required for certain AE2 crafting recipes.

# Quest: New End
betterquesting.quest.vQm4mFhbRsS8yjm9DkDAUw.name=New End
betterquesting.quest.vQm4mFhbRsS8yjm9DkDAUw.desc=§eThe End§r is home to §6Trixite§r, a unique extraterrestrial mineral that when processed can yield §6Plutonium§r, §6Cobalt§r and §6Niobium§r. The Niobium is of great interest as it is a great source for early §3Catalytic Cracking Towers§r.%n%nDue to only the main end island existing, Trixite Ore is a limited resourse.§r Trixite Crystals can also be obtained from an §6Asteroid Mining Ship§r, but it is not recommended.%n%n§dEt Futurum Requiem§r backports many modern end features, such as §eChorus Fruit§r, §eShulkers§r and a respawnable §eEnder Dragon§r using §6End Crystals§r.%n%nThe §6Dragon Egg§r can also be used to create a Backpack which provides passive §eNight Vision§r, §eStrength 2§r and §eFire resistance§r, aswell as some §eRegeneration§r when on low health.%n%nEnderman farms can also be made using §3Fans§r to push the endermen into the killing zone.

