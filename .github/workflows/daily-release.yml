name: Daily Language Packs Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Merge PRs from Bufka2011
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Get all open PRs to main branch
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });
            // Filter PRs from Bufka2011 and attempt to merge
            for (const pull of pulls) {
              if (pull.user.login !== 'Bufka2011') continue;
             
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                  merge_method: 'merge'
                });
                console.log(`✅ Successfully merged PR #${pull.number}`);
              } catch (error) {
                console.log(`⚠️ Failed to merge PR #${pull.number}: ${error.message}`);
                // Continue execution even if merge fails
              }
            }

      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set release name
        id: vars
        run: echo "release_name=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create unified language packs ZIP (excluding en_US)
        id: zip
        run: |
          # Create temporary directory for clean archive structure
          TEMP_DIR=$(mktemp -d)
          DEST_DIR="$TEMP_DIR/config"
          mkdir -p "$DEST_DIR"
         
          # Copy all language directories (excluding .github, .git and en_US)
          for dir in */; do
            dir_name="${dir%/}"
            # Skip non-language directories and en_US
            if [[ "$dir_name" == ".github" || "$dir_name" == ".git" || "$dir_name" == "en_US" || ! -d "$dir_name/config" ]]; then
              continue
            fi
           
            # Copy language config directory preserving structure
            cp -r "$dir_name/config" "$DEST_DIR/$dir_name" 2>/dev/null || true
           
            # Convert all .properties files to .lang within the copied structure
            find "$DEST_DIR/$dir_name" -type f -name "*.properties" | while read -r f; do
              mv "$f" "${f%.properties}.lang" 2>/dev/null || true
            done
          done
         
          # Create the unified ZIP archive
          ZIP_NAME="NTNH-Translations-${{ steps.vars.outputs.release_name }}.zip"
          ZIP_PATH="build_artifacts/$ZIP_NAME"
          mkdir -p build_artifacts
         
          (
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/$ZIP_PATH" config/ -x "*.git*" "*.DS_Store" "__MACOSX/*"
          )
         
          # Clean up temporary directory
          rm -rf "$TEMP_DIR"
         
          # Output ZIP path for release step
          echo "zip_file=$ZIP_PATH" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          tag_name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          body: |
            📦 Unified language packs for Minecraft mods (en_US excluded)
            🕒 Generated from branch `main` on ${{ steps.vars.outputs.release_name }}
           
            This release contains a single ZIP archive with **all language packs except en_US**, organized by locale code (e.g., `config/ru_RU/`, `config/uk_UA/`, etc.).
            
            How to use:
            1. Download the ZIP file from the release assets.
            2. Extract the contents to your Minecraft `config` directory.
            3. Restart Minecraft to apply the new language packs.
          files: ${{ steps.zip.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
