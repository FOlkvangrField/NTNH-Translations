name: Sync Translations

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync en_US translations 🔁
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout upstream repo (NTNewHorizons/NTNH:updates/upcoming)
        uses: actions/checkout@v4
        with:
          repository: NTNewHorizons/NTNH
          ref: updates/upcoming
          path: upstream

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync en_US files and convert .lang -> .properties
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_DIR="upstream/config"
          WORK_DIR="${GITHUB_WORKSPACE}"
          found=0

          while IFS= read -r -d '' file; do
            found=1
            relpath="${file#$UPSTREAM_DIR/}"
            subdir="$(dirname "$relpath")"
            mkdir -p "$WORK_DIR/config/$subdir"

            src="$file"
            dest="$WORK_DIR/config/$subdir/en_US.properties"

            ext="${file##*.}"

            if [ "$ext" = "lang" ]; then
              # Convert lines like "key: value" -> "key=value" (leave comments intact), remove CRLF and BOM
              awk 'BEGIN{FS=OFS=""} /^#/ {print; next} { if (index($0, ":") && !index($0, "=")) sub(/:/, "=") ; print }' "$src" |
                sed '1s/^\xEF\xBB\xBF//' | sed 's/\r$//' > "$dest"
            else
              # Copy .properties (or other) but ensure no CRLF and strip BOM
              sed '1s/^\xEF\xBB\xBF//' "$src" | sed 's/\r$//' > "$dest"
            fi

            echo "Updated: config/$subdir/en_US.properties"
          done < <(find "$UPSTREAM_DIR" -type f -name 'en_US.*' -print0)

          if [ "$found" -eq 0 ]; then
            echo "No en_US files found in upstream config. Exiting."
            exit 0
          fi

          # Add changes and show a summary
          git add config || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

      - name: Create Pull Request with synced translations ✅
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync en_US translations from NTNewHorizons/NTNH (updates/upcoming) and convert .lang -> .properties"
          branch: sync-translations/from-ntnh-${{ github.run_number }}
          title: "Sync en_US translations from NTNewHorizons/NTNH (updates/upcoming)"
          body: |
            Automated synchronization of en_US translation files from the NTNewHorizons/NTNH repository (branch: updates/upcoming).

            - Converts any `.lang` files to `.properties` (keeps comments, replaces first `:` with `=` when needed).
            - Places files under the same `config/` path as upstream.

            This change was generated by the `sync-translations` workflow.
          labels: automated,translations
