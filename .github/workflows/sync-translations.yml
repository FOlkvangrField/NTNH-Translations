name: Sync Translations from NTNH
on:
  schedule:
    # Run daily at 11 PM UTC (one hour before daily-release.yml at midnight)
    - cron: '0 23 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NTNH-Translations
        uses: actions/checkout@v4
        with:
          path: translations
          fetch-depth: 0
      - name: Checkout NTNH (updates/upcoming branch)
        uses: actions/checkout@v4
        with:
          repository: NTNewHorizons/NTNH
          ref: updates/upcoming
          path: ntnh
          fetch-depth: 1
      - name: Rewrite en_US files and convert to properties
        run: |
          #!/bin/bash
          set -e
          
          TRANS_ROOT="translations/config"
          NTNH_ROOT="ntnh/config"
          
          # Remove all existing en_US files in translations repo
          echo "Removing existing en_US files..."
          find "$TRANS_ROOT" -type f -name "en_US.*" -delete
          
          # Find all en_US files in NTNH repo and copy them to translations
          echo "Copying fresh en_US files from NTNH..."
          find "$NTNH_ROOT" -type f -name "en_US.*" | while read ntnh_file; do
              # Get relative path from config directory
              rel_path="${ntnh_file#$NTNH_ROOT/}"
              
              # Construct target path in translations repo
              trans_file="$TRANS_ROOT/$rel_path"
              
              # Create directory if it doesn't exist
              mkdir -p "$(dirname "$trans_file")"
              
              # Copy file
              cp "$ntnh_file" "$trans_file"
              echo "Copied: $trans_file"
          done
          
          # Convert all .lang files to .properties
          echo "Converting en_US.lang files to en_US.properties..."
          find "$TRANS_ROOT" -type f -name "en_US.lang" | while read lang_file; do
              # Create new filename with .properties extension
              properties_file="${lang_file%.lang}.properties"
              
              # Move/rename the file
              mv "$lang_file" "$properties_file"
              echo "Converted: $lang_file -> $properties_file"
          done
          
          # Clean up empty directories
          find "$TRANS_ROOT" -type d -empty -delete
      - name: Commit and push changes
        run: |
          cd translations
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add .
            git commit -m "chore: sync en_US files from NTNH repository and convert to .properties"
            git push
          fi
