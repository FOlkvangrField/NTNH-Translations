# Quest: 护甲改装
betterquesting.quest.3J7vD46NQg6IMMDRALpT-A.name=护甲改装
betterquesting.quest.3J7vD46NQg6IMMDRALpT-A.desc=§3装甲改装台§r允许你在护甲上加装各种护甲改装附件，从而提供增益、新能力或额外防护。

# Quest: 戴森云
betterquesting.quest.3WDOW4oRQoO6WN6291ZuNw.name=戴森云
betterquesting.quest.3WDOW4oRQoO6WN6291ZuNw.desc=§3Dyson Swarms§r consist of thousands of swarm members encircling the parent star of a system, and energy production from the swarm scales based on the number of members in a swarm. These satellites do not last indefinitely however, they attenuate (decay) over time, with the chance of decay increasing as the number of swarm members increase.%n%n§6Dyson Swarm Members§r must be launched into solar orbit via the use of a huge centrifugal launch platform, known as the §3Spinlauncher§r. The spinlauncher launches 4 swarm members at a time, consuming a large amount of electricity to do so.%n%nThe §3Dyson Receiver§r is the main machine required for collecting energy from the swarm. It collimates the immense energy collected from the swarm into a immensely powerful beam. Setting up requires only a satellite ID chip that is matched to an existing swarm. The energy beam must be pointed towards a Dyson Power Converter.%n%nThe §3Satellite Dyson Relay§r can be used to allow dyson swarms to provide power during night time.

# Quest: Quests information
betterquesting.quest.45ow6xFKTQ6GHVi3FG_dtQ.name=Quests information
betterquesting.quest.45ow6xFKTQ6GHVi3FG_dtQ.desc=[warn]This version of the Questbook was originally made by _SkippyPlaysMC_ and modified by Bufka2011.[/warn]%n%nNotes:%n%n§b1) This questbook does not contain all the content from the mod, such as the guns, many armor sets and others. Make sure to browse NEI.%n%n2) §lThere are two types of quests §r§3§b- primary and secondary. Primary quests are quests with unique shape and bold lines between each other.%n%n3) When updating the modpack to newer versions that has introduced changes to the questbook, in case the quests dont update, delete the betterquesting folder in the world file.%nAfter it is deleted, turn on cheats and do "/bq_admin edit true", head over to the chapter of your choice, press the designer button (the one with many squares), click on your quest of choice and finally press the autocomplete button (checkmark) to complete the quests previously completed.%n%n§c§lDo not use the quests for a modpack that is to be published, unless given explicit permission.%n%n§r§bSpecial thanks to everyone on discord who helped out with questions and recommendations while making the quests, aswell as the official NTM Wiki for providing information used in the quests.%n

# Quest: 整合包信息
betterquesting.quest.5VAtBoWDTLmFNrWxLbn9IA.name=整合包信息
betterquesting.quest.5VAtBoWDTLmFNrWxLbn9IA.desc=欢迎游玩§5核科技：新视野§r！%n%n在开始前请先阅读以下的信息：%n%n§b1) 请记住在背包界面使用§3§dServer Utilities§r来声明您的基地并强加载你的反应堆所在区块。%n%n2) 如果着色器出现故障，尝试使用fancy textures。%n%n3) 如果您遇到任何渲染问题，请尝试在§dNEI§r界面中滚动浏览。%n%n4) 如果你是与朋友一起玩游戏，请务必将他们邀请到你的《更好的任务》队伍中，这样你们就可以共享游戏进度和奖励了。%n

# Quest: 末地的资源
betterquesting.quest.5kMp0VQpS621jGrQSHbZGQ.name=末地的资源
betterquesting.quest.5kMp0VQpS621jGrQSHbZGQ.desc=The End is where you'll find the resources you need for high-level crafting. To get it, craft an Eye of Ender like you would in regular Minecraft to find a fortress with an End Portal.%n%nThe dragon boss fight has been reworked and is now a much more challenging encounter with new obstacles to overcome before defeating the dragon.%n%nIn the End, you can collect Dragon Essence by killing the dragon, Ender Powder from ore scattered across the islands, and Stardust found in the far reaches of the distant End Islands.

# Quest: Dineurtom amrr
betterquesting.quest.6PZEF2npTwy_exs-JQAKYg.name=Dineurtom amrr
betterquesting.quest.6PZEF2npTwy_exs-JQAKYg.desc=Increasus damge takn by 5x tims%nBestest armr in da wurld!!!!!!1!!1!!%n%nStaje of da gaim - Brayn Partiklz%nProtekshun levl - Funtastick%nFeetchurs - Yoor Btes Chois

# Quest: Dyson Anatmogenesis Terraformer
betterquesting.quest.6k-JrbD-S8GO9PRRthWNRA.name=Dyson Anatmogenesis Terraformer
betterquesting.quest.6k-JrbD-S8GO9PRRthWNRA.desc=The §3Dyson Anatmogenesis Terraformer§r provides the most utility out of all the currently available §3Dyson converters§r, accepting a beam from a receiver and providing a direct energy to mass conversion, producing planetary scale atmospheric gases, terraforming any planet or moon as a player sees fit.%n%nBy default it will release oxygen into an atmosphere, making it breathable once it crosses the 0.1atm threshold for breathing. A fluid identifier can be used to switch the gas emitted, and a screwdriver can switch it between emitting or extracting gases from the atmosphere.%n%nIf powered with §e150THE/s§r power from a swarm (equivalent to a swarm size of 1,024), it will take 8 hours to reach 0.1atm of pressure.

# Quest: 异虫
betterquesting.quest.AAAAAAAAAAAAAAAAAAAABQ.name=异虫
betterquesting.quest.AAAAAAAAAAAAAAAAAAAABQ.desc=§G§6异虫§r是拥有多种变体的大型昆虫，主要随自然生成的§6§r巢穴§r结构出现。所有类型均自带护甲，相比普通生物具有伤害减免特性。这类生物通常会被玩家产生的污染所吸引。%n%n§6§r§6异虫巢§r可以在所有非海洋生物群落中自然生成，也可以由侦察异虫制造出来。这些巢内部会放置多个异虫蜂巢繁殖方块以及一些低级战利品，所有这些物品都位于异虫蜂巢繁殖方块的上面。异虫蜂巢繁殖方块会不断孵化出异虫，当其被破坏时会掉落异虫蛋。%n%n§2强烈建议尽早摧毁其巢穴，否则后期污染将使其成为巨大隐患。

# Quest: 撬棍
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACA.name=撬棍
betterquesting.quest.AAAAAAAAAAAAAAAAAAAACA.desc=§6撬棍§r，用于打开各种结构中发现的箱子以获取食物和弹药等战利品。

# Quest: M1TTY环境套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADg.name=M1TTY环境套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAADg.desc=§6M1TTY环境套装§r是一套价格低廉的电动装甲装备，具备多种实用功能。它非常适合用于探险活动：不仅能够显著提升移动速度，还能使游泳速度更快。

# Quest: DNT双聚中子态素高科技全环境作战套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANQ.name=DNT双聚中子态素高科技全环境作战套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAANQ.desc=§6DNT双聚中子态素高科技全环境作战套装§r是hbm模组的毕业套装。制造出该套装证明你已经达到了进度终点。%n%n§5感谢游玩!

# Quest: HEV Mk.IV 套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAhA.name=HEV Mk.IV 套装
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAhA.desc=§6HEV Mark IV§r是一款功能强大的电动防护服，其主要作用是保护使用者免受高辐射、火灾、某些有害空气颗粒等危险因素的侵害。该防护服配备了§6盖革计数器§r以及定制的抬头显示界面。

# Quest: 钽
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAiw.name=钽
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAiw.desc=§6钽§r是一种用于制造某些物品的材料，其中最重要的是§6电容板§r。钽晶体的生产需要§6钶钽铁矿§r，而钶钽铁矿可以通过使用§6钶钽铁矿指针§r来寻找。此外，还可以利用§b高性能溶剂§r处理§e重金属基岩矿石§r来获取钽。%n%n§2钶钽铁矿在其加工阶段早期可提供催化裂化塔所需的铌元素。

# Quest: 红色钥匙
betterquesting.quest.NB6qs0xZSHaY5Sik2IoTxg.name=红色钥匙
betterquesting.quest.NB6qs0xZSHaY5Sik2IoTxg.desc=§6红色钥匙§r能够打开任何需要使用普通钥匙才能打开的容器，无论锁的锁芯结构如何；它也是仅有的两把能够打开那种位于奇怪的石头上的锁的钥匙之一，从而可以进入§e红房间§r。这种钥匙没有使用期限限制，可以无限次重复使用。%n%n

# Quest: 保险箱与撬锁
betterquesting.quest.VoxsH2isSheNEKaJ3_Ikgg.name=保险箱与撬锁
betterquesting.quest.VoxsH2isSheNEKaJ3_Ikgg.desc=§6螺丝刀§r可以用来旋转传送带以及建造§3芝加哥反应堆§r。它也可以消耗§6发卡§r来解锁各种遗迹中发现的§6保险箱§r。

# Quest: The End of Space...
betterquesting.quest.XbTJRWJNTKa4UEeLPV0urg.name=The End of Space...
betterquesting.quest.XbTJRWJNTKa4UEeLPV0urg.desc=Well, you've completed the space stage of the game; now the entire space knows and fears you (you are a true space pirate). Here are a couple more nuances about the §3Dyson swarm§r:%n%n§2Do not place §3converters§r directly next to the §3receiver§r - this will cause a malfunction.§r%n%n§2Multiple players in the same game world can create multiple §3swarms§r, but keep in mind that different swarms reduce each other's §eefficiency§r. This can encourage players to either work together on one common §3swarm§r or compete to extract more §eenergy§r from their own §3swarm§r.§r

# Quest: All My Sounds Are Gone!
betterquesting.quest.lH0bvUKoTYChtO49fWj9Qg.name=All My Sounds Are Gone!
betterquesting.quest.lH0bvUKoTYChtO49fWj9Qg.desc=Try updating your Java by downloading it from the official Jav website ([url]https://java.com[/url]).%n%nIf it didn't help - open an issue on our GitHub or ask for help in our Discord.