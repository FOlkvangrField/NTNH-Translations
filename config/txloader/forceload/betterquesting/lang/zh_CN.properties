# Quest: LV1 > LV2 Lootbag Trade
betterquesting.quest.8XIrl7C6Q5qBBT6HSgTHIA.name=LV1 > LV2 Lootbag Trade
betterquesting.quest.8XIrl7C6Q5qBBT6HSgTHIA.desc=Trade three LV1 lootbags to get a better one: LV2.

# Quest: LV3 > LV3.5 Lootbag Trade
betterquesting.quest.U9KescpLTHK_XLG4Qil9zw.name=LV3 > LV3.5 Lootbag Trade
betterquesting.quest.U9KescpLTHK_XLG4Qil9zw.desc=Trade two LV3 lootbags to get a LV3.5.

# Quest: LV2 > LV3 Lootbag Trade
betterquesting.quest.b_QkCMniQPmbvS4FX5sq-w.name=LV2 > LV3 Lootbag Trade
betterquesting.quest.b_QkCMniQPmbvS4FX5sq-w.desc=Trade three LV2 lootbags to get a better one: LV3.

# Quest: LV3.5 > LV4 Lootbag Trade
betterquesting.quest.ecBXzr6RQ-i6XoIXFOvd5A.name=LV3.5 > LV4 Lootbag Trade
betterquesting.quest.ecBXzr6RQ-i6XoIXFOvd5A.desc=Trade eight LV3.5 lootbags to get a better one: LV4.

# Quest: LV3 > LV4 Lootbag Trade
betterquesting.quest.qG74J_R9TQub-uWbBzZkoQ.name=LV3 > LV4 Lootbag Trade
betterquesting.quest.qG74J_R9TQub-uWbBzZkoQ.desc=Trade four LV3 lootbags to get a better one: LV4.

# Quest Line: 应用能源2
betterquesting.questline.AAAAAAAAAAAAAAAAAAAABQ.name=应用能源2
betterquesting.questline.AAAAAAAAAAAAAAAAAAAABQ.desc=使用应用能源2来自动化你的工厂。

# Quest: P2P ME网络
betterquesting.quest.1bFqt414QEOwMpAVRSd3zg.name=P2P ME网络
betterquesting.quest.1bFqt414QEOwMpAVRSd3zg.desc=§3P2P ME§r可用于在不铺设大量线缆的情况下传输大量频道。%n%n§2本任务作为如何有效使用P2P ME的指南。§r%n%n一旦设置好§3能源接收器§r，强烈建议（并且可能需要）在其旁边放置一个§3能源元件§r，以确保系统有足够的电力，因为更多组件会增加ME系统的能量需求。%n%n之后，需要2个§3ME控制器§r，一个用于提供机器将使用的频道，另一个用于通过P2P连接传输另一个控制器的频道。顶部的控制器可以通过在其旁边附加更多控制器来扩大。%n%n[img height=1000]betterquesting:textures/QB_Controller1.png[/img]%n%n放置控制器后，在顶部控制器的任何一侧放置一个P2P通道 - ME。§9蓝色线缆§r将作为连接P2P连接的线缆，因此它需要连接到底部控制器。%n%n[img height=1000]betterquesting:textures/QB_Controller2.png[/img]%n%n通过使用§6内存卡§r将P2P连接连接在一起，顶部控制器一侧的32个频道将仅使用底部控制器的1个频道传输到任何目的地。§c红色线缆§r现在可以访问32个频道。%n%n[img height=1000]betterquesting:textures/QB_Controller3.png[/img]%n%n[img height=1000]betterquesting:textures/QB_Controller4.png[/img]%n%n通过扩展前面的示例，可以添加更多连接以充分利用所有频道。%n%n[img height=1000]betterquesting:textures/QB_Controller5.png[/img]%n%n[img height=1000]betterquesting:textures/QB_controller6.png[/img]%n

# Quest: P2P 接口并行化处理
betterquesting.quest.1rIaClFKQbGXrdGi5-Eppg.name=P2P 接口并行化处理
betterquesting.quest.1rIaClFKQbGXrdGi5-Eppg.desc=并行化处理可以显著减少等待时间，因此强烈建议使用P2P接口。%n%n§2本任务作为如何使用P2P接口的指南。§r%n%n与任何P2P连接一样，需要一个输入端，在此情况下，输入端存放§6ME样板§r。%n%n[img height=1000]betterquesting:textures/QB_P2P_Interface1.png[/img]%n%n将样板插入第一个P2P接口后，放置其余所需的输出接口，并使用§6内存卡§r将它们连接在一起。%n%n在下图中，绿色高亮的P2P接口存储样板，而蓝色的则是输出接口，用于将机器连接到ME系统。%n%n[img height=1000]betterquesting:textures/QB_P2P_Interface2.png[/img]%n%n确保在所有输出P2P接口上启用阻挡模式，以防止堵塞和多个配方试图在同一台机器上同时执行。%n%n[img height=1000]betterquesting:textures/QB_P2P_Interface3.png[/img]%n%n最后，将所需的机器放置在输出P2P接口处，并添加一种在操作完成后取回物品的方法，本例中使用输入总线。%n%n[img height=1000]betterquesting:textures/QB_P2P_Interface4.png[/img]%n

# Quest: ME-IO端口
betterquesting.quest.4DM_-wpzThCM_KaSMIPmNA.name=ME-IO端口
betterquesting.quest.4DM_-wpzThCM_KaSMIPmNA.desc=§3ME-IO端口§r可以将存储单元的内容快速传输到ME网络并输出空存储单元。

# Quest: 空间IO
betterquesting.quest.5PE7heWhR4qG8AcOcZ0VWQ.name=空间IO
betterquesting.quest.5PE7heWhR4qG8AcOcZ0VWQ.desc=§3空间IO§r是一种在你的世界中剪切粘贴空间体积的方法。它的工作原理是将定义的体积与空间存储维度中相同大小的体积交换，将空间塔阵列中的任何内容发送到空间存储维度，并将维度中的任何内容发送到空间塔阵列。%n%n空间IO需要其组件的特定排列才能运行，并定义要剪切粘贴的体积。所有组件必须在同一网络上才能运行，并且一个网络上只能有一个空间IO设置。因此，建议使用子网络。%n%n§3空间IO端口§r控制空间IO操作。它显示多方块设置的统计信息，并容纳空间元件。%n%n要执行空间IO操作，请将§6空间存储元件§r放入输入槽中，并向空间IO端口提供红石脉冲。然后它将把空间塔中的体积与空间存储维度中的体积交换。这意味着，如果你将一组方块发送到空间存储维度，然后将另一组方块放入空间塔，将元件放回输入槽，并再次触发IO端口，第二组方块将消失，第一组方块将重新出现。%n%n定义体积内的任何实体（包括你）都将被带走，如果你没有办法出去，你将被困在空间存储维度中。%n%n§3空间塔§r是空间IO设置的主要部分，并定义要影响的体积。该体积由空间塔外部的边界框向内收缩1个方块来定义。

# Quest: AE2 修改
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARg.name=AE2 修改
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARg.desc=在此整合包中，§d应用能源2§r已进行调整，以更好地融入§dNTM (Nuclear Tech Mod)§r。许多组件的配方已被修改，加入了NTM的材料，部分机器的功能也已被转移，比如§3石英磨具§r和§3压印器§r的功能分别转移到了NTM的§3粉碎机§r和§3锻压机§r中。AE2陨石也已被移除，但用于建筑的§6陨石块§r仍可通过合成获得。%n%n本章任务的信息来源于 FTB Wiki，如果任务书中还有其他遗漏的信息，请访问该 Wiki。%n%n[url]https://ftbwiki.org/Applied_Energistics_2[/url]%n%n请注意：§2NTM 的流体与AE2不兼容。

# Quest: 赛特斯石英水晶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARw.name=赛特斯石英水晶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAARw.desc=§6赛特斯石英§r是应用能源2中的重要材料。挖掘赛特斯石英矿石时可获得4个赛特斯石英，产量会受到工具的时运附魔的影响。在§6石英切割刀§r等基本工具的配方中，赛特斯石英通常可以与§6下界石英§r互换。赛特斯石英矿石可以酸化或离心以获得额外的产出。%n%n§2赛特斯石英在后期可以在化工厂中使用下界石英生产得到。§r

# Quest: 晶体催生仓
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATA.name=晶体催生仓
betterquesting.quest.AAAAAAAAAAAAAAAAAAAATA.desc=§3晶体催生仓§r是一个可以让在其中的水晶种子加速生长的机器。同时，晶体是在机器中生长的，而不是掉落物形式。

# Quest: 无线终端
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAXQ.name=无线终端
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAXQ.desc=§3安全终端§r可用于指定哪些玩家被允许与ME网络交互，这在多人游戏中很有用。它也可用于将§6无线终端§r链接到ME网络。至少需要一个§3无线接入点§r，其范围可以使用§6无线增强器§r扩大。

# Quest: 存储组件
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAYQ.name=存储组件
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAYQ.desc=§6ME存储外壳§r是§6存储元件§r的外壳。存储元件有许多等级，所有等级都需要使用NTM机器来制作。

# Quest: 福鲁伊克斯水晶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAbA.name=福鲁伊克斯水晶
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAbA.desc=§6福鲁伊克斯水晶§r是一种在模组中用作合成的物品。水晶有两种形式，普通福鲁伊克斯水晶和§6高纯福鲁伊克斯水晶§r。%n%n要合成福鲁伊克斯水晶，必须将1颗§6充能赛特斯石英水晶§r、1颗§6下界石英§r和1份§6红石粉§r丢入§b水池§r中。它们将被消耗并生成2个福鲁伊克斯水晶。%n%n§2福鲁伊克斯水晶稍后可以在化工厂使用充能赛特斯石英水晶和红石制造。§r

# Quest: 晶体催生器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcQ.name=晶体催生器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcQ.desc=§3晶体催生器§r是一种利用电力加速晶体纯化过程的机器。这一过程将水晶种子转化为完全生长的高纯版本。

# Quest: 充能器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcw.name=充能器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAcw.desc=§3充能器§r是一种消耗电力将赛特斯石英充电到充能状态的机器。

# Quest: 线缆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAeQ.name=线缆
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAeQ.desc=§6ME玻璃线缆§r是一种用于在ME网络中的设备之间传输数据和能量的线缆。它能够同时传输8个频道的数据。%n%n§6石英纤维§r只用于传输能量，而非频道，从而使得子网络成为可能。%n%n§6线缆锚§r可用于分隔ME线缆连接。它们也可用于为线缆制作§6覆盖板§r。

# Quest: 能源接收器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAew.name=能源接收器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAew.desc=§3能源接收器§r将能量传输到ME系统中。结合§3HE→RF转换器§r，可以给ME系统供电。%n%n[img height=1000]betterquesting:textures/QB_EnergyAcceptor.png[/img]

# Quest: ME终端
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAfA.name=ME终端
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAfA.desc=§3ME 终端§r用于访问 ME 网络中的所有可用物品，包括可制作的物品。

# Quest: ME驱动器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAfQ.name=ME驱动器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAfQ.desc=§3ME驱动器§r作为ME系统的存储器，其中可以放置存储单元用以存储大量物品。

# Quest: ME接口
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAfg.name=ME接口
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAfg.desc=§3ME接口§r是一个允许ME网络与机器、管道交互的方块。它们本身可以用于自动存储物品，但以后可以与§6编码样板§r一起用于自动合成。

# Quest: ME控制器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAgA.name=ME控制器
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAgA.desc=§3ME控制器§r充当ME网络的路由器。控制器能够在每个面提供§e32个频道§r用于在整个ME网络中传输数据。§6ME致密电缆§r是唯一可以同时支持32个频道的电缆，因此它可以用作连接到另一个ME控制器的主数据线，也可以通过§6ME玻璃电缆§r、§6ME包层电缆§r（降低卡顿）或§6ME智能电缆§r（显示使用的频道数量）分支成8个频道分配线，以连接网络中的所有设备和多方块结构。

# Quest: ME总线
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAgg.name=ME总线
betterquesting.quest.AAAAAAAAAAAAAAAAAAAAgg.desc=§3ME输出总线§r是一种用于将物品从ME网络导出到机器或其他容器的总线。 %n%n§3ME输入总线§r是一种用于将物品从机器或其他容器直接导入ME网络的总线。%n%n§2出于性能原因，建议使用接口而非输出/输入总线。§r

# Quest: 量子无限增幅器
betterquesting.quest.EPrM6umbSw2e8c3-9XF9Wg.name=量子无限增幅器
betterquesting.quest.EPrM6umbSw2e8c3-9XF9Wg.desc=§6无限增幅卡§r允许玩家跨越任何距离和维度访问他们的ME系统。要应用它，只需打开§6无线合成终端§r并将卡片插入其中即可。

# Quest: P2P
betterquesting.quest.Ig84-U5cRH-rxH76bIGE9A.name=P2P
betterquesting.quest.Ig84-U5cRH-rxH76bIGE9A.desc=§6P2P§r通道或 "点对点通道 "是一种多功能可配置系统，可通过现有的ME网络将物品/红石/电力/液体从一个位置传输到另一个位置，无需存储。%n%nP2P通道中§e一个输入端可以对应N个输出端§r。这意味着你可以向任意多个点输出，但每条通道只能有一个输入端。 %n%nME网络可以支持任意数量、任意类型的隧道，而且它们都能独立运行。%n%nP2P通道 - ME可用于将频道从一个位置传输到另一个位置，最多可传输§e32 个频道§r，与§6ME密集线缆§r相同，而每个输入/输出端只需一个频道，这使得P2P通道成为扩展网络（尤其是远距离网络）的一个非常强大的工具。然而，P2P通道的灵活性也带来了限制，一条P2P通道的频道不能被另一条P2P通道所传输，这意味着不能递归嵌套P2P通道。 %n%n要配置P2P通道，首先必须设定P2P通道的类型以传输所需的内容，然后配置输出端到输入端。你可以使用§6内存卡§r配置连接。首先 Shift+右键单击输入端，将其位置保存在内存卡上，然后右键单击其他位置的输出端，将输入端连接到输出端上。 %n%n§2也可以制作内存卡的高级版本，与整个网络互动。§r

# Quest: 无线合成终端
betterquesting.quest.Iyj0bDhVRpCgzmAF4vP30A.name=无线合成终端
betterquesting.quest.Iyj0bDhVRpCgzmAF4vP30A.desc=§6无线终端§r的升级版本，能够在移动中合成物品。

# Quest: P2P 接口
betterquesting.quest.Kcfw9puQQo-iehBFrlOp4g.name=P2P 接口
betterquesting.quest.Kcfw9puQQo-iehBFrlOp4g.desc=§3P2P接口§r是一种P2P设备，可用于在多台机器上轻松地并行执行配方。

# Quest: 能源元件
betterquesting.quest.Npl3Ifl9RvW8JZRicJaP2A.name=能源元件
betterquesting.quest.Npl3Ifl9RvW8JZRicJaP2A.desc=§3能源元件§r充当ME网络的电池。当ME系统开始消耗大量电力时它的作用就会体现，作为能量缓冲区以保证机器不会不断地启停。

# Quest: 升级卡
betterquesting.quest.Qxy7Wf9WRnG-vIisndmV0g.name=升级卡
betterquesting.quest.Qxy7Wf9WRnG-vIisndmV0g.desc=§6升级卡§r可以修改 ME 的各种组件，例如加快它们的速度或使用红石控制它们。

# Quest: 无线连接器
betterquesting.quest.ReqBRrKdR2WFSp9ILSPk5w.name=无线连接器
betterquesting.quest.ReqBRrKdR2WFSp9ILSPk5w.desc=§3无线连接器§r允许在没有ME线缆的情况下进行频道连接，从而可以通过墙壁发送频道。连接器之间的距离越远，能耗就越高。%n%n§3无线集线器§r可用于在多个无线连接器之间链接频道。

# Quest: 网络工具
betterquesting.quest.VE7Ty89_SMW45uAVQdD32g.name=网络工具
betterquesting.quest.VE7Ty89_SMW45uAVQdD32g.desc=§6网络工具§r，当右键单击任何网络设备时，将弹出该工具的界面，显示连接到网络的所有设备以及网络详细信息。与任何扳手一样，Shift右击线缆将其移拆除。

# Quest: AE2自动合成
betterquesting.quest.WUUIPZ-KQFCpsXAcpOxwqw.name=AE2自动合成
betterquesting.quest.WUUIPZ-KQFCpsXAcpOxwqw.desc=§2本任务作为如何使用ME系统订购物品的指南。示例物品为模拟电路板。§r%n%n有了提供物品存储的§3ME驱动器§r，以及§3合成CPU§r和§3ME接口§r，就可以请求合成任何物品。下图使用了§3分子装配室§r、§3焊接台§r、§3电动锻压机§r以及两个用作焊接台和锻压机输出的§3输入总线§r。%n%n[img height=1000]betterquesting:textures/BQ_Auto1.png[/img]%n%n自动化合成配方的第一步是编码§6ME样板§r。有两种样板类型：合成样板和处理样板。合成样板通过将§3样板终端§r设置为工作台模式来创建。将物品放入终端后，点击箭头完成配方编码。%n%n[img height=1000]betterquesting:textures/BQ_Auto2.png[/img]%n%n对于不在工作台内合成的配方，例如§6线§r和§6模拟电路板§r本身，需要将样板终端切换到处理模式（熔炉图标）。%n%n[img height=1000]betterquesting:textures/BQ_Auto3.png[/img]%n%n所有样板创建完成后，将其插入各自的ME接口中。%n确保在接口上启用阻挡模式，以免多个不同配方同时进入ME接口。%n%n[img height=1000]betterquesting:textures/BQ_Auto4.png[/img]%n%n最后，一切设置完成后，在ME终端中会显示下单物品的选项。%n%n[img height=1000]betterquesting:textures/BQ_Auto5.png[/img]%n

# Quest: 元件工作台
betterquesting.quest._RJ-wMmFRWepNEgav4H2ZQ.name=元件工作台
betterquesting.quest._RJ-wMmFRWepNEgav4H2ZQ.desc=§3元件工作台§r允许对元件进行过滤以接受特定物品。在为§e基岩矿石加工§r搭建子网络时，元件工作台可能非常有用。

# Quest: ME存储总线
betterquesting.quest.b4Wb4VV0RkSBMjTUJj8Idg.name=ME存储总线
betterquesting.quest.b4Wb4VV0RkSBMjTUJj8Idg.desc=当§3ME存储总线§r连接到具有库存的方块/实体（通常是存储单元，如箱子或§3抽屉控制器§r）时，它将会把连接到的库存容器纳入ME网络系统中。%n

# Quest: 样板容量卡
betterquesting.quest.d4NudAjPT3G3f26jL0-SaA.name=样板容量卡
betterquesting.quest.d4NudAjPT3G3f26jL0-SaA.desc=§6样板容量卡§r可用于在§3ME接口§r中为样板增加9个额外槽位。最多可插入3张卡片。

# Quest: 量子网桥
betterquesting.quest.di_RfA7kSDGB_3iCgsfVaQ.name=量子网桥
betterquesting.quest.di_RfA7kSDGB_3iCgsfVaQ.desc=§3量子网环§r是一个多方块结构，它将2个可能相距遥远，甚至不同维度的ME网络连接在一起。通过制作8个§3ME量子环§r和一个§3ME量子链接仓§r，并将ME量子链接仓置于中心，再用8个ME量子环围绕而成。%n%n[img height=1000]betterquesting:textures/QB_Qring1.png[/img]%n%n量子网环需要电源才能运行。在量子网环连接之前，必须从其所连接的网络中提供能源；此时，任何一侧的能源都可以使用。但是，如果量子网环断电，连接将会断开，并且将从网桥打开的一侧消耗能源，以尝试恢复连接。%n%n要在 2 个量子网桥之间建立链接，您必须在其中放置一对§6量子纠缠态奇点§r。每个量子网桥只能连接到另一个量子网桥。%n%n[img height=1000]betterquesting:textures/QB_Qring2.png[/img]%n%n可以通过在放置了64k存储组件的§3物质聚合器§r内输入256k个任意方块来产生一个AE2奇点。将一个奇点和末影粉丢在地上，然后在旁边进行任何爆炸（苦力怕、TNT、迷你TNT等）将会产生一对量子缠绕态奇点。

# Quest: 加速卡
betterquesting.quest.g0hMKPOqRWKCKtSyhQtPsA.name=加速卡
betterquesting.quest.g0hMKPOqRWKCKtSyhQtPsA.desc=§6加速卡§能够提升各种AE2设备的运行速度。

# Quest: ME致密线缆
betterquesting.quest.gZL_U2jPTZe5oDt8FcJ2QQ.name=ME致密线缆
betterquesting.quest.gZL_U2jPTZe5oDt8FcJ2QQ.desc=§6ME致密线缆§r可用于从§3ME控制器§r传输§e32个频道§r。%n%n一个控制器最多可以连接6条致密线缆，每条线缆又可以分支到4条较小的线缆，最终可以将多达192个ME设备连接到网络。%n%n§6ME智能线缆§r还显示已使用的频道数量，但众所周知，其性能不如ME致密包层线缆。%n%n此外，还有16种用染料制成的彩色线缆。彩色线缆不会连接到除同色电缆和默认色以外的任何其他电缆。

# Quest: 分子装配室
betterquesting.quest.h0nPHR-TSQWbZhxIF9pAsA.name=分子装配室
betterquesting.quest.h0nPHR-TSQWbZhxIF9pAsA.desc=§3分子装配器§r用于自动合成任何可在合成台上合成的物品。

# Quest: 合成CPU
betterquesting.quest.ku71W0ZTQkOsyV4SQ0pPLA.name=合成CPU
betterquesting.quest.ku71W0ZTQkOsyV4SQ0pPLA.desc=合成处理单元（Crafting Processing Unit，简写为CPU）是由§3并行处理单元§r和§3合成存储器§r组成的多方块结构。当它们并排放置时，它们形成一个CPU，在通过§3ME接口§r下订单时使用。并行处理单元越多，CPU可以并行执行的任务就越多，而更多的合成存储器允许执行更大的订单。

# Quest: ME样板
betterquesting.quest.lFAX1X73QMiTSYhQ3ozq_g.name=ME样板
betterquesting.quest.lFAX1X73QMiTSYhQ3ozq_g.desc=§6空白模板§r用于对§3ME接口§r中使用的配方进行编码。它们可以在§3ME样板终端§r中编写配方。

# Quest: 网络可视化工具
betterquesting.quest.mH0ic-3aRnOZ8FjP-n9qYw.name=网络可视化工具
betterquesting.quest.mH0ic-3aRnOZ8FjP-n9qYw.desc=§6网络可视化工具§r用于通过右键单击 ME 网络中的任何方块来可视化 ME 网络，这在创建大型网络时非常有用，尤其是使用§3P2P§r的网络。

# Quest: ME子网
betterquesting.quest.n0clnMBkRw2Y4Asw6b1vJQ.name=ME子网
betterquesting.quest.n0clnMBkRw2Y4Asw6b1vJQ.desc=§e子网络§r是可以从§e主网络§r访问的ME网络。在§dNTM§r§r中，它们可用于存储被动生产过程的物品，而不会使主存储网络过载。%n%n§2本任务作为如何设置子网络的指南，可用于存储基岩矿石加工产生的资源。§r%n%n下图中有两个ME网络，§c红色§r的是§c主网络§r，§9蓝色§r的是§9子网络§r。%n%n[img height=1000]betterquesting:textures/BQ_NET1.png[/img]%n%n为此任务的目的，主网络将存储泥土块，而子网络将存储铜块。%n%n[img height=1000]betterquesting:textures/BQ_NET2.png[/img]%n%n[img height=1000]betterquesting:textures/BQ_NET3.png[/img]%n%n要使子网络的内容（铜块）对主网络可见，必须使用§3ME接口§r-§3存储总线§r的组合。存储总线必须位于主网络一侧。%n%n[img height=1000]betterquesting:textures/BQ_NET4.png[/img]%n%n确保过滤主网络存储总线，并将其设置为“仅提取”。%n%n[img height=1000]betterquesting:textures/BQ_NET5.png[/img]%n%n现在主网络可以访问子网络上存储的材料，这些材料可用于合成。%n%n[img height=1000]betterquesting:textures/BQ_NET6.png[/img]

# Quest: 溢出销毁卡
betterquesting.quest.xyHVMuUHQjSWbujlx1EMqw.name=溢出销毁卡
betterquesting.quest.xyHVMuUHQjSWbujlx1EMqw.desc=§6溢出销毁卡§r是仅可用于§6存储原件§r的升级卡。它可以通过§3元件工作台§r添加到存储元件中。

# Quest Line: 开放式电脑
betterquesting.questline.7qWugdC9QfGJ31NktB0YqA.name=开放式电脑
betterquesting.questline.7qWugdC9QfGJ31NktB0YqA.desc=使用开放式电脑来监控和控制复杂的机器设备。

# Quest: 内存条
betterquesting.quest.-0Jqqg9TRmCEikNnquKeuA.name=内存条
betterquesting.quest.-0Jqqg9TRmCEikNnquKeuA.desc=§6内存§r就像§6CPU§r一样，是所有计算机中必不可少的部分。%n%n根据CPU的体系结构，内存对计算机能做什么和不能做什么有着非常重要的影响。例如，对于标准的Lua体系结构，它控制着Lua脚本可以使用的实际内存量。这意味着要运行更大、更占用内存的程序，你将需要更多的内存。

# Quest: 中央处理器
betterquesting.quest.-SW2UUweSLCzJBCGcIm3nw.name=中央处理器
betterquesting.quest.-SW2UUweSLCzJBCGcIm3nw.desc=§6中央处理器§r（CPU）是每台计算机或§6服务器§r的核心部分。它定义了计算机的体系结构，以及在停止工作之前可以连接到计算机的组件数量。%n更高级的CPU还为计算机提供了更高的每tick直接调用限制——简单来说：更好的CPU运行得更快。

# Quest: 因特网卡
betterquesting.quest.1azNAAjWQLaNJLrVXT0W9w.name=因特网卡
betterquesting.quest.1azNAAjWQLaNJLrVXT0W9w.desc=§6因特网卡§r使计算机能够访问互联网。它提供了执行简单HTTP请求以及打开可以读写纯TCP客户端套接字的方法。%n%n在计算机中安装因特网卡还会附加一个包含一些与互联网相关应用程序的自定义文件系统，例如用于从粘贴板下载和上传片段以及允许从任意HTTP URL下载数据的“wget”克隆。

# Quest: 晶体管
betterquesting.quest.43PzmZVaTwS5ZaPt_fhugg.name=晶体管
betterquesting.quest.43PzmZVaTwS5ZaPt_fhugg.desc=§6晶体管§r是开放式电脑中最基本的制作原料之一。它主要用于制作§6微芯片§r和其他电子产品。

# Quest: 微芯片
betterquesting.quest.5uHqD8E4RmWlcVca_5CJnQ.name=微芯片
betterquesting.quest.5uHqD8E4RmWlcVca_5CJnQ.desc=§6微芯片§r是电子元件制作的基本材料。它们有不同的等级，用于制作不同等级的组件。

# Quest: 磁盘驱动器
betterquesting.quest.6wQAgmUHTxavpGXJvZVhmA.name=磁盘驱动器
betterquesting.quest.6wQAgmUHTxavpGXJvZVhmA.desc=§3磁盘驱动器§r可用于通过连接到它的计算机读取§6软盘§r。%n%n这对于入门很有用，因为较低等级的§3机箱§r没有内置的软盘插槽，而你需要一个操作系统来启动计算机。

# Quest: 扩展卡基板
betterquesting.quest.70KciiqATFCPJR3s6eoIMg.name=扩展卡基板
betterquesting.quest.70KciiqATFCPJR3s6eoIMg.desc=§6扩展卡基板§r是开放式电脑中卡片组件（如§6显卡§r和§6网卡§r）的常见制作材料。

# Quest: 机器人装配器
betterquesting.quest.7gCyEqlyTQqqnNxQ1cLt-A.name=机器人装配器
betterquesting.quest.7gCyEqlyTQqqnNxQ1cLt-A.desc=§3电子装配器§r是一个先进的工作站，可用于构建更复杂的电子设备，例如§3机器人§r、§3无人机§r和§6平板电脑§r。%n%n它们需要大量的能量来组装设备，因此建议使用§3电容器组§r为其充分供电。

# Quest: 无线网卡
betterquesting.quest.8Bbui0CiRRm3hXTYH-ELpQ.name=无线网卡
betterquesting.quest.8Bbui0CiRRm3hXTYH-ELpQ.desc=§6无线网卡§r是§6网卡§r的升级版本，可以发送和接收无线网络消息。%n %n二级卡也可以发送和接收有线消息。信号强度直接控制可以接收到发送消息的距离，强度等于以方块为单位的距离。

# Quest: 欢迎使用开放式电脑!
betterquesting.quest.90cLqSYpT8OevVo7UEEaGA.name=欢迎使用开放式电脑!
betterquesting.quest.90cLqSYpT8OevVo7UEEaGA.desc=§dOpenComputers§r是一个非常实用的模组，它可以让你自动化许多即使使用ME系统也无法完成的流程。%n%n请务必经常查阅§6OC手册§r，因为它提供了任务书未涵盖的额外信息。

# Quest: 控制与逻辑运算单元
betterquesting.quest.ABODDDQgRrGXZdmgdHJ7Sg.name=控制与逻辑运算单元
betterquesting.quest.ABODDDQgRrGXZdmgdHJ7Sg.desc=§6控制单元§r用于制造§6CPU§r和§6组件总线§r。%n%n§6算术逻辑单元§r用于制作执行计算的组件，如CPU和§6显卡§r。

# Quest: PWR控制程序
betterquesting.quest.DkfWKyKpReuU8BkzSMH3Xw.name=PWR控制程序
betterquesting.quest.DkfWKyKpReuU8BkzSMH3Xw.desc=§dNTM§r提供了一个内置的§6软盘§r用于监控§3PWR§r反应堆。%n%n§2本任务作为如何使用PWRangler软盘设置开放式电脑计算机的指南。§r%n%n首先，必须构建一台安装了OpenOS的开放式电脑计算机。为此任务的目的，将使用的计算机将使用§b三级§r组件。%n%n[img height=1000]betterquesting:textures/QB_OC1.png[/img]%n%n[img height=1000]betterquesting:textures/QB_OC2.png[/img]%n%n启动电脑后，安装OpenOS。%n%n电脑重新启动后，将OpenOS软盘换成PWRangler软盘。插入后，输入§oinstall§r将PWRangler安装到系统上。%n%nPWR需要使用直接连接到控制器的开放式电脑线缆链接到计算机。%n%n[img height=1000]betterquesting:textures/QB_OC3.png[/img]%n%n最后，在计算机中输入§oPWRangler§r以启动程序。%n%n[img height=1000]betterquesting:textures/QB_OC4.png[/img]%n

# Quest: 磁盘驱动器
betterquesting.quest.EdeL97xNTSmiLfPQpCJiow.name=磁盘驱动器
betterquesting.quest.EdeL97xNTSmiLfPQpCJiow.desc=§6硬盘驱动器§r是开放式电脑中更高级的存储介质。%n%n所有存储介质的性能相同：更高级的存储提供更多的空间。还有一些设备只能使用磁盘驱动器（尽管服务器可以使用外部磁盘驱动器）。硬盘驱动器可以放置在§3磁盘阵列§r中，允许多个驱动器共享同一个文件系统。请注意，将硬盘放入磁盘阵列会擦除驱动器中的内容。

# Quest: 组件总线
betterquesting.quest.GWpBgrTUR6aiNelNbOLRWQ.name=组件总线
betterquesting.quest.GWpBgrTUR6aiNelNbOLRWQ.desc=§6组件总线§r是一种服务器专用的升级部件，它允许服务器在不关闭的情况下同时与更多的组件进行通信。%n%n与§6CPU§r类似，更高级的总线提供了更高的组件限制。更高级的服务器也能够容纳更多的组件总线，从而允许与更多的组件进行通信。

# Quest: 服务器
betterquesting.quest.QFKT5L7RSrKQIz-qYhUsVg.name=服务器
betterquesting.quest.QFKT5L7RSrKQIz-qYhUsVg.desc=§6服务器§r是一种更高级的计算机。%n%n它们可以通过手持并右键单击来配置——例如像打开背包一样。服务器在安装到机架中后，也可以通过激活它们（瞄准机架正面的相应位置）来配置。要运行，服务器必须放置在§3机架§r内。

# Quest: 机箱
betterquesting.quest.XfkIHFJDRgSIyYD_F5b05g.name=机箱
betterquesting.quest.XfkIHFJDRgSIyYD_F5b05g.desc=§3机箱§r分为三个不同的等级，它们限制了内部可以放置的组件数量。

# Quest: 显卡
betterquesting.quest.b14L2QcPTRiHysGkQNkTUQ.name=显卡
betterquesting.quest.b14L2QcPTRiHysGkQNkTUQ.desc=§6显卡§r是大多数计算机的重要组成部分，它允许计算机在连接的§3显示屏§r上显示文本。%n%n显卡有多个等级，与显示屏一样，支持不同的分辨率和色深。

# Quest: 显示屏
betterquesting.quest.fS6P083FQGWwxARPYM4eaA.name=显示屏
betterquesting.quest.fS6P083FQGWwxARPYM4eaA.desc=§3显示屏§r与§6显卡§r结合使用，允许计算机显示文本。不同的显示屏等级具有不同的能力，例如支持不同的分辨率和色深。显示屏的范围从低分辨率单色显示器到高达256色的高分辨率显示器。

# Quest: 开放式电脑供能
betterquesting.quest.l3OJx_niTg-UyYUoyOXYfg.name=开放式电脑供能
betterquesting.quest.l3OJx_niTg-UyYUoyOXYfg.desc=§6线缆§r用于连接相距较远的计算机和机器。如果你的建筑布局紧凑，所有组件都相互接触（直接或间接，大多数方块的行为也与线缆类似），通常不需要线缆。%n%n§3能量转换器§r是将其他模组电力系统的能量转换为OpenComputers内部能量的最快方式。在旁边放置一个§3HE→RF转换器§r也可以。%n%n§3电容器§r存储能量供网络使用，在需要时充当能量缓冲区。对于需要大量能量的任务（例如组装或为机器人和无人机等设备充电）非常有用。

# Quest: 开放式电脑
betterquesting.quest.zElcW5PDQwGOvbKnyroWEQ.name=开放式电脑
betterquesting.quest.zElcW5PDQwGOvbKnyroWEQ.desc=§3键盘§r需要在§3显示屏§r上输入文本，无论是世界中的显示屏还是内置于§3机器人§r或§6平板电脑§r等设备中的显示屏。%n%n键盘要与世界中的显示屏配合使用，必须放置在显示屏旁边，朝向显示屏，或者直接放置在显示屏上（顶部或侧面）。%n%n§6EEPROM§r包含了用于在计算机启动时初始化计算机的代码。%n%n这些数据以纯字节数组的形式存储，对于不同的§6CPU§r架构可能有不同的含义。例如，对于Lua来说，它通常是一个搜索带有初始化脚本的文件系统的小脚本；对于其他架构，它可能是实际的机器码。%n%n§6OpenOS磁盘§r可以使用一张空白软盘和一本手册来制作。

# Quest Line: 杀戮时刻
betterquesting.questline.DR3m8TVpSxKspj_MDcVlIA.name=杀戮时刻
betterquesting.questline.DR3m8TVpSxKspj_MDcVlIA.desc=你这个怪物。

# Quest: 杀戮时刻(猪)
betterquesting.quest.0LPqIRRCTuayXjyNUaboNA.name=杀戮时刻(猪)
betterquesting.quest.0LPqIRRCTuayXjyNUaboNA.desc=打开烤架,嗯... 我们需要更多的肉.

# Quest: 杀戮时刻(猪人)
betterquesting.quest.2R1OOnI5S0K57TglRYmGng.name=杀戮时刻(猪人)
betterquesting.quest.2R1OOnI5S0K57TglRYmGng.desc="僵尸猪人"？那些僵尸在搞什么鬼？!也许晚上你必须把你的动物关好...

# Quest: 杀戮时刻(牛)
betterquesting.quest.6nKJ4mC3QB-i5nx8UXrPew.name=杀戮时刻(牛)
betterquesting.quest.6nKJ4mC3QB-i5nx8UXrPew.desc=我觉得需要一个新的背包. 让我们宰几头牛.

# Quest: 杀戮时刻(女巫)
betterquesting.quest.8G4ZvwvWQpihM6NfflMw7A.name=杀戮时刻(女巫)
betterquesting.quest.8G4ZvwvWQpihM6NfflMw7A.desc=女巫既可恨又危险,她们总是躲在远处向你扔药水.要小心!

# Quest: 面具人
betterquesting.quest.8b6batCvQvCiGknitRMrSQ.name=面具人
betterquesting.quest.8b6batCvQvCiGknitRMrSQ.desc=Maskman is first NTM boss. To summon it, you should be under radiation poisoning (50 rad). Just wait for him to arrive.

# Quest: §4§lMEGAKILL!
betterquesting.quest.C7CLvAjyQUy2aNW1HiA7Ow.name=§4§lMEGAKILL!
betterquesting.quest.C7CLvAjyQUy2aNW1HiA7Ow.desc=You killed them all! §cYou're monster!

# Quest: 杀戮时刻(鸡)
betterquesting.quest.G8aNnibAQVuX1SG7XfuaeQ.name=杀戮时刻(鸡)
betterquesting.quest.G8aNnibAQVuX1SG7XfuaeQ.desc=别叫了,没用的. 乖乖变成鸡汤吧！

# Quest: 杀戮时刻(岩浆怪)
betterquesting.quest.JVB4_UIXR9SI2W66FWBnMw.name=杀戮时刻(岩浆怪)
betterquesting.quest.JVB4_UIXR9SI2W66FWBnMw.desc=Now a Hell version of your slime!

# Quest: 杀戮时刻(羊)
betterquesting.quest.NASNKN6AQ52JY7XDbODGYQ.name=杀戮时刻(羊)
betterquesting.quest.NASNKN6AQ52JY7XDbODGYQ.desc=哦不,别是那可怜的羊! 羊毛满是血,我好伤心.

# Quest: 杀戮时刻(烈焰人)
betterquesting.quest.Q70rGIFTR6uMPmobimGr9g.name=杀戮时刻(烈焰人)
betterquesting.quest.Q70rGIFTR6uMPmobimGr9g.desc=你应该小心这个任务,强烈推荐火焰保护.

# Quest: 火星入侵者飞船
betterquesting.quest.Q8FZdwiURgC2PoD4IziLJg.name=火星入侵者飞船
betterquesting.quest.Q8FZdwiURgC2PoD4IziLJg.desc=火星入侵者飞船是游戏后期的BOSS，击败它可以获得§6UFO硬币§r，这种硬币可用于制作建筑机器人。%n%n可以通过制作火星入侵者飞船物品来召唤它。

# Quest: 杀戮时刻(凋灵骷髅)
betterquesting.quest.R08JrEz2SLGeV9zwAFydaQ.name=杀戮时刻(凋灵骷髅)
betterquesting.quest.R08JrEz2SLGeV9zwAFydaQ.desc=借尔项上§o头颅§r一用!!! <-- 这是每一个玩家看到凋灵骷髅心里想的吧.%n%n要是你还不知道的话,这里提一句,将4个灵魂沙摆成竖着的T形,然后在上头放3个凋灵骷髅头,你就能召唤出凋灵BOSS了. 别在你的基地里这么干.

# Quest: 杀戮时刻(冰原狼)
betterquesting.quest.VJ3wiNZTRLK4so7T-93nqw.name=杀戮时刻(冰原狼)
betterquesting.quest.VJ3wiNZTRLK4so7T-93nqw.desc=这些狼不喜欢你靠近它们或给它们骨头!一开始是中立的,但接近它们后,它们就会敌视你并变得极度危险.它们会马上把骨头从你身上扯下来!这些狼一般会出现在冰雪森林(snowy-forest)生物群系.

# Quest: 杀戮时刻(史莱姆)
betterquesting.quest.Z-RsAsrVRM2a3zWP5a0OsQ.name=杀戮时刻(史莱姆)
betterquesting.quest.Z-RsAsrVRM2a3zWP5a0OsQ.desc=又黏又弹!现在有很多变种. 跟我的小朋友打个招呼,柠檬片!

# Quest: 机械蠕虫
betterquesting.quest.ZeBLQUsPS72HAxsrR9s_3g.name=机械蠕虫
betterquesting.quest.ZeBLQUsPS72HAxsrR9s_3g.desc=机械蠕虫是§dNTM§r的第二位boss。它可以通过使用面具人硬币制作的§6银钥匙§r与§e丛林地牢§r中的机械师之环交互或者制造机械蠕虫召唤物来召唤。

# Quest: 杀戮时刻(蜘蛛)
betterquesting.quest.ZpKjClvCTGe4ytw_Yu6mYQ.name=杀戮时刻(蜘蛛)
betterquesting.quest.ZpKjClvCTGe4ytw_Yu6mYQ.desc=呃呃呃啊！会爬墙的怪物，还毛茸茸的！杀了他们。快一点！注意那些女巫蜘蛛，它们会以牙还牙。

# Quest: 杀戮时刻(苦力怕)
betterquesting.quest.fsdmCm47S3KB0X1A5MZwJg.name=杀戮时刻(苦力怕)
betterquesting.quest.fsdmCm47S3KB0X1A5MZwJg.desc=谁没有经历过这个...你正忙着自己的活，挖了几个钻石，转眼间你就在床上醒来,所有物品都没了!%n%n是时候反击了!

# Quest: 杀戮时刻(僵尸)
betterquesting.quest.gLK6mwA4ShOoVbZQZlM94w.name=杀戮时刻(僵尸)
betterquesting.quest.gLK6mwA4ShOoVbZQZlM94w.desc=没人知道他们是谁,或是来自哪里.他们就是晚上很吵,而且蠢到连工作台都做不出来.

# Quest: 杀戮时刻(鱿鱼)
betterquesting.quest.hGvVPGL0SHmF0FpB4r600A.name=杀戮时刻(鱿鱼)
betterquesting.quest.hGvVPGL0SHmF0FpB4r600A.desc=美味的鱿鱼. 我们正在做冬阴功海鲜汤(Tom Yum seafood).

# Quest: 杀戮时刻(岩浆怪)
betterquesting.quest.j47Jd0IkTF66kI1LQHtDNA.name=杀戮时刻(岩浆怪)
betterquesting.quest.j47Jd0IkTF66kI1LQHtDNA.desc=在有岩浆的地方,它们到处都是,还会用火球射你.%n从空中用弓箭或弩射杀,它们就是活靶子.%n%n[note]PS: 你能在Moho找到一大堆这玩意。[/note]

# Quest: 杀戮时刻(恶魂)
betterquesting.quest.j_v3k9rtT0CrTh_RsbyO6g.name=杀戮时刻(恶魂)
betterquesting.quest.j_v3k9rtT0CrTh_RsbyO6g.desc=恶魂会向你发射爆炸性火球,但是如果你可以将他们扔过来的火球打回去的话它们也很脆弱. 你的护甲升级,火焰保护和爆炸保护!

# Quest: 杀戮时刻(末影人)
betterquesting.quest.krQA1CjtRA2eMTLNCHn7iA.name=杀戮时刻(末影人)
betterquesting.quest.krQA1CjtRA2eMTLNCHn7iA.desc=呃,花俏的传送珍珠.你需要它们.全部!现在!%n%n[note]PS：顶部的是普通末影人,底部的是特殊怪物mod版本.都怪mod特殊怪物(Special-Mobs),造就了许许多多稀奇古怪的末影人. HEE(极限末地生存)的末影人(比如愤怒的末影人)不计算在内. [/note]

# Quest: 杀戮时刻(骷髅)
betterquesting.quest.lf-pKhIVShSHFv38Gg56lg.name=杀戮时刻(骷髅)
betterquesting.quest.lf-pKhIVShSHFv38Gg56lg.desc=当你拿来射人的时候,箭矢棒棒的,但当你是被射的那个的时候,就不是什么好东西了.

# Quest: 杀戮时刻(蠹虫)
betterquesting.quest.pSowjULQT4ep05MVXa7BJQ.name=杀戮时刻(蠹虫)
betterquesting.quest.pSowjULQT4ep05MVXa7BJQ.desc=小心,它们喜欢用与石头有关的方块来伪装和克隆自己!(只对原版方块有效)可以在地牢和山丘群系里找到.还可以在水栖苦力怕生成的圆石球里找到.

# Quest: 杀戮时刻(凋灵)
betterquesting.quest.q1ilrpayTHWJ-bajd9WM1A.name=杀戮时刻(凋灵)
betterquesting.quest.q1ilrpayTHWJ-bajd9WM1A.desc=收集了几个凋灵骷髅头之后,你觉得你应该需要再多做点事--那为什么不杀一个凋灵怪？

