name: Sync Translations from NTNH

on:
  schedule:
    # Run daily at 11 PM UTC (one hour before daily-release.yml at midnight)
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NTNH-Translations
        uses: actions/checkout@v4
        with:
          path: translations
          fetch-depth: 0

      - name: Checkout NTNH (updates/upcoming branch)
        uses: actions/checkout@v4
        with:
          repository: NTNewHorizons/NTNH
          ref: updates/upcoming
          path: ntnh
          fetch-depth: 1

      - name: Sync en_US files
        run: |
          #!/bin/bash
          set -e
          
          TRANS_ROOT="translations/config"
          NTNH_ROOT="ntnh/config"
          
          # Find all en_US files in NTNH repo and copy them to translations
          find "$NTNH_ROOT" -type f -name "en_US.*" | while read ntnh_file; do
              # Get relative path from config directory
              rel_path="${ntnh_file#$NTNH_ROOT/}"
              
              # Construct target path in translations repo
              trans_file="$TRANS_ROOT/$rel_path"
              
              # Create directory if it doesn't exist
              mkdir -p "$(dirname "$trans_file")"
              
              # Copy file
              cp "$ntnh_file" "$trans_file"
              echo "Updated: $trans_file"
          done

      - name: Check for changes
        id: changes
        run: |
          cd translations
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --name-only
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          path: translations
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync en_US files from NTNH repository'
          branch: sync-translations-${{ github.run_number }}
          delete-branch: true
          title: '🔄 Sync en_US files from NTNH'
          body: |
            This PR syncs all en_US files from the main NTNH repository.
            
            These are the source files for translations.
            
            ---
            
            🤖 Auto-generated by GitHub Actions (Run #${{ github.run_number }})
          labels: |
            automation
            translations
            sync
