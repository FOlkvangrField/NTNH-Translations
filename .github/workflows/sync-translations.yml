name: Sync Translations

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'  # Run daily at 11 PM UTC

permissions:
  contents: write

jobs:
  sync:
    name: Sync translations from NTNH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout NTNH-Translations repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UNIVERSAL_FINE }}
          fetch-depth: 0

      - name: Checkout NTNH repository (updates/upcoming)
        uses: actions/checkout@v4
        with:
          repository: NTNewHorizons/NTNH
          ref: updates/upcoming
          path: ntnh-upstream
          token: ${{ secrets.UNIVERSAL_FINE }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync and convert translation files
        shell: bash
        run: |
          set -euo pipefail
          
          UPSTREAM_DIR="ntnh-upstream/config"
          WORK_DIR="${GITHUB_WORKSPACE}/config"
          
          # Remove old config directory to ensure clean sync
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          
          found=0
          converted=0
          copied=0
          
          echo "Starting file sync from NTNH (updates/upcoming)..."
          echo ""
          
          # Find all files in upstream config directory
          while IFS= read -r -d '' file; do
            found=$((found + 1))
            
            # Get relative path from upstream/config
            relpath="${file#$UPSTREAM_DIR/}"
            subdir="$(dirname "$relpath")"
            basename="$(basename "$relpath")"
            ext="${file##*.}"
            
            # Create destination directory
            mkdir -p "$WORK_DIR/$subdir"
            
            # Process based on file extension
            if [ "$ext" = "lang" ]; then
              # Convert .lang to .properties
              filename_without_ext="${basename%.lang}"
              dest="$WORK_DIR/$subdir/${filename_without_ext}.properties"
              
              # Convert .lang format to .properties format
              # - Lines like "key: value" become "key=value"
              # - Keep comment lines (starting with #) as-is
              # - Remove BOM and CRLF
              awk 'BEGIN{FS=OFS=""} /^#/ {print; next} { if (index($0, ":") && !index($0, "=")) sub(/:/, "=") ; print }' "$file" |
                sed '1s/^\xEF\xBB\xBF//' | sed 's/\r$//' > "$dest"
              
              echo "✓ Converted: $relpath → ${relpath%.lang}.properties"
              converted=$((converted + 1))
            else
              # Copy other files as-is (e.g., .properties, .txt, etc.)
              dest="$WORK_DIR/$relpath"
              
              # Copy file and strip BOM/CRLF
              sed '1s/^\xEF\xBB\xBF//' "$file" | sed 's/\r$//' > "$dest"
              
              echo "✓ Copied: $relpath"
              copied=$((copied + 1))
            fi
          done < <(find "$UPSTREAM_DIR" -type f -print0 2>/dev/null || true)
          
          echo ""
          echo "Summary:"
          echo "  Total files processed: $found"
          echo "  Converted (.lang → .properties): $converted"
          echo "  Copied (as-is): $copied"
          echo ""
          
          if [ "$found" -eq 0 ]; then
            echo "⚠️  No files found in upstream config directory."
            exit 0
          fi

      - name: Commit and push changes
        run: |
          # Remove the upstream checkout directory (don't commit it)
          rm -rf ntnh-upstream
          
          # Add all changes in config directory
          git add config
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # Count the changes
            CHANGED=$(git diff --staged --name-only | wc -l)
            echo "Committing $CHANGED changed file(s)..."
            
            git commit -m "🌐 Sync translations from NTNH (updates/upcoming)" \
                       -m "- Auto-converted .lang files to .properties format" \
                       -m "- Synced all translation files from config directory"
            
            git push origin main
            echo "✓ Pushed changes to main branch"
          fi
