name: Daily Language Pack Release
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Merge PRs from Bufka2011
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });
            for (const pull of pulls) {
              if (pull.user.login !== 'Bufka2011') continue;
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                  merge_method: 'merge'
                });
                console.log(`✅ Successfully merged PR #${pull.number}`);
              } catch (error) {
                console.log(`⚠️ Failed to merge PR #${pull.number}: ${error.message}`);
              }
            }
      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Set release name
        id: vars
        run: echo "release_name=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Calculate translation percentages
        id: percentages
        run: |
          #!/bin/bash
          set -eo pipefail
          
          shopt -s nullglob  # Prevent glob patterns from expanding to literal strings when empty
          
          function get_lang_name {
            case "$1" in
              ar_SA) echo "Arabic" ;;
              cs_CZ) echo "Czech" ;;
              da_DK) echo "Danish" ;;
              de_DE) echo "German" ;;
              el_GR) echo "Greek" ;;
              es_ES) echo "Spanish" ;;
              fi_FI) echo "Finnish" ;;
              fr_FR) echo "French" ;;
              hu_HU) echo "Hungarian" ;;
              it_IT) echo "Italian" ;;
              ja_JP) echo "Japanese" ;;
              ko_KR) echo "Korean" ;;
              nl_NL) echo "Dutch" ;;
              no_NO) echo "Norwegian" ;;
              pl_PL) echo "Polish" ;;
              pt_BR) echo "Portuguese" ;;
              ro_RO) echo "Romanian" ;;
              ru_RU) echo "Russian" ;;
              sv_SE) echo "Swedish" ;;
              tr_TR) echo "Turkish" ;;
              uk_UA) echo "Ukrainian" ;;
              zh_CN) echo "Chinese (Simplified)" ;;
              zh_TW) echo "Chinese (Traditional)" ;;
              *) echo "${1%%_*}" | tr 'a-z' 'A-Z' ;;
            esac
          }
          
          # Find English source files safely
          EN_FILES=()
          while IFS= read -r -d '' file; do
            EN_FILES+=("$file")
          done < <(find config -type f -regex '.*/en_US\.\(lang\|properties\|txt\)$' -print0 2>/dev/null || true)
          
          # Exit early if no English files found
          if [ ${#EN_FILES[@]} -eq 0 ]; then
            echo "percentages=No English source files found" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Count total translatable items
          TOTAL=0
          declare -A EN_KEYS_VALUES
          
          for en_file in "${EN_FILES[@]}"; do
            if [ ! -f "$en_file" ]; then continue; fi
            
            if grep -q '=' "$en_file" 2>/dev/null; then
              # Key-value format (.properties/.lang)
              while IFS= read -r line; do
                [[ "$line" =~ ^[[:space:]]*# ]] && continue
                [[ -z "${line// /}" ]] && continue
                key=$(echo "$line" | cut -d= -f1 | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
                [[ -z "$key" ]] && continue
                ((TOTAL++))
                EN_KEYS_VALUES["$en_file:$key"]=1
              done < <(grep -v '^[[:space:]]*#' "$en_file" 2>/dev/null | grep -v '^[[:space:]]*$' || true)
            else
              # Plain text format (.txt)
              while IFS= read -r line; do
                [[ "$line" =~ ^[[:space:]]*# ]] && continue
                [[ -z "${line// /}" ]] && continue
                ((TOTAL++))
              done < <(grep -v '^[[:space:]]*#' "$en_file" 2>/dev/null | grep -v '^[[:space:]]*$' || true)
            fi
          done
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "percentages=No translatable items found" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Find all language codes (excluding en_US)
          LANG_CODES=()
          while IFS= read -r -d '' file; do
            lang=$(basename "$file" | sed 's/\.\(lang\|properties\|txt\)$//')
            [[ "$lang" == "en_US" ]] && continue
            LANG_CODES+=("$lang")
          done < <(find config -type f -regex '.*/[a-z][a-z]_[A-Z][A-Z]\.\(lang\|properties\|txt\)$' -print0 2>/dev/null || true)
          
          LANG_CODES=($(printf '%s\n' "${LANG_CODES[@]}" | sort -u))
          
          if [ ${#LANG_CODES[@]} -eq 0 ]; then
            echo "percentages=No translation files found (other than en_US)" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Calculate percentages for each language
          declare -a RESULTS
          for lang_code in "${LANG_CODES[@]}"; do
            TRANS=0
            
            for en_file in "${EN_FILES[@]}"; do
              LANG_DIR=$(dirname "$en_file")
              EXT="${en_file##*.}"
              LANG_FILE="$LANG_DIR/${lang_code}.${EXT}"
              
              if [ ! -f "$LANG_FILE" ]; then continue; fi
              
              if grep -q '=' "$en_file" 2>/dev/null; then
                # Key-value comparison
                while IFS= read -r line; do
                  [[ "$line" =~ ^[[:space:]]*# ]] && continue
                  [[ -z "${line// /}" ]] && continue
                  key=$(echo "$line" | cut -d= -f1 | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
                  [[ -z "$key" ]] && continue
                  
                  # Check if this key exists in the translation file with a non-empty value different from source
                  if grep -q "^${key}[[:space:]]*=" "$LANG_FILE" 2>/dev/null; then
                    trans_value=$(grep "^${key}[[:space:]]*=" "$LANG_FILE" | head -n1 | cut -d= -f2- | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
                    if [ -n "$trans_value" ]; then
                      ((TRANS++))
                    fi
                  fi
                done < <(grep -v '^[[:space:]]*#' "$en_file" 2>/dev/null | grep -v '^[[:space:]]*$' || true)
              else
                # Line-by-line comparison for .txt files
                en_count=$(grep -v '^[[:space:]]*#' "$en_file" 2>/dev/null | grep -v '^[[:space:]]*$' | wc -l || echo 0)
                lang_count=$(grep -v '^[[:space:]]*#' "$LANG_FILE" 2>/dev/null | grep -v '^[[:space:]]*$' | wc -l || echo 0)
                
                # Only count if line counts match
                if [ "$en_count" -eq "$lang_count" ] && [ "$en_count" -gt 0 ]; then
                  mapfile -t en_lines < <(grep -v '^[[:space:]]*#' "$en_file" 2>/dev/null | grep -v '^[[:space:]]*$' || true)
                  mapfile -t lang_lines < <(grep -v '^[[:space:]]*#' "$LANG_FILE" 2>/dev/null | grep -v '^[[:space:]]*$' || true)
                  
                  for i in "${!en_lines[@]}"; do
                    if [ "${lang_lines[$i]:-}" != "${en_lines[$i]:-}" ] && [ -n "${lang_lines[$i]:-}" ]; then
                      ((TRANS++))
                    fi
                  done
                fi
              fi
            done
            
            PERCENTAGE=$(( (TRANS * 100 + TOTAL / 2) / TOTAL ))
            NAME=$(get_lang_name "$lang_code")
            RESULTS+=("$NAME: $PERCENTAGE%")
          done
          
          # Sort and format results
          if [ ${#RESULTS[@]} -eq 0 ]; then
            echo "percentages=Unable to calculate percentages" >> $GITHUB_OUTPUT
          else
            SORTED=$(printf '%s\n' "${RESULTS[@]}" | sort)
            echo "percentages<<EOF" >> $GITHUB_OUTPUT
            echo "$SORTED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Create unified language packs ZIP (excluding en_US)
        id: zip
        run: |
          # Create temporary directory for clean archive structure
          TEMP_DIR=$(mktemp -d)
          
          # Copy entire config directory if it exists
          if [ -d "config" ]; then
            cp -r config "$TEMP_DIR/"
          else
            echo "⚠️ No config directory found, creating empty structure"
            mkdir -p "$TEMP_DIR/config"
          fi
          
          # Remove all en_US files
          find "$TEMP_DIR/config" -type f \( -name "en_US.lang" -o -name "en_US.properties" -o -name "en_US.txt" \) -delete 2>/dev/null || true
          
          # Convert all .properties files to .lang
          while IFS= read -r -d '' f; do
            mv "$f" "${f%.properties}.lang" 2>/dev/null || true
          done < <(find "$TEMP_DIR/config" -type f -name "*.properties" -print0 2>/dev/null || true)
          
          # Create the unified ZIP archive
          ZIP_NAME="NTNH-Translations-${{ steps.vars.outputs.release_name }}.zip"
          ZIP_PATH="build_artifacts/$ZIP_NAME"
          mkdir -p build_artifacts
          
          (
            cd "$TEMP_DIR" || exit 1
            # Only create ZIP if there are files to include
            if [ -n "$(find config -type f 2>/dev/null)" ]; then
              zip -q -r "$GITHUB_WORKSPACE/$ZIP_PATH" config/ -x "*.git*" "*.DS_Store" "__MACOSX/*" "*.gitignore" 2>/dev/null || true
            else
              echo "⚠️ No translation files to package (only en_US found)"
              # Create empty ZIP to avoid release failure
              touch "$GITHUB_WORKSPACE/$ZIP_PATH"
            fi
          )
          
          # Clean up temporary directory
          rm -rf "$TEMP_DIR"
          
          # Output ZIP path for release step
          echo "zip_file=$ZIP_PATH" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          tag_name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          body: |
            📦 Unified language packs for Nuclear Tech: New Horizons
            🕒 Generated from branch `main` on ${{ steps.vars.outputs.release_name }}
          
            Translation progress:
            ${{ steps.percentages.outputs.percentages }}
          
            This release contains a single ZIP archive with **all language packs** (excluding en_US).
           
            How to use:
            1. Download the ZIP file from the release assets
            2. Extract contents to your Minecraft `config` directory
            3. Restart Minecraft to apply translations
          files: ${{ steps.zip.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
