name: Sync Translations

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync en_US translations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout upstream repo (NTNewHorizons/NTNH:updates/upcoming)
        uses: actions/checkout@v4
        with:
          repository: NTNewHorizons/NTNH
          ref: updates/upcoming
          path: upstream
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prevent adding upstream to commits (ignore locally)
        run: |
          # Ignore upstream dir locally and remove its .git so it isn't treated as a submodule
          echo "upstream/" >> .git/info/exclude || true
          rm -rf upstream/.git || true
          ls -la upstream || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync en_US files and convert .lang -> .properties
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_DIR="upstream/config"
          WORK_DIR="${GITHUB_WORKSPACE}"
          found=0

          while IFS= read -r -d '' file; do
            found=1
            relpath="${file#$UPSTREAM_DIR/}"
            subdir="$(dirname "$relpath")"
            mkdir -p "$WORK_DIR/config/$subdir"

            src="$file"
            ext="${file##*.}"

            # Only process .lang -> .properties and copy .properties files; ignore other extensions (e.g., .txt)
            if [ "$ext" = "lang" ]; then
              dest="$WORK_DIR/config/$subdir/en_US.properties"
              # Convert lines like "key: value" -> "key=value" (leave comments intact), remove CRLF and BOM
              awk 'BEGIN{FS=OFS=""} /^#/ {print; next} { if (index($0, ":") && !index($0, "=")) sub(/:/, "=") ; print }' "$src" |
                sed '1s/^\xEF\xBB\xBF//' | sed 's/\r$//' > "$dest"
              echo "Converted: config/$subdir/en_US.properties (from .lang)"
            elif [ "$ext" = "properties" ]; then
              dest="$WORK_DIR/config/$subdir/en_US.properties"
              # Copy .properties, strip BOM/CRLF
              sed '1s/^\xEF\xBB\xBF//' "$src" | sed 's/\r$//' > "$dest"
              echo "Copied: config/$subdir/en_US.properties"
            else
              # Skip other file types
              echo "Skipped (unsupported extension): $relpath"
            fi
          done < <(find "$UPSTREAM_DIR" -type f \( -name 'en_US.lang' -o -name 'en_US.properties' \) -print0)

          if [ "$found" -eq 0 ]; then
            echo "No en_US files found in upstream config. Exiting."
            exit 0
          fi

          # Add changes and show a summary
          git add config || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          else
            git commit -m "chore: sync en_US translations from NTNewHorizons/NTNH (updates/upcoming) and convert .lang -> .properties" || true
          fi

      - name: Push changes directly to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Ensure upstream isn't accidentally committed
          echo "upstream/" >> .git/info/exclude || true
          rm -rf upstream/.git || true

          # Confirm we're on main
          git checkout main || true

          # Fetch remote main
          git fetch origin main || true

          # Merge remote main to avoid non-fast-forward errors (if exists)
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            git merge --no-edit origin/main || true
          fi

          # Determine if local main has commits not on origin/main
          AHEAD=0
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count origin/main..main || echo 0)
          else
            # No origin/main exists (first push)
            AHEAD=$(git rev-list --count main || echo 0)
          fi

          if [ "$AHEAD" -gt 0 ]; then
            echo "Local 'main' is ahead by $AHEAD commit(s). Pushing to origin/main..."
            git push origin main
            echo "Pushed $AHEAD commit(s) to 'main'."
          else
            echo "No commits to push."
          fi
