- name: Calculate translation percentages
        id: percentages
        run: |
          set -euo pipefail
          
          function get_lang_name {
            case "$1" in
              ar_SA) echo "Arabic" ;;
              cs_CZ) echo "Czech" ;;
              da_DK) echo "Danish" ;;
              de_DE) echo "German" ;;
              el_GR) echo "Greek" ;;
              es_ES) echo "Spanish" ;;
              fi_FI) echo "Finnish" ;;
              fr_FR) echo "French" ;;
              hu_HU) echo "Hungarian" ;;
              it_IT) echo "Italian" ;;
              ja_JP) echo "Japanese" ;;
              ko_KR) echo "Korean" ;;
              nl_NL) echo "Dutch" ;;
              no_NO) echo "Norwegian" ;;
              pl_PL) echo "Polish" ;;
              pt_BR) echo "Portuguese" ;;
              ro_RO) echo "Romanian" ;;
              ru_RU) echo "Russian" ;;
              sv_SE) echo "Swedish" ;;
              tr_TR) echo "Turkish" ;;
              uk_UA) echo "Ukrainian" ;;
              zh_CN) echo "Chinese (Simplified)" ;;
              zh_TW) echo "Chinese (Traditional)" ;;
              *) echo "${1%%_*}" | tr 'a-z' 'A-Z' ;;
            esac
          }
          
          PERCENTAGES=""
          TOTAL=0
          declare -A EN_KEYS_VALUES
          declare -A EN_LINES
          
          # Find English files - handle case where none exist
          EN_FILES=$(find config -type f 2>/dev/null | grep -E '/en_US\.(lang|properties|txt)$' || echo "")
          
          if [ -z "$EN_FILES" ]; then
            echo "percentages=No English translation files found" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # First pass: calculate total translatable items
          while IFS= read -r en_file; do
            [ -z "$en_file" ] && continue
            [ ! -f "$en_file" ] && continue
            
            BASE=$(basename "$en_file")
            if grep -q '=' "$en_file" 2>/dev/null; then
              # Key-value format
              while IFS= read -r line; do
                if [[ "$line" =~ ^\s*# ]] || [[ -z "${line// }" ]]; then continue; fi
                key=$(echo "$line" | cut -d= -f1 | sed 's/^\s*//; s/\s*$//')
                value=$(echo "$line" | cut -d= -f2- | sed 's/^\s*//; s/\s*$//')
                if [ -n "$key" ]; then
                  EN_KEYS_VALUES["$en_file:$key"]="$value"
                  ((TOTAL++)) || true
                fi
              done < "$en_file"
            else
              # Plain lines format
              lines=()
              while IFS= read -r line; do
                lines+=("$line")
              done < <(grep -Ev '^\s*(#|$)' "$en_file" 2>/dev/null | sed 's/^\s*//; s/\s*$//' || true)
              
              if [ ${#lines[@]} -gt 0 ]; then
                EN_LINES["$en_file"]="${lines[*]}"
                TOTAL=$((TOTAL + ${#lines[@]}))
              fi
            fi
          done <<< "$EN_FILES"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "percentages=No translatable content found" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Find language codes - handle case where none exist
          LANG_CODES=$(find config -type f 2>/dev/null | grep -E '/[a-z]{2}_[A-Z]{2}\.(lang|properties|txt)$' | sed 's|.*/||; s/\..*//' | sort -u | grep -v en_US || echo "")
          
          if [ -z "$LANG_CODES" ]; then
            echo "percentages=No translation files found" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          TEMP_PERCENTAGES=""
          while IFS= read -r lang_code; do
            [ -z "$lang_code" ] && continue
            
            TRANS=0
            while IFS= read -r en_file; do
              [ -z "$en_file" ] && continue
              [ ! -f "$en_file" ] && continue
              
              LANG_DIR=$(dirname "$en_file")
              EXT="${en_file##*.}"
              LANG_FILE="$LANG_DIR/${lang_code}.${EXT}"
              
              [ ! -f "$LANG_FILE" ] && continue
              
              if grep -q '=' "$en_file" 2>/dev/null; then
                # Key-value format
                declare -A LANG_VALUES
                while IFS= read -r line; do
                  if [[ "$line" =~ ^\s*# ]] || [[ -z "${line// }" ]]; then continue; fi
                  key=$(echo "$line" | cut -d= -f1 | sed 's/^\s*//; s/\s*$//')
                  value=$(echo "$line" | cut -d= -f2- | sed 's/^\s*//; s/\s*$//')
                  if [ -n "$key" ] && [ -n "${EN_KEYS_VALUES["$en_file:$key"]:-}" ]; then
                    en_value="${EN_KEYS_VALUES["$en_file:$key"]}"
                    if [ "$value" != "$en_value" ] && [ -n "$value" ]; then
                      ((TRANS++)) || true
                    fi
                  fi
                done < "$LANG_FILE"
                unset LANG_VALUES
              else
                # Plain lines format
                en_lines=()
                lang_lines=()
                
                while IFS= read -r line; do
                  en_lines+=("$line")
                done < <(grep -Ev '^\s*(#|$)' "$en_file" 2>/dev/null | sed 's/^\s*//; s/\s*$//' || true)
                
                while IFS= read -r line; do
                  lang_lines+=("$line")
                done < <(grep -Ev '^\s*(#|$)' "$LANG_FILE" 2>/dev/null | sed 's/^\s*//; s/\s*$//' || true)
                
                len=${#en_lines[@]}
                if [ ${#lang_lines[@]} -ne $len ]; then
                  continue
                fi
                
                for ((i=0; i<len; i++)); do
                  if [ "${lang_lines[i]:-}" != "${en_lines[i]:-}" ] && [ -n "${lang_lines[i]:-}" ]; then
                    ((TRANS++)) || true
                  fi
                done
              fi
            done <<< "$EN_FILES"
            
            # Calculate percentage with rounding
            if [ "$TOTAL" -gt 0 ]; then
              PERCENTAGE=$(( (TRANS * 100 + TOTAL / 2) / TOTAL ))
            else
              PERCENTAGE=0
            fi
            
            NAME=$(get_lang_name "$lang_code")
            TEMP_PERCENTAGES+="$NAME: $PERCENTAGE%"$'\n'
          done <<< "$LANG_CODES"
          
          # Sort by language name
          if [ -n "$TEMP_PERCENTAGES" ]; then
            PERCENTAGES=$(echo -n "$TEMP_PERCENTAGES" | sort -k1)
          else
            PERCENTAGES="No translations available"
          fi
          
          echo "percentages<<EOF" >> $GITHUB_OUTPUT
          echo "$PERCENTAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash
