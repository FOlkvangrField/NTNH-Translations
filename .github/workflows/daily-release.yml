name: Daily Language Pack Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge PRs from Bufka2011 and BufkaSecond
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });

            const allowedUsers = ['Bufka2011', 'BufkaSecond'];

            for (const pull of pulls) {
              if (!allowedUsers.includes(pull.user.login)) continue;

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                  merge_method: 'merge'
                });
                console.log(`✅ Merged PR #${pull.number} from ${pull.user.login}`);
              } catch (error) {
                console.log(`⚠️ Failed to merge PR #${pull.number} from ${pull.user.login}: ${error.message}`);
              }
            }

      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Clean up automatic backslashes from Crowdin
        shell: bash
        run: |
          echo "🧹 Cleaning up automatic backslashes added by Crowdin..."

          find . -type f \( -name "*.properties" -o -name "*.lang" -o -name "*.txt" \) \
            -exec sed -i 's/\\\([!#:=]\)/\1/g' {} \;

          echo "✅ Done"

      - name: Convert .properties files to .lang format
        shell: bash
        run: |
          echo "🔄 Converting .properties files to .lang format..."

          find config -type f -name "*.properties" | while read -r f; do
            mv "$f" "${f%.properties}.lang"
            echo "  Converted: $f → ${f%.properties}.lang"
          done

          echo "✅ Done"

      - name: Set release name
        id: vars
        run: echo "release_name=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create unified language packs ZIP
        id: zip
        shell: bash
        run: |
          TEMP_DIR=$(mktemp -d)

          if [ ! -d "config" ]; then
            echo "❌ No config directory found"
            exit 1
          fi

          cp -r config "$TEMP_DIR/"

          # Remove all en_US source files — these are not part of the translation pack
          find "$TEMP_DIR/config" -type f -name "en_US.*" -delete

          ZIP_NAME="NTNH-Translations-${{ steps.vars.outputs.release_name }}.zip"
          ZIP_PATH="build_artifacts/$ZIP_NAME"
          mkdir -p build_artifacts

          (
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/$ZIP_PATH" config/ -x "*.git*" "*.DS_Store" "__MACOSX/*"
          )

          rm -rf "$TEMP_DIR"

          echo "zip_file=$ZIP_PATH" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✅ Created $ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          tag_name: NTNH-Translations-${{ steps.vars.outputs.release_name }}
          body: |
            📦 Unified language packs for Nuclear Tech: New Horizons
            🕒 Generated from branch `main` on ${{ steps.vars.outputs.release_name }}

            This release contains a single ZIP archive with **all language packs**.

            **How to use:**
            1. Download `${{ steps.zip.outputs.zip_name }}` from the assets below.
            2. Extract the contents into your Minecraft `config` directory.
            3. Restart Minecraft to apply the new language packs.
          files: ${{ steps.zip.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger pull-translations workflow in NTNH
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.UNIVERSAL_FINE }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'NTNewHorizons',
              repo: 'NTNH',
              event_type: 'translations-released'
            });
            console.log('✅ Dispatched translations-released event to NTNewHorizons/NTNH');
